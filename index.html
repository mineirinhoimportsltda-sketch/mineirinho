<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceiroApp Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#eef3f6;--panel:#ffffff;--line:#c8d4de;--text:#0e1c2b;--muted:#5a7080;
  --red:#c5151b;--blue:#0e6eb5;--green:#1f9e4a;--amber:#b07a10;
  --soft-red:#fce8e9;--soft-blue:#e3f0fb;--soft-green:#e1f5e9;--soft-amber:#fef5dc;
  --shadow:0 4px 20px rgba(14,28,43,.09);--radius:12px;
  --sidebar-w:230px;--header-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px}
/* ── LAYOUT ── */
#app{display:flex;height:100vh}
/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar-w);background:#0e1c2b;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;height:var(--header-h)}
.sb-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#1f9e4a,#0e6eb5);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-logo-text{font-weight:800;font-size:13px;color:#fff;line-height:1.2}
.sb-logo-text small{color:#7a9ab5;font-weight:400;font-size:11px;display:block}
.sb-section{padding:6px 0}
.sb-label{padding:8px 18px 4px;font-size:10px;font-weight:700;letter-spacing:1.2px;color:#4a6478;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:#8aacbf;font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .15s;white-space:nowrap}
.sb-item:hover{background:rgba(255,255,255,.06);color:#c8dbe7}
.sb-item.active{background:rgba(30,158,74,.15);color:#4cde85;border-left-color:#1f9e4a}
.sb-item .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-footer{padding:14px 18px;margin-top:auto;border-top:1px solid rgba(255,255,255,.08)}
.sb-user{font-size:12px;color:#4a6478;margin-bottom:8px}
/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* ── TOPBAR ── */
#topbar{height:var(--header-h);background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;box-shadow:0 1px 0 rgba(0,0,0,.06)}
#topbar h1{font-size:17px;font-weight:800;flex:1;color:#0e1c2b}
/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:18px}
/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-green{background:#1f9e4a;color:#fff}.btn-green:hover{background:#178c3e}
.btn-blue{background:#0e6eb5;color:#fff}.btn-blue:hover{background:#0b5e9c}
.btn-red{background:#c5151b;color:#fff}.btn-red:hover{background:#a81116}
.btn-white{background:#fff;color:#3a5060;border:1px solid var(--line)}.btn-white:hover{background:#f0f4f7}
.btn-ghost{background:transparent;color:#5a7080;border:1px solid var(--line)}.btn-ghost:hover{background:#f0f4f7}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-icon{width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:#5a7080;transition:all .15s}
.btn-icon:hover{background:#f0f4f7}
/* ── CARDS ── */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:700;color:#7a9ab5;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
/* ── KPI CARDS ── */
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.kpi-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.kpi-green .kpi-icon{background:var(--soft-green);color:var(--green)}
.kpi-red .kpi-icon{background:var(--soft-red);color:var(--red)}
.kpi-blue .kpi-icon{background:var(--soft-blue);color:var(--blue)}
.kpi-amber .kpi-icon{background:var(--soft-amber);color:var(--amber)}
.kpi-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-size:21px;font-weight:800;font-family:'DM Mono',monospace;margin-top:2px}
.kpi-green .kpi-val{color:var(--green)}
.kpi-red .kpi-val{color:var(--red)}
.kpi-blue .kpi-val{color:var(--blue)}
.kpi-amber .kpi-val{color:var(--amber)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}
/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f0f4f7}
th{padding:9px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#3a5060;white-space:nowrap;border-bottom:1px solid var(--line)}
td{padding:9px 10px;border-bottom:1px solid #e8eef3;color:var(--text);vertical-align:middle}
tr:hover td{background:#f6f9fb}
tr:last-child td{border-bottom:none}
.td-mono{font-family:'DM Mono',monospace;font-size:12px}
/* ── BADGES STATUS ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-green{background:var(--soft-green);color:var(--green)}
.b-red{background:var(--soft-red);color:var(--red)}
.b-amber{background:var(--soft-amber);color:var(--amber)}
.b-blue{background:var(--soft-blue);color:var(--blue)}
.b-gray{background:#eef1f4;color:#607285}
/* ── FORMS ── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;color:#3a5060;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field{width:100%;background:#fff;border:1px solid var(--line);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;height:38px;transition:border .15s}
.field:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(14,110,181,.12)}
textarea.field{height:auto;min-height:70px;resize:vertical}
.frow{display:grid;gap:12px}
.frow.c2{grid-template-columns:1fr 1fr}
.frow.c3{grid-template-columns:1fr 1fr 1fr}
.frow.c4{grid-template-columns:1fr 1fr 1fr 1fr}
/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(10,20,30,.4);display:none;align-items:center;justify-content:center;padding:20px;z-index:999;backdrop-filter:blur(3px)}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.22);width:min(740px,96vw);max-height:92vh;overflow-y:auto;padding:22px}
.modal-box.wide{width:min(1000px,96vw)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-head h2{font-size:18px;font-weight:800}
.modal-close{background:none;border:1px solid var(--line);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:18px;color:#5a7080;display:flex;align-items:center;justify-content:center}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
/* ── TABS ── */
.tabs{display:flex;gap:3px;border-bottom:2px solid var(--line);margin-bottom:18px}
.tab{padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
/* ── CONTAS A PAGAR/RECEBER ── */
.twocol{display:grid;grid-template-columns:1.1fr .9fr;gap:4px;background:#d0dae4;border-radius:12px 12px 0 0;overflow:hidden}
.colhead{color:#fff;font-weight:900;text-align:center;padding:11px;font-size:16px;letter-spacing:.03em}
.colhead.red{background:var(--red)}
.colhead.green{background:var(--green)}
.colhead.blue{background:var(--blue)}
.tablesplit{display:grid;grid-template-columns:1.1fr .9fr;gap:4px}
.tblbox{overflow:auto;max-height:460px;background:#f3f6f9}
.st-red{background:var(--soft-red);color:#b31217}
.st-amber{background:var(--soft-amber);color:#8c6200}
.st-green{background:var(--soft-green);color:#177035}
.st-blue{background:var(--soft-blue);color:#0b5e9c}
.dotbtn{background:none;border:none;font-size:20px;color:#5a7080;cursor:pointer;padding:2px 6px}
.sum-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.sumcard{background:#fffbf0;border:1px solid #e8ddc2;border-radius:10px;padding:10px 12px;text-align:center}
.sumcard .st{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.sumcard .sv{font-size:18px;font-weight:800;font-family:'DM Mono',monospace;margin-top:5px}
.sumcard .sq{font-size:12px;font-weight:700;margin-top:2px}
/* ── FILTERS BAR ── */
.filters{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.filters .form-group{margin-bottom:0}
/* ── SPLIT PANEL ── */
.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* ── SECTION HEADER ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:16px;font-weight:800;color:#0e1c2b}
/* ── ALERTS ── */
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:10px;border:1px solid}
.alert-green{background:var(--soft-green);border-color:rgba(31,158,74,.3);color:#177035}
.alert-red{background:var(--soft-red);border-color:rgba(197,21,27,.3);color:#b31217}
.alert-amber{background:var(--soft-amber);border-color:rgba(176,122,16,.3);color:#8c6200}
.alert-blue{background:var(--soft-blue);border-color:rgba(14,110,181,.3);color:#0b5e9c}
/* ── TOAST ── */
#toast-wrap{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 15px;box-shadow:var(--shadow);font-size:13px;display:flex;align-items:center;gap:9px;min-width:260px;animation:slideIn .25s ease}
.toast.ok{border-left:4px solid var(--green)}
.toast.err{border-left:4px solid var(--red)}
.toast.info{border-left:4px solid var(--blue)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
/* ── REPORT ── */
.report-paper{width:min(1250px,96vw);max-height:92vh;overflow:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.rpt-head{display:grid;grid-template-columns:140px 1fr;gap:14px;align-items:start;margin-bottom:16px}
.rpt-logo{height:80px;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#b84a00;text-align:center;line-height:1.3}
.rpt-company h2{font-size:22px;font-weight:900;margin:0}
.rpt-company p{font-size:14px;margin:4px 0 0;color:#444}
.rpt-title{text-align:center;font-weight:900;font-size:22px;margin:14px 0 10px;padding:8px;border-top:2px solid #111;border-bottom:2px solid #111}
.rpt-table{width:100%;border-collapse:collapse;font-size:13px}
.rpt-table th,.rpt-table td{border-bottom:1px solid #bbb;padding:6px 8px}
.rpt-table th{font-size:11px;text-align:left;font-weight:800;background:#f0f0f0}
.rpt-footer{margin-top:10px;display:flex;justify-content:space-between;font-size:13px;font-weight:700}
/* ── PROGRESS ── */
.prog{background:#e8eef3;border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:42px;margin-bottom:10px}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c8d4de;border-radius:3px}
/* ── REALTIME DOT ── */
#rt{position:fixed;bottom:16px;right:16px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px;z-index:9998;box-shadow:var(--shadow)}
#rt-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#rt.off #rt-dot{background:var(--red);animation:none}
/* ── RESPONSIVE ── */
@media(max-width:1100px){.g4{grid-template-columns:1fr 1fr}.twocol,.tablesplit,.split{grid-template-columns:1fr}}
@media(max-width:768px){:root{--sidebar-w:58px}.sb-label,.sb-item span{display:none}.g2,.g3,.g4{grid-template-columns:1fr}.frow.c2,.frow.c3,.frow.c4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="toast-wrap"></div>
<div id="rt"><div id="rt-dot"></div><span id="rt-lbl">Conectado</span></div>

<div id="app" style="display:none">
  <nav id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">💰</div>
      <div class="sb-logo-text">FinanceiroApp<small>Sistema de Gestão</small></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Principal</div>
      <div class="sb-item" data-page="dashboard" onclick="go('dashboard')"><span class="ic">📊</span><span>Dashboard</span></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Lançamentos</div>
      <div class="sb-item" data-page="receitas" onclick="go('receitas')"><span class="ic">💚</span><span>Receitas</span></div>
      <div class="sb-item" data-page="despesas" onclick="go('despesas')"><span class="ic">❤️</span><span>Despesas</span></div>
      <div class="sb-item" data-page="poupanca" onclick="go('poupanca')"><span class="ic">🏦</span><span>Poupança</span></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Contas</div>
      <div class="sb-item" data-page="contas_receber" onclick="go('contas_receber')"><span class="ic">📥</span><span>A Receber</span></div>
      <div class="sb-item" data-page="contas_pagar" onclick="go('contas_pagar')"><span class="ic">📤</span><span>A Pagar</span></div>
      <div class="sb-item" data-page="cartao" onclick="go('cartao')"><span class="ic">💳</span><span>Cartão Crédito</span></div>
      <div class="sb-item" data-page="transferencias" onclick="go('transferencias')"><span class="ic">🔄</span><span>Transferências</span></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Análise</div>
      <div class="sb-item" data-page="extrato" onclick="go('extrato')"><span class="ic">📋</span><span>Extrato</span></div>
      <div class="sb-item" data-page="relatorios" onclick="go('relatorios')"><span class="ic">📑</span><span>Relatórios</span></div>
      <div class="sb-item" data-page="graficos" onclick="go('graficos')"><span class="ic">📈</span><span>Gráficos</span></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Config</div>
      <div class="sb-item" data-page="cadastros" onclick="go('cadastros')"><span class="ic">⚙️</span><span>Cadastros</span></div>
      <div class="sb-item" data-page="usuarios" onclick="go('usuarios')"><span class="ic">👥</span><span>Usuários</span></div>
      <div class="sb-item" data-page="backup" onclick="go('backup')"><span class="ic">💾</span><span>Backup</span></div>
    </div>
    <div class="sb-footer">
      <div class="sb-user" id="sb-user">...</div>
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center" onclick="logout()">🚪 Sair</button>
    </div>
  </nav>
  <div id="main">
    <header id="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-green btn-sm" onclick="go('receitas')">＋ Receita</button>
        <button class="btn btn-red btn-sm" onclick="go('contas_pagar')">＋ Despesa</button>
      </div>
    </header>
    <main id="content"></main>
  </div>
</div>

<script>
// ══════════════════════════════════════
// SUPABASE + CONFIG
// ══════════════════════════════════════
const SUPA_URL = 'https://iqefyujbohknfkiitqcj.supabase.co';
const SUPA_KEY = 'sb_publishable_yko8fI9f5g4yV4OL3NI84Q_jYgehJe-';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ══════════════════════════════════════
// DB LAYER
// ══════════════════════════════════════
async function dbGet(table, id) {
  if (id !== undefined) {
    const { data, error } = await supa.from(table).select('*').eq('id', id).single();
    if (error) return null;
    return data;
  }
  const { data, error } = await supa.from(table).select('*').order('id');
  if (error) { console.error(table, error); return []; }
  return data || [];
}
async function dbAdd(table, obj) {
  const clean = { ...obj }; delete clean.id;
  const { data, error } = await supa.from(table).insert(clean).select('id').single();
  if (error) throw error;
  return data.id;
}
async function dbPut(table, obj) {
  const { error } = await supa.from(table).upsert(obj);
  if (error) throw error;
}
async function dbDelete(table, id) {
  const { error } = await supa.from(table).delete().eq('id', id);
  if (error) throw error;
}
async function dbClear(table) {
  await supa.from(table).delete().neq('id', 0);
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
const R$ = v => Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fDate = iso => iso ? new Date(iso+'T00:00:00').toLocaleDateString('pt-BR') : '';
const today = () => new Date().toISOString().split('T')[0];
const addMonths = (d,n) => { const dt=new Date(d+'T00:00:00'); dt.setMonth(dt.getMonth()+n); return dt.toISOString().split('T')[0]; };
const esc = v => String(v??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function toast(msg, type='info') {
  const wrap = document.getElementById('toast-wrap');
  const icons = {ok:'✅',err:'❌',info:'ℹ️'};
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='.3s'; setTimeout(()=>el.remove(),300); }, 3000);
}

function confirm2(msg) {
  return new Promise(res => {
    const o = document.createElement('div');
    o.className = 'modal open';
    o.innerHTML = `<div class="modal-box" style="max-width:380px">
      <div class="modal-head"><h2>⚠️ Confirmar</h2></div>
      <p style="color:var(--muted);margin-bottom:18px">${msg}</p>
      <div class="modal-foot"><button class="btn btn-white" id="c-no">Cancelar</button><button class="btn btn-red" id="c-yes">Confirmar</button></div>
    </div>`;
    document.body.appendChild(o);
    o.querySelector('#c-yes').onclick = () => { o.remove(); res(true); };
    o.querySelector('#c-no').onclick = () => { o.remove(); res(false); };
  });
}

function printReport(html, title) {
  const w = window.open('','','width=1100,height=800');
  w.document.write(`<!DOCTYPE html><html><head><title>${title}</title>
  <style>body{font-family:Arial,sans-serif;font-size:12px;margin:20px}
  table{width:100%;border-collapse:collapse}

let currentUser = null;

function showLogin() {
  document.getElementById('app').style.display = 'none';
  let el = document.getElementById('login-screen');
  if (!el) {
    el = document.createElement('div');
    el.id = 'login-screen';
    el.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
      <div style="width:360px">
        <div style="text-align:center;margin-bottom:28px">
          <div style="width:54px;height:54px;background:linear-gradient(135deg,#1f9e4a,#0e6eb5);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px">💰</div>
          <h1 style="font-size:22px;font-weight:800;color:#0e1c2b">FinanceiroApp Pro</h1>
          <p style="color:var(--muted);font-size:13px;margin-top:4px">Sistema de Gestão Financeira</p>
        </div>
        <div class="card">
          <div class="form-group"><label class="form-label">Usuário</label><input class="field" id="l-user" value="admin"></div>
          <div class="form-group"><label class="form-label">Senha</label><input type="password" class="field" id="l-pass" value="1234"></div>
          <div id="l-err" class="alert alert-red" style="display:none"></div>
          <button class="btn btn-blue" style="width:100%;justify-content:center" onclick="doLogin()">🔐 Entrar</button>
          <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:10px">Login: admin / 1234</p>
        </div>
      </div>
    </div>`;
    document.body.appendChild(el);
  }
  el.style.display = 'block';
  el.querySelector('#l-pass').onkeydown = e => e.key==='Enter' && doLogin();
}

async function doLogin() {
  const u = document.getElementById('l-user').value;
  const p = document.getElementById('l-pass').value;
  const users = await dbGet('usuarios');
  const user = users.find(x => x.username===u && x.password===p && x.ativo);
  if (user) {
    currentUser = user;
    sessionStorage.setItem('user', JSON.stringify(user));
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('sb-user').textContent = user.nome;
    go('dashboard');
  } else {
    const err = document.getElementById('l-err');
    err.textContent = 'Usuário ou senha inválidos';
    err.style.display = 'block';
  }
}

function logout() { sessionStorage.removeItem('user'); currentUser=null; showLogin(); }

const PAGES = {
  dashboard:      { label:'Dashboard',         fn:pgDashboard },
  receitas:       { label:'Lançar Receita',    fn:pgReceitas },
  despesas:       { label:'Lançar Despesa',    fn:pgDespesas },
  contas_receber: { label:'Contas a Receber',  fn:pgContasReceber },
  contas_pagar:   { label:'Contas a Pagar',    fn:pgContasPagar },
  extrato:        { label:'Extrato',           fn:pgExtrato },
  transferencias: { label:'Transferências',    fn:pgTransferencias },
  cartao:         { label:'Cartão de Crédito', fn:pgCartao },
  poupanca:       { label:'Poupança',          fn:pgPoupanca },
  relatorios:     { label:'Relatórios',        fn:pgRelatorios },
  graficos:       { label:'Gráficos',          fn:pgGraficos },
  cadastros:      { label:'Cadastros',         fn:pgCadastros },
  usuarios:       { label:'Usuários',          fn:pgUsuarios },
  backup:         { label:'Backup',            fn:pgBackup },
};

function go(page) {
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.toggle('active', el.dataset.page===page));
  const p = PAGES[page];
  document.getElementById('page-title').textContent = p?.label || page;
  const c = document.getElementById('content');
  c.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:180px;color:var(--muted)">⏳ Carregando...</div>';
  if (p?.fn) p.fn(c);
}

function setupRealtime() {
  supa.channel('realtime-all')
    .on('postgres_changes',{event:'*',schema:'public'}, payload => {
      document.getElementById('rt-lbl').textContent='Atualizado';
      setTimeout(()=>document.getElementById('rt-lbl').textContent='Conectado',2000);
      const reload=['parcelas_receita','parcelas_despesa','contas_pagar','receitas','despesas','transferencias','poupanca','lancamentos_cartao'];
      if(reload.includes(payload.table) && currentPage) {
        const p=PAGES[currentPage]; if(p) p.fn(document.getElementById('content'));
      }
    })
    .subscribe(s => {
      const el=document.getElementById('rt');
      if(s==='SUBSCRIBED'){el.classList.remove('off');document.getElementById('rt-lbl').textContent='Conectado';}
      else{el.classList.add('off');document.getElementById('rt-lbl').textContent='Offline';}
    });
}

async function pgDashboard(c) {
  const now=new Date(); const yr=now.getFullYear(); const mo=String(now.getMonth()+1).padStart(2,'0');
  const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const [pr,pd,cp] = await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);

  const recMes=pr.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${mo}`));
  const despMes=pd.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${mo}`));
  const totalR=recMes.reduce((s,p)=>s+(+p.valor_pago||0),0);
  const totalD=despMes.reduce((s,p)=>s+(+p.valor_pago||0),0);
  const aRec=pr.filter(p=>!p.dt_pagamento).reduce((s,p)=>s+(+p.valor||0),0);

  // Contas a pagar vencidas
  const cpVenc=cp.filter(r=>r.status!=='paid'&&r.vencimento<today());
  const cpVencVal=cpVenc.reduce((s,r)=>s+(+r.valor||0),0);

  const resumo=meses.map((_,i)=>{
    const m=String(i+1).padStart(2,'0');
    const r=pr.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${m}`)).reduce((s,p)=>s+(+p.valor_pago||0),0);
    const d=pd.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${m}`)).reduce((s,p)=>s+(+p.valor_pago||0),0);
    return {mes:meses[i],r,d,s:r-d};
  });
  const totalRA=resumo.reduce((s,m)=>s+m.r,0); const totalDA=resumo.reduce((s,m)=>s+m.d,0);

  // Top despesas cat
  const catMap={};
  for(const p of despMes){const k=p.categoria||'Outros';catMap[k]=(catMap[k]||0)+(+p.valor_pago||0);}
  const topCat=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:16px">
  <div class="g4">
    <div class="kpi kpi-green"><div class="kpi-icon">💰</div><div><div class="kpi-lbl">Receitas do Mês</div><div class="kpi-val">${R$(totalR)}</div><div class="kpi-sub">${recMes.length} recebimentos</div></div></div>
    <div class="kpi kpi-red"><div class="kpi-icon">💸</div><div><div class="kpi-lbl">Despesas do Mês</div><div class="kpi-val">${R$(totalD)}</div><div class="kpi-sub">${despMes.length} pagamentos</div></div></div>
    <div class="kpi ${totalR-totalD>=0?'kpi-blue':'kpi-red'}"><div class="kpi-icon">${totalR-totalD>=0?'📈':'📉'}</div><div><div class="kpi-lbl">Saldo do Mês</div><div class="kpi-val">${R$(totalR-totalD)}</div><div class="kpi-sub">${meses[now.getMonth()]}/${yr}</div></div></div>
    <div class="kpi kpi-amber"><div class="kpi-icon">⚠️</div><div><div class="kpi-lbl">C. Pagar Vencidas</div><div class="kpi-val">${R$(cpVencVal)}</div><div class="kpi-sub">${cpVenc.length} parcela(s)</div></div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="card-title">📊 Receitas × Despesas — ${yr}</div><canvas id="ch-anual" height="180"></canvas></div>
    <div class="card"><div class="card-title">🍕 Despesas por Categoria — ${meses[now.getMonth()]}</div><canvas id="ch-pizza" height="180"></canvas></div>
  </div>
  <div class="g2">
    <div class="card"><div class="card-title">📅 Resumo Anual ${yr}</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Mês</th><th>Receita</th><th>Despesa</th><th>Saldo</th></tr></thead>
        <tbody>${resumo.map(m=>`<tr><td style="font-weight:700">${m.mes}</td>
          <td class="td-mono" style="color:var(--green)">${m.r>0?R$(m.r):'-'}</td>
          <td class="td-mono" style="color:var(--red)">${m.d>0?R$(m.d):'-'}</td>
          <td class="td-mono" style="color:${m.s>=0?'var(--blue)':'var(--red)'}">${m.r>0||m.d>0?R$(m.s):'-'}</td></tr>`).join('')}
        <tr style="font-weight:800;border-top:2px solid var(--line)"><td>TOTAL</td>
          <td class="td-mono" style="color:var(--green)">${R$(totalRA)}</td>
          <td class="td-mono" style="color:var(--red)">${R$(totalDA)}</td>
          <td class="td-mono" style="color:${totalRA-totalDA>=0?'var(--blue)':'var(--red)'}">${R$(totalRA-totalDA)}</td></tr>
        </tbody>
      </table></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="card"><div class="card-title">🏆 Top Despesas do Mês</div>
        ${topCat.length===0?'<p style="color:var(--muted)">Sem despesas pagas este mês</p>':topCat.map(([cat,val])=>{
          const pct=totalD>0?Math.round(val/totalD*100):0;
          return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px">${cat}</span><span class="td-mono" style="color:var(--red);font-size:12px">${R$(val)} (${pct}%)</span></div><div class="prog"><div class="prog-fill" style="width:${pct}%;background:var(--red)"></div></div></div>`;}).join('')}
      </div>
      ${cpVenc.length>0?`<div class="card"><div class="card-title">🚨 Contas a Pagar Vencidas</div>
        <div class="alert alert-red">${cpVenc.length} conta(s) vencida(s) — ${R$(cpVencVal)}</div>
        <button class="btn btn-red btn-sm" onclick="go('contas_pagar')">Ver todas →</button>
      </div>`:`<div class="card"><div class="card-title">✅ Situação</div><div class="alert alert-green">Tudo em dia! Nenhuma conta vencida.</div></div>`}
    </div>
  </div>
  </div>`;

  // Charts
  if(typeof Chart==='undefined'){
    const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s.onload=()=>drawDashCharts(resumo,meses,topCat,totalD);document.head.appendChild(s);
  }else drawDashCharts(resumo,meses,topCat,totalD);
}

function drawDashCharts(resumo,meses,topCat,totalD){
  const ctx1=document.getElementById('ch-anual');
  if(ctx1){if(ctx1._c)ctx1._c.destroy();ctx1._c=new Chart(ctx1,{type:'bar',data:{labels:meses,datasets:[{label:'Receita',data:resumo.map(m=>m.r),backgroundColor:'rgba(31,158,74,.75)',borderRadius:5},{label:'Despesa',data:resumo.map(m=>m.d),backgroundColor:'rgba(197,21,27,.75)',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5a7080',font:{size:11}}}},scales:{x:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}},y:{ticks:{color:'#7a9ab5',callback:v=>'R$'+Number(v).toLocaleString('pt-BR')},grid:{color:'#e8eef3'}}}}})}
  const ctx2=document.getElementById('ch-pizza');
  if(ctx2&&topCat.length>0){if(ctx2._c)ctx2._c.destroy();ctx2._c=new Chart(ctx2,{type:'doughnut',data:{labels:topCat.map(([c])=>c),datasets:[{data:topCat.map(([,v])=>v),backgroundColor:['#c5151b','#b07a10','#8b5cf6','#0e6eb5','#1f9e4a'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#5a7080',font:{size:11}}}}}})}
}

let cpRecords=[], cpSelected=new Set(), cpEditId=null, cpQuickFilter='', cpOnlySelected=false;

const cpStatus = rec => {
  if(rec.status==='paid') return 'PAGO';
  const t=today();
  if(rec.vencimento<t) return 'VENCIDO';
  if(rec.vencimento===t) return 'VENCE HOJE';
  const diff=Math.ceil((new Date(rec.vencimento+'T00:00:00')-new Date(t+'T00:00:00'))/86400000);
  return `${diff} DIA(S) A VENCER`;
};
const cpStatusClass = txt => txt.includes('VENCIDO')?'st-red':txt.includes('HOJE')?'st-green':txt.includes('VENCER')?'st-amber':'st-blue';

async function pgContasPagar(c) {
  await cpLoad(c);
}

async function cpLoad(c) {
  const { data, error } = await supa.from('contas_pagar').select('*').order('vencimento');
  if(error){ toast('Erro ao carregar contas a pagar: '+error.message,'err'); cpRecords=[]; }
  else cpRecords=data||[];
  cpRender(c||document.getElementById('content'));
}

function cpRender(c) {
  const yr=document.getElementById('cp-yr')?.value||''; const mo=document.getElementById('cp-mo')?.value||'';
  const srch=(document.getElementById('cp-srch')?.value||'').toLowerCase();
  const supp=document.getElementById('cp-supp')?.value||'';
  const t=today();

  let open=cpRecords.filter(r=>r.status!=='paid');
  let paid=cpRecords.filter(r=>r.status==='paid');

  const filt = (arr,isPaid) => arr.filter(r=>{
    if(yr&&!r.vencimento?.startsWith(yr)) return false;
    if(mo&&r.vencimento?.slice(5,7)!==mo) return false;
    if(supp&&r.fornecedor!==supp) return false;
    if(srch){const h=[r.fornecedor,r.tipo_despesa,r.descricao_adicional,r.categoria,r.observacao].join(' ').toLowerCase();if(!h.includes(srch))return false;}
    if(cpOnlySelected&&!cpSelected.has(r.id)) return false;
    if(!isPaid){
      if(cpQuickFilter==='today'&&r.vencimento!==t) return false;
      if(cpQuickFilter==='overdue'&&!(r.vencimento<t)) return false;
      if(cpQuickFilter==='upcoming'&&!(r.vencimento>t)) return false;
    }
    if(isPaid&&cpQuickFilter==='paid') return true;
    if(cpQuickFilter==='paid'&&!isPaid) return false;
    return true;
  });

  const openF=filt(open,false).sort((a,b)=>a.vencimento>b.vencimento?1:-1);
  const paidF=filt(paid,true).sort((a,b)=>(a.data_pagamento||a.vencimento)>(b.data_pagamento||b.vencimento)?1:-1);

  const suppList=[...new Set(cpRecords.map(r=>r.fornecedor).filter(Boolean))].sort();

function cpSel(id,checked){ if(checked)cpSelected.add(id);else cpSelected.delete(id); }
function cpToggleAll(checked,paid){
  const t=today();
  cpRecords.filter(r=>(r.status==='paid')===paid).forEach(r=>{ if(checked)cpSelected.add(r.id);else cpSelected.delete(r.id); });
  cpRender();
}

function cpOpenForm(id=null){
  cpEditId=id;
  const rec=id?cpRecords.find(r=>r.id===id):null;
  document.getElementById('cp-form-title').textContent=id?'Editar Conta a Pagar':'Nova Conta a Pagar';
  document.getElementById('cpf-data_lanc').value=rec?.data_lanc||today();
  document.getElementById('cpf-tipo_despesa').value=rec?.tipo_despesa||'';
  document.getElementById('cpf-fornecedor').value=rec?.fornecedor||'';
  document.getElementById('cpf-parcela').value=rec?.parcela||'1/1';
  document.getElementById('cpf-vencimento').value=rec?.vencimento||today();
  document.getElementById('cpf-valor').value=rec?.valor??'';
  document.getElementById('cpf-descricao_adicional').value=rec?.descricao_adicional||'';
  document.getElementById('cpf-forma_pagamento').value=rec?.forma_pagamento||'';
  document.getElementById('cpf-categoria').value=rec?.categoria||'';
  document.getElementById('cpf-data_pagamento').value=rec?.data_pagamento||'';
  document.getElementById('cpf-valor_pago').value=rec?.valor_pago??'';
  document.getElementById('cpf-status').value=rec?.status||'open';
  document.getElementById('cpf-observacao').value=rec?.observacao||'';
  document.getElementById('cp-form-modal').classList.add('open');
}

async function cpSave(){
  const payload={
    data_lanc:document.getElementById('cpf-data_lanc').value,
    tipo_despesa:document.getElementById('cpf-tipo_despesa').value.trim(),
    fornecedor:document.getElementById('cpf-fornecedor').value.trim(),
    parcela:document.getElementById('cpf-parcela').value.trim()||'1/1',
    vencimento:document.getElementById('cpf-vencimento').value,
    valor:Number(document.getElementById('cpf-valor').value||0),
    descricao_adicional:document.getElementById('cpf-descricao_adicional').value.trim(),
    forma_pagamento:document.getElementById('cpf-forma_pagamento').value.trim(),
    categoria:document.getElementById('cpf-categoria').value.trim(),
    data_pagamento:document.getElementById('cpf-data_pagamento').value||null,
    valor_pago:document.getElementById('cpf-valor_pago').value?Number(document.getElementById('cpf-valor_pago').value):null,
    status:document.getElementById('cpf-status').value,
    observacao:document.getElementById('cpf-observacao').value.trim()
  };
  if(!payload.fornecedor||!payload.vencimento||!payload.valor){toast('Preencha fornecedor, vencimento e valor!','err');return;}
  try{
    if(cpEditId){ await supa.from('contas_pagar').update(payload).eq('id',cpEditId); }
    else { await supa.from('contas_pagar').insert(payload); }
    document.getElementById('cp-form-modal').classList.remove('open');
    toast('Salvo!','ok');
    await cpLoad();
  }catch(e){ toast('Erro: '+e.message,'err'); }
}

async function cpMarkPaid(){
  const ids=[...cpSelected];
  if(!ids.length){toast('Selecione pelo menos uma conta','info');return;}
  const date=prompt('Data do pagamento (AAAA-MM-DD):',today());
  if(!date)return;
  try{
    await supa.from('contas_pagar').update({status:'paid',data_pagamento:date}).in('id',ids);
    cpSelected.clear();
    toast('Baixa realizada!','ok');
    await cpLoad();
  }catch(e){toast('Erro: '+e.message,'err');}
}

async function cpRowMenu(id){
  const rec=cpRecords.find(r=>r.id===id);if(!rec)return;
  const act=prompt(`${rec.fornecedor}\n1 = Editar\n2 = Marcar pago\n3 = Excluir`,'1');
  if(act==='1') cpOpenForm(id);
  if(act==='2'){cpSelected.add(id);cpMarkPaid();}
  if(act==='3'){
    if(!(await confirm2('Excluir esta conta?')))return;
    await supa.from('contas_pagar').delete().eq('id',id);
    toast('Excluída!','ok');
    await cpLoad();
  }
}

function cpPrintReport(mode){
  const rows=mode==='open'?cpRecords.filter(r=>r.status!=='paid'):cpRecords.filter(r=>r.status==='paid');
  const sorted=rows.sort((a,b)=>a.vencimento>b.vencimento?1:-1);
  const total=sorted.reduce((s,r)=>s+Number(mode==='paid'?(r.valor_pago??r.valor??0):(r.valor??0)),0);
  const title=mode==='open'?'RELATÓRIO DE DESPESAS A PAGAR':'RELATÓRIO DE DESPESAS PAGAS';
  printReport(`<table class="rpt-table"><thead><tr><th>Tipo</th><th>Descrição</th><th>Parcela</th><th>Vencimento</th><th>Valor</th><th>Data Pgto</th><th>Status</th><th>Fornecedor</th><th>F.Pgto</th></tr></thead>
  <tbody>${sorted.map(r=>`<tr><td>${esc(r.tipo_despesa||'')}</td><td>${esc(r.descricao_adicional||'')}</td><td>${esc(r.parcela||'')}</td><td>${fDate(r.vencimento)}</td><td style="color:${r.status==='paid'?'green':'red'}">${R$(r.status==='paid'?(r.valor_pago??r.valor):r.valor)}</td><td>${fDate(r.data_pagamento)}</td><td>${r.status==='paid'?'PAGO':cpStatus(r)}</td><td>${esc(r.fornecedor||'')}</td><td>${esc(r.forma_pagamento||'')}</td></tr>`).join('')}
  <tr class="total"><td colspan="4"><strong>TOTAL GERAL</strong></td><td><strong>${R$(total)}</strong></td><td colspan="4">Qtd: ${sorted.length}</td></tr>
  </tbody></table>`,title);
}

let parcRecTemp=[];
async function pgReceitas(c){
  const [cats,contas,clientes,formas,receitas]=await Promise.all([dbGet('categorias_receita'),dbGet('contas'),dbGet('clientes'),dbGet('formas_pagamento'),dbGet('receitas')]);

      </tbody>
    </table></div></div>
  </div>
  <div class="modal" id="modal-rec">
    <div class="modal-box wide"><div class="modal-head"><h2>💚 Nova Receita</h2><button class="modal-close" onclick="document.getElementById('modal-rec').classList.remove('open')">✕</button></div>
    <div class="frow c3">
      <div class="form-group"><label class="form-label">Conta *</label><select class="field" id="rec-conta">${contas.filter(c=>c.ativo).map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Tipo *</label><select class="field" id="rec-tipo">${cats.filter(c=>c.ativo).map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('')}</select></div>

    </div>

function calcTotalRec(){const v=parseFloat(document.getElementById('rec-valor')?.value)||0;const q=parseInt(document.getElementById('rec-qtde')?.value)||1;const el=document.getElementById('rec-total-lbl');if(el)el.textContent=v>0?`Total: ${R$(v*q)}`:''}
function resetFormRec(){parcRecTemp=[];document.getElementById('rec-parcelas-wrap').style.display='none';document.getElementById('rec-total-lbl').textContent='';['rec-desc','rec-doc','rec-valor'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('rec-qtde').value='1';document.getElementById('rec-data1').value=today();}
function gerarParcelasRec(){
  const data1=document.getElementById('rec-data1').value;const valor=parseFloat(document.getElementById('rec-valor').value)||0;const qtde=parseInt(document.getElementById('rec-qtde').value)||1;
  if(!data1||valor<=0){toast('Preencha data e valor!','err');return;}
  parcRecTemp=[];
  for(let i=0;i<qtde;i++) parcRecTemp.push({numero:i+1,total:qtde,vencimento:addMonths(data1,i),valor,recebido:false});
  document.getElementById('tb-parc-rec').innerHTML=parcRecTemp.map((p,i)=>`<tr><td>${p.numero}/${p.total}</td><td>${fDate(p.vencimento)}</td><td class="td-mono" style="color:var(--green)">${R$(p.valor)}</td><td><input type="checkbox" onchange="parcRecTemp[${i}].recebido=this.checked"></td></tr>`).join('');
  document.getElementById('rec-parcelas-wrap').style.display='block';
  toast(`${qtde} parcela(s) gerada(s)!`,'ok');
}

async function salvarReceita(){
  if(parcRecTemp.length===0){toast('Gere as parcelas primeiro!','err');return;}
  const valor=parseFloat(document.getElementById('rec-valor').value)||0;const qtde=parseInt(document.getElementById('rec-qtde').value)||1;
  if(valor<=0){toast('Informe o valor!','err');return;}
  const [cats,contas,clientes,formas]=await Promise.all([dbGet('categorias_receita'),dbGet('contas'),dbGet('clientes'),dbGet('formas_pagamento')]);
  const tipoId=parseInt(document.getElementById('rec-tipo').value);const contaId=parseInt(document.getElementById('rec-conta').value);const clienteId=parseInt(document.getElementById('rec-cli').value);const formaId=parseInt(document.getElementById('rec-forma').value);
  const cat=cats.find(c=>c.id===tipoId);const conta=contas.find(c=>c.id===contaId);const cli=clientes.find(c=>c.id===clienteId);const forma=formas.find(f=>f.id===formaId);
  const recId=await dbAdd('receitas',{data_lancamento:today(),conta_id:contaId,conta_nome:conta?.nome,tipo_id:tipoId,tipo_nome:cat?.nome,cliente_id:clienteId,cliente_nome:cli?.nome,forma_id:formaId,forma_nome:forma?.nome,descricao:document.getElementById('rec-desc').value,doc:document.getElementById('rec-doc').value,data_primeira:document.getElementById('rec-data1').value,valor_parcela:valor,qtde_parcelas:qtde,valor_total:valor*qtde,recebido:parcRecTemp.every(p=>p.recebido)});
  for(const p of parcRecTemp) await dbAdd('parcelas_receita',{receita_id:recId,numero:p.numero,total:p.total,vencimento:p.vencimento,valor:p.valor,forma_id:formaId,forma_nome:forma?.nome,conta_id:contaId,conta_nome:conta?.nome,tipo_nome:cat?.nome,cliente_nome:cli?.nome,descricao:document.getElementById('rec-desc').value,dt_pagamento:p.recebido?today():null,valor_pago:p.recebido?p.valor:0,categoria:cat?.nome});
  document.getElementById('modal-rec').classList.remove('open');
  toast('Receita salva!','ok');

function calcTotalDesp(){const v=parseFloat(document.getElementById('desp-valor')?.value)||0;const q=parseInt(document.getElementById('desp-qtde')?.value)||1;const el=document.getElementById('desp-total-lbl');if(el)el.textContent=v>0?`Total: ${R$(v*q)}`:''}
function resetFormDesp(){parcDespTemp=[];document.getElementById('desp-parcelas-wrap').style.display='none';document.getElementById('desp-total-lbl').textContent='';['desp-desc','desp-doc','desp-valor'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('desp-qtde').value='1';document.getElementById('desp-data1').value=today();}
function gerarParcelasDesp(){
  const data1=document.getElementById('desp-data1').value;const valor=parseFloat(document.getElementById('desp-valor').value)||0;const qtde=parseInt(document.getElementById('desp-qtde').value)||1;
  if(!data1||valor<=0){toast('Preencha data e valor!','err');return;}
  parcDespTemp=[];
  for(let i=0;i<qtde;i++) parcDespTemp.push({numero:i+1,total:qtde,vencimento:addMonths(data1,i),valor,quitado:false});
  document.getElementById('tb-parc-desp').innerHTML=parcDespTemp.map((p,i)=>`<tr><td>${p.numero}/${p.total}</td><td>${fDate(p.vencimento)}</td><td class="td-mono" style="color:var(--red)">${R$(p.valor)}</td><td><input type="checkbox" onchange="parcDespTemp[${i}].quitado=this.checked"></td></tr>`).join('');
  document.getElementById('desp-parcelas-wrap').style.display='block';
  toast(`${qtde} parcela(s) gerada(s)!`,'ok');
}

async function salvarDespesa(){
  if(parcDespTemp.length===0){toast('Gere as parcelas primeiro!','err');return;}
  const valor=parseFloat(document.getElementById('desp-valor').value)||0;const qtde=parseInt(document.getElementById('desp-qtde').value)||1;
  if(valor<=0){toast('Informe o valor!','err');return;}
  const [cats,contas,forns,formas]=await Promise.all([dbGet('categorias_despesa'),dbGet('contas'),dbGet('fornecedores'),dbGet('formas_pagamento')]);
  const catId=parseInt(document.getElementById('desp-cat').value);const contaId=parseInt(document.getElementById('desp-conta').value);const fornId=parseInt(document.getElementById('desp-forn').value);const formaId=parseInt(document.getElementById('desp-forma').value);
  const cat=cats.find(c=>c.id===catId);const conta=contas.find(c=>c.id===contaId);const forn=forns.find(f=>f.id===fornId);const forma=formas.find(f=>f.id===formaId);
  const despId=await dbAdd('despesas',{data_lancamento:today(),data_emissao:today(),conta_id:contaId,conta_nome:conta?.nome,cat_id:catId,cat_nome:cat?.nome,subcat:cat?.subcategoria,forn_id:fornId,forn_nome:forn?.nome,forma_id:formaId,forma_nome:forma?.nome,descricao:document.getElementById('desp-desc').value,doc:document.getElementById('desp-doc').value,data_primeira:document.getElementById('desp-data1').value,valor_parcela:valor,qtde_parcelas:qtde,valor_total:valor*qtde,quitado:parcDespTemp.every(p=>p.quitado)});
  for(const p of parcDespTemp) await dbAdd('parcelas_despesa',{despesa_id:despId,numero:p.numero,total:p.total,vencimento:p.vencimento,valor:p.valor,forma_id:formaId,forma_nome:forma?.nome,conta_id:contaId,conta_nome:conta?.nome,cat_nome:cat?.nome,forn_nome:forn?.nome,descricao:document.getElementById('desp-desc').value,dt_pagamento:p.quitado?today():null,valor_pago:p.quitado?p.valor:0,categoria:cat?.nome});
  document.getElementById('modal-desp').classList.remove('open');
  toast('Despesa salva!','ok');
  pgDespesas(document.getElementById('content'));
}

async function excluirDespesa(id){
  if(!(await confirm2('Excluir esta despesa?')))return;
  await dbDelete('despesas',id);toast('Excluída!','ok');pgDespesas(document.getElementById('content'));
}

async function pgExtrato(c){
  const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);
  const anos=[...new Set([...pr,...pd,...cp].map(p=>(p.dt_pagamento||p.data_pagamento)?.slice(0,4)).filter(Boolean))].sort().reverse();
  const now=new Date(); const curYr=String(now.getFullYear()); const curMo=String(now.getMonth()+1).padStart(2,'0');
  const months=['Todos','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  function filtrar(yr,mo){
    let r=pr.filter(p=>!!p.dt_pagamento); let d=pd.filter(p=>!!p.dt_pagamento);
    let cpP=cp.filter(p=>p.status==='paid'&&!!p.data_pagamento);
    if(yr){r=r.filter(p=>p.dt_pagamento?.startsWith(yr));d=d.filter(p=>p.dt_pagamento?.startsWith(yr));cpP=cpP.filter(p=>p.data_pagamento?.startsWith(yr));}
    if(mo){r=r.filter(p=>p.dt_pagamento?.slice(5,7)===mo);d=d.filter(p=>p.dt_pagamento?.slice(5,7)===mo);cpP=cpP.filter(p=>p.data_pagamento?.slice(5,7)===mo);}
    return [r,d,cpP];
  }

  const [rf,df,cpf]=filtrar(curYr,curMo);
  const tr=rf.reduce((s,p)=>s+(+p.valor_pago||0),0);
  const td=df.reduce((s,p)=>s+(+p.valor_pago||0),0)+cpf.reduce((s,r)=>s+(+(r.valor_pago??r.valor)||0),0);

  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="sec-title">📋 Extrato Comparativo</div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
      <div><div class="form-label">Ano</div><select class="field" style="width:90px" id="ext-yr" onchange="extFiltrar()"><option value="">Todos</option>${anos.map(a=>`<option value="${a}" ${a===curYr?'selected':''}>${a}</option>`).join('')}</select></div>
      <div><div class="form-label">Mês</div><select class="field" style="width:110px" id="ext-mo" onchange="extFiltrar()">${months.map((m,i)=>`<option value="${i===0?'':String(i).padStart(2,'0')}" ${i>0&&String(i).padStart(2,'0')===curMo?'selected':''}>${m}</option>`).join('')}</select></div>
    </div>
    <div id="ext-content">${buildExtrato(rf,df,cpf)}</div>
  </div>`;
}

function buildExtrato(r,d,cpP){
  const tr=r.reduce((s,p)=>s+(+p.valor_pago||0),0);
  const td=d.reduce((s,p)=>s+(+p.valor_pago||0),0)+cpP.reduce((s,x)=>s+(+(x.valor_pago??x.valor)||0),0);
  const s=tr-td;
  return `<div class="split">
    <div style="background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)">
      <div class="colhead green" style="font-size:14px">💚 RECEITAS RECEBIDAS (${r.length})</div>
      <div class="tbl-wrap" style="max-height:400px;overflow-y:auto"><table>
        <thead><tr><th>Tipo</th><th>Vencimento</th><th>Valor</th><th>Pgto</th></tr></thead>
        <tbody>${r.length===0?'<tr><td colspan="4" class="empty"><p>Sem dados</p></td></tr>':r.map(p=>`<tr><td>${esc(p.tipo_nome||p.categoria||'-')}</td><td>${fDate(p.vencimento)}</td><td class="td-mono" style="color:var(--green)">${R$(p.valor_pago)}</td><td>${fDate(p.dt_pagamento)}</td></tr>`).join('')}</tbody>
      </table></div>
    </div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)">
      <div class="colhead red" style="font-size:14px">❤️ DESPESAS PAGAS (${d.length+cpP.length})</div>
      <div class="tbl-wrap" style="max-height:400px;overflow-y:auto"><table>
        <thead><tr><th>Tipo/Categoria</th><th>Vencimento</th><th>Valor</th><th>Pgto</th></tr></thead>
        <tbody>
          ${d.length===0&&cpP.length===0?'<tr><td colspan="4" class="empty"><p>Sem dados</p></td></tr>':[
          ...d.map(p=>`<tr><td>${esc(p.cat_nome||p.categoria||'-')}</td><td>${fDate(p.vencimento)}</td><td class="td-mono" style="color:var(--red)">${R$(p.valor_pago)}</td><td>${fDate(p.dt_pagamento)}</td></tr>`),
          ...cpP.map(p=>`<tr><td><span class="badge b-amber">${esc(p.tipo_despesa||p.categoria||'-')}</span></td><td>${fDate(p.vencimento)}</td><td class="td-mono" style="color:var(--red)">${R$(p.valor_pago??p.valor)}</td><td>${fDate(p.data_pagamento)}</td></tr>`)
          ].join('')}
        </tbody>
      </table></div>
    </div>
  </div>
  <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 16px;display:flex;gap:28px;flex-wrap:wrap;margin-top:4px">
    <div><div class="form-label">Total Receita</div><div style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:var(--green)">${R$(tr)}</div></div>
    <div><div class="form-label">Total Despesa</div><div style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:var(--red)">${R$(td)}</div></div>
    <div><div class="form-label">Saldo</div><div style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:${s>=0?'var(--blue)':'var(--red)'}">${R$(s)}</div></div>
  </div>`;
}

  const yr=document.getElementById('ext-yr').value; const mo=document.getElementById('ext-mo').value;
  const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);
  let r=pr.filter(p=>!!p.dt_pagamento); let d=pd.filter(p=>!!p.dt_pagamento);
  let cpP=cp.filter(p=>p.status==='paid'&&!!p.data_pagamento);
  if(yr){r=r.filter(p=>p.dt_pagamento?.startsWith(yr));d=d.filter(p=>p.dt_pagamento?.startsWith(yr));cpP=cpP.filter(p=>p.data_pagamento?.startsWith(yr));}
  if(mo){r=r.filter(p=>p.dt_pagamento?.slice(5,7)===mo);d=d.filter(p=>p.dt_pagamento?.slice(5,7)===mo);cpP=cpP.filter(p=>p.data_pagamento?.slice(5,7)===mo);}
  document.getElementById('ext-content').innerHTML=buildExtrato(r,d,cpP);
}

    </div>

  if(typeof Chart==='undefined'){const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';s.onload=()=>buildGraf(pr,pd,yr,meses);document.head.appendChild(s);}else buildGraf(pr,pd,yr,meses);

function buildGraf(pr,pd,yr,meses){
  const colors=['#c5151b','#b07a10','#1f9e4a','#0e6eb5','#8b5cf6','#06b6d4'];
  const now=new Date();const mo=String(now.getMonth()+1).padStart(2,'0');
  const despMes=pd.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${mo}`));const dcat={};for(const p of despMes){dcat[p.categoria||'Outros']=(dcat[p.categoria||'Outros']||0)+(+p.valor_pago||0);}
  const recMes=pr.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${mo}`));const rcat={};for(const p of recMes){rcat[p.tipo_nome||'Outros']=(rcat[p.tipo_nome||'Outros']||0)+(+p.valor_pago||0);}
  if(Object.keys(dcat).length>0)new Chart(document.getElementById('g1'),{type:'doughnut',data:{labels:Object.keys(dcat),datasets:[{data:Object.values(dcat),backgroundColor:colors,borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{color:'#5a7080',font:{size:11}}}}}});
  if(Object.keys(rcat).length>0)new Chart(document.getElementById('g2'),{type:'doughnut',data:{labels:Object.keys(rcat),datasets:[{data:Object.values(rcat),backgroundColor:['#1f9e4a','#0e6eb5','#b07a10','#8b5cf6','#c5151b'],borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{color:'#5a7080',font:{size:11}}}}}});
  const recA=meses.map((_,i)=>{const m=String(i+1).padStart(2,'0');return pr.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${m}`)).reduce((s,p)=>s+(+p.valor_pago||0),0);});
  const despA=meses.map((_,i)=>{const m=String(i+1).padStart(2,'0');return pd.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${m}`)).reduce((s,p)=>s+(+p.valor_pago||0),0);});
  new Chart(document.getElementById('g3'),{type:'bar',data:{labels:meses,datasets:[{label:'Receita',data:recA,backgroundColor:'rgba(31,158,74,.75)',borderRadius:4},{label:'Despesa',data:despA,backgroundColor:'rgba(197,21,27,.75)',borderRadius:4}]},options:{responsive:true,scales:{x:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}},y:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}}},plugins:{legend:{labels:{color:'#5a7080'}}}}});
  let acc=0;const flx=recA.map((r,i)=>{acc+=r-despA[i];return acc;});
  new Chart(document.getElementById('g4'),{type:'line',data:{labels:meses,datasets:[{label:'Saldo Acumulado',data:flx,borderColor:'#0e6eb5',backgroundColor:'rgba(14,110,181,.1)',fill:true,tension:.4,borderWidth:2}]},options:{responsive:true,scales:{x:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}},y:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}}},plugins:{legend:{labels:{color:'#5a7080'}}}}});
}

async function salvarEmp(){
  const emp=(await dbGet('empresa'))[0]||{id:1};
  await dbPut('empresa',{...emp,nome:document.getElementById('e-nome').value,cnpj:document.getElementById('e-cnpj').value,email:document.getElementById('e-email').value,telefone:document.getElementById('e-tel').value,endereco:document.getElementById('e-end').value});
  toast('Salvo!','ok');
}

async function renderCadSimpleTable(c,store,title,fields,labels){
  const items=await dbGet(store);
  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;justify-content:flex-end"><button class="btn btn-blue btn-sm" onclick="openCadModal('${store}','${fields.join(',')}','${labels.join(',')}')">＋ Novo</button></div>
    <div class="card"><div class="tbl-wrap"><table>
      <thead><tr>${labels.map(l=>`<th>${l}</th>`).join('')}<th></th></tr></thead>
      <tbody>${items.map(it=>`<tr>${fields.map(f=>`<td>${esc(it[f]||'-')}</td>`).join('')}<td><button class="dotbtn" onclick="excluirCad('${store}',${it.id},()=>swCad(document.querySelector('#cad-tabs .tab.active').dataset.tab))">🗑</button></td></tr>`).join('')}
      </tbody>
    </table></div></div>
  </div>
  <div class="modal" id="cad-modal-${store}">
    <div class="modal-box" style="max-width:420px"><div class="modal-head"><h2>${title}</h2><button class="modal-close" onclick="document.getElementById('cad-modal-${store}').classList.remove('open')">✕</button></div>
    ${fields.map((f,i)=>`<div class="form-group"><label class="form-label">${labels[i]}</label><input class="field" id="cad-f-${store}-${f}" placeholder="${labels[i]}"></div>`).join('')}
    <div class="modal-foot"><button class="btn btn-white" onclick="document.getElementById('cad-modal-${store}').classList.remove('open')">Cancelar</button><button class="btn btn-blue" onclick="saveCadModal('${store}','${fields.join(',')}')">💾 Salvar</button></div>
    </div>
  </div>`;
}

function openCadModal(store,fieldsStr,labelsStr){document.getElementById(`cad-modal-${store}`).classList.add('open');}
async function saveCadModal(store,fieldsStr){
  const fields=fieldsStr.split(',');const obj={ativo:true};
  for(const f of fields) obj[f]=document.getElementById(`cad-f-${store}-${f}`)?.value||'';
  if(!obj.nome){toast('Nome obrigatório!','err');return;}
  await dbAdd(store,obj);
  document.getElementById(`cad-modal-${store}`).classList.remove('open');
  toast('Salvo!','ok');
  swCad(document.querySelector('#cad-tabs .tab.active').dataset.tab);
}

async function renderCadNome(c,store,title){
  const items=await dbGet(store);
  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;gap:8px">
      <input class="field" style="flex:1;max-width:300px" id="cad-n-${store}" placeholder="Nome...">
      <button class="btn btn-blue" onclick="addCadNome('${store}')">＋ Adicionar</button>
    </div>
    <div class="card"><div class="tbl-wrap"><table>
      <thead><tr><th>Nome</th><th></th></tr></thead>
      <tbody>${items.map(it=>`<tr><td>${esc(it.nome)}</td><td><button class="dotbtn" onclick="excluirCad('${store}',${it.id},()=>renderCadNome(document.getElementById('cad-content'),'${store}','${title}'))">🗑</button></td></tr>`).join('')}
      </tbody>
    </table></div></div>
  </div>`;
}
async function addCadNome(store){const nome=document.getElementById(`cad-n-${store}`).value;if(!nome){toast('Nome obrigatório!','err');return;}await dbAdd(store,{nome,ativo:true});document.getElementById(`cad-n-${store}`).value='';toast('Adicionado!','ok');swCad(document.querySelector('#cad-tabs .tab.active').dataset.tab);}

async function addCatDesp(){const nome=document.getElementById('cad-cd-nome').value;const sub=document.getElementById('cad-cd-sub').value;if(!nome){toast('Nome obrigatório!','err');return;}await dbAdd('categorias_despesa',{nome,subcategoria:sub,ativo:true});toast('Adicionado!','ok');renderCadCatDesp(document.getElementById('cad-content'));}

async function excluirCad(store,id,cb){if(!(await confirm2('Excluir?')))return;await dbDelete(store,id);toast('Excluído!','ok');if(cb)cb();}

async function salvarUsuario(){const nome=document.getElementById('u-nome').value;const user=document.getElementById('u-user').value;const pass=document.getElementById('u-pass').value;if(!nome||!user||!pass){toast('Preencha tudo!','err');return;}await dbAdd('usuarios',{nome,username:user,password:pass,perfil:document.getElementById('u-perfil').value,ativo:true});document.getElementById('modal-usr').classList.remove('open');toast('Usuário criado!','ok');pgUsuarios(document.getElementById('content'));}
async function excluirUsuario(id){if(id===currentUser?.id){toast('Não pode excluir o usuário logado!','err');return;}if(!(await confirm2('Excluir usuário?')))return;await dbDelete('usuarios',id);pgUsuarios(document.getElementById('content'));}

const ALL_TABLES=['empresa','usuarios','contas','clientes','fornecedores','formas_pagamento','categorias_receita','categorias_despesa','centros_custo','receitas','parcelas_receita','despesas','parcelas_despesa','poupanca','transferencias','cartao_credito','lancamentos_cartao','contas_pagar'];

async function pgBackup(c){
  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="sec-title">💾 Backup e Restauração</div>
    <div class="g2">
      <div class="card">
        <div class="card-title">📤 Exportar Backup Completo</div>
        <p style="color:var(--muted);font-size:13px;margin-bottom:14px">Exporta todos os dados em JSON, incluindo contas a pagar.</p>
        <button class="btn btn-green" onclick="exportarBackup()">💾 Baixar Backup JSON</button>
      </div>
      <div class="card">
        <div class="card-title">📥 Restaurar Backup</div>
        <p style="color:var(--muted);font-size:13px;margin-bottom:10px"><strong style="color:var(--red)">Atenção: substitui TODOS os dados!</strong></p>
        <div class="form-group"><input type="file" class="field" id="bk-file" accept=".json"></div>
        <button class="btn btn-red" onclick="importarBackup()">⚠️ Restaurar</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📊 Exportar CSV</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-white btn-sm" onclick="exportarCSV('parcelas_receita','receitas')">📥 Receitas</button>
        <button class="btn btn-white btn-sm" onclick="exportarCSV('parcelas_despesa','despesas')">📥 Despesas</button>
        <button class="btn btn-white btn-sm" onclick="exportarCSV('contas_pagar','contas_pagar')">📥 Contas a Pagar</button>
        <button class="btn btn-white btn-sm" onclick="exportarCSV('transferencias','transferencias')">📥 Transferências</button>
      </div>
    </div>
    <div class="card" style="border-color:var(--red)">
      <div class="card-title" style="color:var(--red)">⚠️ Zona de Perigo</div>
      <p style="color:var(--muted);font-size:13px;margin-bottom:10px">Remove todos os lançamentos mantendo cadastros.</p>
      <button class="btn btn-red" onclick="limparTudo()">🗑 Limpar Todos os Lançamentos</button>
    </div>
  </div>`;
}

async function exportarBackup(){
  const bk={};for(const t of ALL_TABLES) bk[t]=await dbGet(t);
  const blob=new Blob([JSON.stringify(bk,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`financeiro_backup_${today()}.json`;a.click();toast('Backup exportado!','ok');
}
async function importarBackup(){
  const file=document.getElementById('bk-file').files[0];if(!file){toast('Selecione um arquivo!','err');return;}
  if(!(await confirm2('ATENÇÃO: Todos os dados serão substituídos!')))return;
  const bk=JSON.parse(await file.text());
  for(const[store,data]of Object.entries(bk)){if(ALL_TABLES.includes(store)){await dbClear(store);for(const it of data)await dbPut(store,it);}}
  toast('Backup restaurado!','ok');setTimeout(()=>location.reload(),1500);
}
async function exportarCSV(store,filename){
  const data=await dbGet(store);if(!data.length){toast('Sem dados','info');return;}
  const h=Object.keys(data[0]);const rows=data.map(r=>h.map(k=>`"${(r[k]??'').toString().replace(/"/g,'""')}"`).join(','));
  const blob=new Blob(['\uFEFF'+[h.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${filename}_${today()}.csv`;a.click();
}
async function limparTudo(){
  if(!(await confirm2('ATENÇÃO: Apagará TODOS os lançamentos! Esta ação não pode ser desfeita!')))return;
  for(const t of['receitas','parcelas_receita','despesas','parcelas_despesa','transferencias','poupanca','lancamentos_cartao','contas_pagar'])await dbClear(t);
  toast('Lançamentos limpos!','ok');go('dashboard');
}

async function init(){
  setupRealtime();
  const sess=sessionStorage.getItem('user');
  if(sess){
    currentUser=JSON.parse(sess);
    document.getElementById('app').style.display='flex';
    document.getElementById('sb-user').textContent=currentUser.nome;
    go('dashboard');
  } else {
    showLogin();
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
