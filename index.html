async function despSalvarForn(){const nome=document.getElementById('dforn-nome').value.trim();if(!nome){toast('Nome obrigatório!','err');return;}const id=await dbAdd('fornecedores',{nome,cpf_cnpj:document.getElementById('dforn-doc').value,telefone:document.getElementById('dforn-tel').value,ativo:true});const sel=document.getElementById('desp-forn');const opt=document.createElement('option');opt.value=id;opt.textContent=nome;opt.selected=true;sel.appendChild(opt);document.getElementById('modal-desp-forn').classList.remove('open');toast('Fornecedor adicionado!','ok');}
function gerarParcelasDesp(){const data1=document.getElementById('desp-data1').value;const valor=parseFloat(document.getElementById('desp-valor').value)||0;const qtde=parseInt(document.getElementById('desp-qtde').value)||1;if(!data1||valor<=0){toast('Preencha data e valor!','err');return;}parcDespTemp=[];for(let i=0;i<qtde;i++)parcDespTemp.push({numero:i+1,total:qtde,vencimento:addMonths(data1,i),valor,quitado:false});document.getElementById('tb-desp-parc').innerHTML=parcDespTemp.map((p,i)=>`<tr><td>${p.numero}/${p.total}</td><td>${fDate(p.vencimento)}</td><td class="mono" style="color:var(--danger)">${R$(p.valor)}</td><td><input type="checkbox" onchange="parcDespTemp[${i}].quitado=this.checked"></td></tr>`).join('');document.getElementById('desp-parcelas-wrap').style.display='block';document.getElementById('desp-total-lbl').value=`${R$(valor)} × ${qtde} = ${R$(valor*qtde)}`;toast(`${qtde} parcela(s)!`,'ok');}
async function salvarDespesa(){
  const editId=window._despEditId;
  const isEdit=!!editId;
  if(parcDespTemp.length===0){toast('Gere as parcelas!','err');return;}
  const _empDesp=document.getElementById('desp-emp')?.value||'';
  if(!['DL','MG'].includes(_empDesp)){toast('Selecione DL ou MG no campo Empresa!','err');return;}
  const valor=parseFloat(document.getElementById('desp-valor').value)||0;
  const qtde=parseInt(document.getElementById('desp-qtde').value)||1;
  if(valor<=0){toast('Informe o valor!','err');return;}
  try{
    const [cats,contas,forns,formas]=await Promise.all([
      dbGet('categorias_despesa'),dbGet('contas'),dbGet('fornecedores'),dbGet('formas_pagamento')
    ]);
    const emp=document.getElementById('desp-emp').value;
    const catId=parseInt(document.getElementById('desp-cat').value)||0;
    const contaId=parseInt(document.getElementById('desp-conta').value)||0;
    const fornId=parseInt(document.getElementById('desp-forn').value)||0;
    const formaId=parseInt(document.getElementById('desp-forma').value)||0;
    const cat=cats.find(c=>c.id===catId);const conta=contas.find(c=>c.id===contaId);
    const forn=forns.find(f=>f.id===fornId);const forma=formas.find(f=>f.id===formaId);
    const descricao=document.getElementById('desp-desc').value||'';
    const data_primeira=document.getElementById('desp-data1').value||today();
    const situacao=document.getElementById('desp-situacao').value;
    const dataPagamentoSel=document.getElementById('desp-dt-pago').value||data_primeira;

    // Salva cabeçalho em 'despesas' com colunas disponíveis
    let despId=editId||null;
    const despObj={empresa:emp,data_lancamento:today(),data_emissao:today(),descricao,data_primeira,valor_parcela:valor,qtde_parcelas:qtde,valor_total:valor*qtde,quitado:parcDespTemp.every(p=>p.quitado)};
    const colsD=await dbColunas('despesas');
    // empresa sempre mantida — nunca deletar
    if(colsD.has('conta_id'))despObj.conta_id=contaId||null;
    if(colsD.has('conta_nome'))despObj.conta_nome=conta?.nome||'';
    if(colsD.has('cat_id'))despObj.cat_id=catId||null;
    if(colsD.has('cat_nome'))despObj.cat_nome=cat?.nome||'Despesa';
    if(colsD.has('subcat'))despObj.subcat=cat?.subcategoria||'';
    if(colsD.has('forn_id'))despObj.forn_id=fornId||null;
    if(colsD.has('forn_nome'))despObj.forn_nome=forn?.nome||'';
    if(colsD.has('forma_id'))despObj.forma_id=formaId||null;
    if(colsD.has('forma_nome'))despObj.forma_nome=forma?.nome||'';
    try{
      if(editId){
        await dbSafeUpdate('despesas',despObj,'id',editId);
        despId=editId;
        await supa.from('parcelas_despesa').delete().eq('despesa_id',editId);
        await supa.from('contas_pagar').delete().eq('origem_tipo','despesas').eq('origem_id',editId);
      } else {
        despId=await dbAdd('despesas',despObj);
      }
    }
    catch(e2){
      console.error('despesas insert error:',e2.message);
      // Se falhou completamente, não continua com ID falso
      throw new Error('Erro ao salvar despesa: '+(e2.message||String(e2)));
    }

    // Salva parcelas — dbAdd remove automaticamente colunas inexistentes
    for(const p of parcDespTemp){
      const pagoAgora=(situacao==='pago')||!!p.quitado;
      const dtPgto=pagoAgora?(dataPagamentoSel||p.vencimento):null;
      const parcObj={
        numero:p.numero,total:p.total,vencimento:p.vencimento,valor:p.valor,
        dt_pagamento:dtPgto,valor_pago:pagoAgora?p.valor:0,
        empresa:emp,despesa_id:despId,
        forma_id:formaId||null,forma_nome:forma?.nome||'',
        conta_id:contaId||null,conta_nome:conta?.nome||'',
        cat_nome:cat?.nome||'',forn_nome:forn?.nome||'',
        descricao,categoria:cat?.nome||'',natureza:'DESP_OPERACIONAL'
      };
      await dbAdd('parcelas_despesa',parcObj);

      // Contas a pagar passa a ser sincronizado centralmente para evitar duplicação/fantasmas
    }
    // FIX-PERF: sync rápido apenas para esta despesa, depois render sem await
    document.getElementById('modal-desp').classList.remove('open');
    confirmarSalvo(
      `Despesa ${isEdit?'atualizada':'salva'} com sucesso!`,
      `${empLabel(emp)} · ${forn?.nome||''} · ${R$(valor*qtde)}`
    );
    pgDespesas(document.getElementById('content'));
  }catch(e){
    console.error('salvarDespesa error:',e);
    toast('Erro: '+(e.message||JSON.stringify(e)),'err');
  }
}
async function excluirDespesa(id){if(!(await confirm2('Excluir?')))return;try{await supa.from('parcelas_despesa').delete().eq('despesa_id',id);const colsCP=await dbColunas('contas_pagar');let q=supa.from('contas_pagar').delete();if(colsCP.has('origem_tipo'))q=q.eq('origem_tipo','despesas');if(colsCP.has('origem_id'))q=q.eq('origem_id',id);await q;await dbDel('despesas',id);toast('Despesa excluída!','ok');await pgDespesas(document.getElementById('content'));}catch(e){toast('Erro ao excluir: '+(e.message||String(e)),'err');}}

function cartaoLancar(id,nome){document.getElementById('cc-cartao-id').value=id;document.getElementById('cc-nome-modal').textContent=nome;document.getElementById('cc-data').value=today();document.getElementById('cc-desc').value='';document.getElementById('cc-cat').value='';document.getElementById('cc-val').value='';document.getElementById('cc-parc').value='1';document.getElementById('modal-cc-lanc').classList.add('open');}
async function salvarLancCC(){const cartaoId=parseInt(document.getElementById('cc-cartao-id').value);const data=document.getElementById('cc-data').value;const desc=document.getElementById('cc-desc').value.trim();const val=parseFloat(document.getElementById('cc-val').value);const parc=parseInt(document.getElementById('cc-parc').value)||1;const cat=document.getElementById('cc-cat').value;const emp=document.getElementById('cc-emp').value;if(!desc||!val){toast('Preencha!','err');return;}
  try{for(let i=0;i<parc;i++)await dbAdd('lancamentos_cartao',{cartao_id:cartaoId,empresa:emp,data:addMonths(data,i),descricao:desc,categoria:cat,valor:val/parc,parcela_atual:i+1,qtde_parcelas:parc});document.getElementById('modal-cc-lanc').classList.remove('open');confirmarSalvo(`${parc} parcela(s) lançada(s)!`,`${desc} · ${R$(val)}`);pgCartao(document.getElementById('content'));

async function cartaoVerFatura(cartaoId,nome){const lancs=await dbGet('lancamentos_cartao');const cart=await dbGet('cartao_credito',cartaoId);const now=new Date();const mes=String(now.getMonth()+1).padStart(2,'0');const ano=now.getFullYear();const lancMes=lancs.filter(l=>l.cartao_id===cartaoId&&l.data?.startsWith(`${ano}-${mes}`));const total=lancMes.reduce((s,l)=>s+(+l.valor||0),0);printReport(`<p><strong>Período:</strong> ${mes}/${ano} · <strong>Fechamento:</strong> Dia ${cart?.dia_fechamento} · <strong>Vencimento:</strong> Dia ${cart?.dia_vencimento}</p><table><thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Parcelas</th><th>Valor</th></tr></thead><tbody>${lancMes.map(l=>`<tr><td>${fDate(l.data)}</td><td>${esc(l.descricao)}</td><td>${esc(l.categoria||'-')}</td><td>${l.parcela_atual||1}/${l.qtde_parcelas||1}</td><td class="red">${R$(l.valor)}</td></tr>`).join('')}<tr class="total-row"><td colspan="4"><strong>TOTAL</strong></td><td class="red"><strong>${R$(total)}</strong></td></tr></tbody></table>`,`FATURA ${nome.toUpperCase()} — ${mes}/${ano}`);}
async function cartaoFecharFatura(cartaoId,nome,diaFech,diaVenc){const now=new Date();const mes=String(now.getMonth()+1).padStart(2,'0');const ano=now.getFullYear();const lancs=await dbGet('lancamentos_cartao');const lancMes=lancs.filter(l=>l.cartao_id===cartaoId&&l.data?.startsWith(`${ano}-${mes}`));const total=lancMes.reduce((s,l)=>s+(+l.valor||0),0);if(total<=0){toast('Fatura zerada, nada a fechar','info');return;}if(!(await confirm2(`Fechar fatura de ${nome}: ${R$(total)}?`)))return;const cart=await dbGet('cartao_credito',cartaoId);const mesVenc=now.getMonth()===11?1:now.getMonth()+2;const anoVenc=now.getMonth()===11?ano+1:ano;const dataVenc=`${anoVenc}-${String(mesVenc).padStart(2,'0')}-${String(diaVenc||10).padStart(2,'0')}`;await supa.from('contas_pagar').insert({empresa:cart?.empresa||'DL',data_lanc:today(),tipo_despesa:'CARTÃO DE CRÉDITO',fornecedor:nome,parcela:'1/1',vencimento:dataVenc,valor:total,descricao_adicional:`Fatura ${mes}/${ano} — ${lancMes.length} lançamentos`,forma_pagamento:'Débito em conta',categoria:'CARTÃO',status:'open',cartao_id:cartaoId,fatura_mes:`${ano}-${mes}`});toast(`Fatura de ${R$(total)} lançada! Vence ${fDate(dataVenc)}`,'ok');pgCartao(document.getElementById('content'));}
async function cartaoFecharFaturas(){const cartoes=await dbGet('cartao_credito');const now=new Date();const mes=String(now.getMonth()+1).padStart(2,'0');const ano=now.getFullYear();const lancs=await dbGet('lancamentos_cartao');let count=0;for(const cart of cartoes){const lancMes=lancs.filter(l=>l.cartao_id===cart.id&&l.data?.startsWith(`${ano}-${mes}`));const total=lancMes.reduce((s,l)=>s+(+l.valor||0),0);if(total<=0)continue;const{data:jpfechada}=await supa.from('contas_pagar').select('id').eq('cartao_id',cart.id).eq('fatura_mes',`${ano}-${mes}`).limit(1);if(jpfechada&&jpfechada.length>0)continue;const mesVenc=now.getMonth()===11?1:now.getMonth()+2;const anoVenc=now.getMonth()===11?ano+1:ano;const dataVenc=`${anoVenc}-${String(mesVenc).padStart(2,'0')}-${String(cart.dia_vencimento||10).padStart(2,'0')}`;await supa.from('contas_pagar').insert({empresa:cart.empresa||'DL',data_lanc:today(),tipo_despesa:'CARTÃO DE CRÉDITO',fornecedor:cart.nome,parcela:'1/1',vencimento:dataVenc,valor:total,descricao_adicional:`Fatura ${mes}/${ano}`,forma_pagamento:'Débito em conta',categoria:'CARTÃO',status:'open',cartao_id:cart.id,fatura_mes:`${ano}-${mes}`});count++;}if(count>0)toast(`${count} fatura(s) lançada(s)!`,'ok');else toast('Nenhuma fatura nova para fechar','info');pgCartao(document.getElementById('content'));}
async function excluirLancCC(id){if(!(await confirm2('Excluir?')))return;await dbDel('lancamentos_cartao',id);pgCartao(document.getElementById('content'));}

async function pgExtrato(c){
  const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);
  const now=new Date();const curYr=String(now.getFullYear());const curMo=String(now.getMonth()+1).padStart(2,'0');
  const anos=[...new Set([...pr,...pd,...cp].map(p=>(p.dt_pagamento||p.data_pagamento)?.slice(0,4)).filter(Boolean))].sort().reverse();
  const months=['Todos','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const filt=(yr,mo)=>{let r=empFilter(pr,'empresa').filter(p=>!!p.dt_pagamento);let d=empFilter(pd,'empresa').filter(p=>!!p.dt_pagamento);let cpP=empFilter(cp,'empresa').filter(p=>p.status==='paid'&&!!p.data_pagamento);if(yr){r=r.filter(p=>p.dt_pagamento?.startsWith(yr));d=d.filter(p=>p.dt_pagamento?.startsWith(yr));cpP=cpP.filter(p=>p.data_pagamento?.startsWith(yr));}if(mo){r=r.filter(p=>p.dt_pagamento?.slice(5,7)===mo);d=d.filter(p=>p.dt_pagamento?.slice(5,7)===mo);cpP=cpP.filter(p=>p.data_pagamento?.slice(5,7)===mo);}return[r,d,cpP];};
  const [rf,df,cpf]=filt(curYr,curMo);
  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="page-title">📋 Extrato Comparativo</div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
      <div><div class="form-label">Ano</div><select class="field" style="width:88px" id="ext-yr" onchange="extFilt()"><option value="">Todos</option>${anos.map(a=>`<option value="${a}" ${a===curYr?'selected':''}>${a}</option>`).join('')}</select></div>
      <div><div class="form-label">Mês</div><select class="field" style="width:100px" id="ext-mo" onchange="extFilt()">${months.map((m,i)=>`<option value="${i===0?'':String(i).padStart(2,'0')}" ${i>0&&String(i).padStart(2,'0')===curMo?'selected':''}>${m}</option>`).join('')}</select></div>
    </div>
    <div id="ext-body">${buildExtrato(rf,df,cpf)}</div>
  </div>`;
}
function buildExtrato(r,d,cpP){const tr=r.reduce((s,p)=>s+(+p.valor_pago||0),0);const td=d.reduce((s,p)=>s+(+p.valor_pago||0),0)+cpP.reduce((s,x)=>s+(+(x.valor_pago!=null?x.valor_pago:(x.valor||0))),0);const s=tr-td;return`<div class="grid g2"><div style="background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)"><div class="col-head col-green">💚 RECEITAS (${r.length})</div><div class="tbl-wrap" style="max-height:380px;overflow-y:auto"><table><thead><tr><th>Emp</th><th>Tipo</th><th>Vencimento</th><th>Valor</th><th>Pgto</th></tr></thead><tbody>${r.length===0?'<tr><td colspan="5" class="empty"><p>Sem dados</p></td></tr>':r.map(p=>`<tr><td>${empTag(p.empresa)}</td><td>${esc(p.tipo_nome||p.categoria||'-')}</td><td>${fDate(p.vencimento)}</td><td class="mono" style="color:var(--success)">${R$(p.valor_pago)}</td><td>${fDate(p.dt_pagamento)}</td></tr>`).join('')}</tbody></table></div></div><div style="background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)"><div class="col-head col-red">❤️ DESPESAS (${d.length+cpP.length})</div><div class="tbl-wrap" style="max-height:380px;overflow-y:auto"><table><thead><tr><th>Emp</th><th>Tipo</th><th>Vencimento</th><th>Valor</th><th>Pgto</th></tr></thead><tbody>${d.length===0&&cpP.length===0?'<tr><td colspan="5" class="empty"><p>Sem dados</p></td></tr>':[...d.map(p=>`<tr><td>${empTag(p.empresa)}</td><td>${esc(p.cat_nome||p.categoria||'-')}</td><td>${fDate(p.vencimento)}</td><td class="mono" style="color:var(--danger)">${R$(p.valor_pago)}</td><td>${fDate(p.dt_pagamento)}</td></tr>`),...cpP.map(p=>`<tr><td>${empTag(p.empresa)}</td><td><span class="badge b-amber">${esc(p.tipo_despesa||p.categoria||'-')}</span></td><td>${fDate(p.vencimento)}</td><td class="mono" style="color:var(--danger)">${R$(p.valor_pago??p.valor)}</td><td>${fDate(p.data_pagamento)}</td></tr>`)].join('')}</tbody></table></div></div></div><div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 16px;display:flex;gap:24px;flex-wrap:wrap;margin-top:10px"><div><div class="form-label">Total Receita</div><div style="font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--success)">${R$(tr)}</div></div><div><div class="form-label">Total Despesa</div><div style="font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--danger)">${R$(td)}</div></div><div><div class="form-label">Saldo</div><div style="font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${s>=0?'var(--info)':'var(--danger)'}">${R$(s)}</div></div></div>`;}
async function extFilt(){const yr=document.getElementById('ext-yr').value;const mo=document.getElementById('ext-mo').value;const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);let r=empFilter(pr,'empresa').filter(p=>!!p.dt_pagamento);let d=empFilter(pd,'empresa').filter(p=>!!p.dt_pagamento);let cpP=empFilter(cp,'empresa').filter(p=>p.status==='paid'&&!!p.data_pagamento);if(yr){r=r.filter(p=>p.dt_pagamento?.startsWith(yr));d=d.filter(p=>p.dt_pagamento?.startsWith(yr));cpP=cpP.filter(p=>p.data_pagamento?.startsWith(yr));}if(mo){r=r.filter(p=>p.dt_pagamento?.slice(5,7)===mo);d=d.filter(p=>p.dt_pagamento?.slice(5,7)===mo);cpP=cpP.filter(p=>p.data_pagamento?.slice(5,7)===mo);}document.getElementById('ext-body').innerHTML=buildExtrato(r,d,cpP);}

  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="sec-head"><div class="page-title">🔄 Transferências</div><button class="btn info small" onclick="document.getElementById('modal-transf').classList.add('open')">＋ Nova</button></div>
    <div class="card"><div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Origem</th><th>Destino</th><th>Valor</th><th>Descrição</th><th></th></tr></thead>
    <tbody>${transf.length===0?'<tr><td colspan="8" class="empty"><p>Nenhuma</p></td></tr>':transf.slice().reverse().map(t=>`<tr><td>${fDate(t.data)}</td><td>${esc(t.conta_origem_nome)}</td><td>${esc(t.conta_destino_nome)}</td><td class="mono" style="color:var(--info)">${R$(t.valor)}</td><td>${esc(t.descricao||'-')}</td><td><button class="btn danger xs" onclick="excluirTransf(${t.id})">🗑</button></td></tr>`).join('')}</tbody></table></div></div>
  </div>
  <div class="modal" id="modal-transf"><div class="modal-box sm"><div class="modal-head"><h3>🔄 Nova Transferência</h3><button class="close-x" onclick="document.getElementById('modal-transf').classList.remove('open')">✕</button></div>
    <div class="form-group"><label class="form-label">Data</label><input type="date" class="field" id="tr-data" value="${today()}"></div>
    <div class="form-group"><label class="form-label">Conta Origem</label><select class="field" id="tr-orig">${contas.filter(c=>c.ativo).map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Conta Destino</label><select class="field" id="tr-dest">${contas.filter(c=>c.ativo).map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Valor</label><input type="number" step="0.01" class="field" id="tr-val"></div>
    <div class="form-group"><label class="form-label">Descrição</label><input class="field" id="tr-desc"></div>
    <div class="modal-foot"><button class="btn secondary" onclick="document.getElementById('modal-transf').classList.remove('open')">Cancelar</button><button class="btn info" onclick="salvarTransf()">💾 Salvar</button></div>
  </div></div>`;
}
async function salvarTransf(){
  const data=document.getElementById('tr-data').value;
  const oi=parseInt(document.getElementById('tr-orig').value);
  const di=parseInt(document.getElementById('tr-dest').value);
  const val=parseFloat(document.getElementById('tr-val').value);
  if(!data||!val||oi===di){toast('Verifique os campos! Origem ≠ Destino','err');return;}
  try{
    const c=await dbGet('contas');
    const o=c.find(x=>x.id===oi);const d2=c.find(x=>x.id===di);
    await dbAdd('transferencias',{data,conta_origem_id:oi,conta_origem_nome:o?.nome||'',conta_destino_id:di,conta_destino_nome:d2?.nome||'',valor:val,descricao:document.getElementById('tr-desc').value||''});
    document.getElementById('modal-transf').classList.remove('open');
    confirmarSalvo('Transferência registrada!',`${R$(val)} · ${o?.nome||''} → ${d2?.nome||''}`);
    pgTransferencias(document.getElementById('content'));
  }catch(e){toast('Erro: '+(e.message||String(e)),'err');}
}
async function excluirTransf(id){if(!(await confirm2('Excluir?')))return;await dbDel('transferencias',id);pgTransferencias(document.getElementById('content'));}

async function pgPoupanca(c){
  const movs=empFilter(await dbGet('poupanca'),'empresa');
  const cred=movs.filter(m=>m.tipo==='CREDITO').reduce((s,m)=>s+(+m.valor||0),0);
  const deb=movs.filter(m=>m.tipo==='DEBITO').reduce((s,m)=>s+(+m.valor||0),0);
  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="sec-head"><div class="page-title">🏦 Poupança/Reserva</div><button class="btn info small" onclick="document.getElementById('modal-poupa').classList.add('open')">＋ Novo Lançamento</button></div>
    <div class="grid g3">
      <div class="kpi success"><div class="label">Total Crédito</div><div class="value">${R$(cred)}</div></div>
      <div class="kpi danger"><div class="label">Total Débito</div><div class="value">${R$(deb)}</div></div>
      <div class="kpi info"><div class="label">Saldo Total</div><div class="value">${R$(cred-deb)}</div></div>
    </div>
    <div class="card"><div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Empresa</th><th>Tipo</th><th>Descrição</th><th>Valor</th><th></th></tr></thead>
    <tbody>${movs.length===0?'<tr><td colspan="6" class="empty"><p>Sem lançamentos</p></td></tr>':movs.slice().reverse().map(m=>`<tr><td>${fDate(m.data)}</td><td>${empTag(m.empresa)}</td><td><span class="badge ${m.tipo==='CREDITO'?'b-green':'b-red'}">${m.tipo}</span></td><td>${esc(m.descricao)}</td><td class="mono" style="color:${m.tipo==='CREDITO'?'var(--success)':'var(--danger)'}">${m.tipo==='DEBITO'?'-':''}${R$(m.valor)}</td><td><button class="btn danger xs" onclick="excluirPoupa(${m.id})">🗑</button></td></tr>`).join('')}</tbody></table></div></div>
  </div>
  <div class="modal" id="modal-poupa"><div class="modal-box sm"><div class="modal-head"><h3>🏦 Lançamento Poupança</h3><button class="close-x" onclick="document.getElementById('modal-poupa').classList.remove('open')">✕</button></div>
    <div class="form-group"><label class="form-label">Empresa</label><select class="field" id="p-emp"><option value="DL">DUARTE LACERDA</option><option value="MG">MINEIRINHO</option></select></div>
    <div class="form-group"><label class="form-label">Data</label><input type="date" class="field" id="p-data" value="${today()}"></div>
    <div class="form-group"><label class="form-label">Tipo</label><select class="field" id="p-tipo"><option value="CREDITO">CRÉDITO (Depósito)</option><option value="DEBITO">DÉBITO (Saque)</option></select></div>
    <div class="form-group"><label class="form-label">Descrição</label><input class="field" id="p-desc"></div>
    <div class="form-group"><label class="form-label">Valor</label><input type="number" step="0.01" class="field" id="p-val"></div>
    <div class="modal-foot"><button class="btn secondary" onclick="document.getElementById('modal-poupa').classList.remove('open')">Cancelar</button><button class="btn info" onclick="salvarPoupa()">💾 Salvar</button></div>
  </div></div>`;
}
async function salvarPoupa(){
  const emp=document.getElementById('p-emp').value;
  const data=document.getElementById('p-data').value;
  const tipo=document.getElementById('p-tipo').value;
  const desc=document.getElementById('p-desc').value;
  const val=parseFloat(document.getElementById('p-val').value);
  if(!data||!val){toast('Preencha data e valor!','err');return;}
  try{
    await dbAdd('poupanca',{empresa:emp,data,tipo,descricao:desc||'',valor:val});
    document.getElementById('modal-poupa').classList.remove('open');
    confirmarSalvo('Lançamento salvo!',`${empLabel(emp)} · ${tipo==='CREDITO'?'Crédito':'Débito'} · ${R$(val)}`);
    pgPoupanca(document.getElementById('content'));
  }catch(e){toast('Erro: '+(e.message||String(e)),'err');}
}
async function excluirPoupa(id){if(!(await confirm2('Excluir?')))return;await dbDel('poupanca',id);pgPoupanca(document.getElementById('content'));}

async function concProcessar(){const file=document.getElementById('conc-file').files[0];if(!file){toast('Selecione um CSV!','err');return;}const di=document.getElementById('conc-di').value;const df=document.getElementById('conc-df').value;const emp=document.getElementById('conc-emp').value;const text=await file.text();const lines=text.split('\n').filter(l=>l.trim());concExtrato=[];for(const line of lines.slice(1)){const parts=line.split(',');if(parts.length>=3){const valor=parseFloat(parts[2]?.replace(/[^0-9.,-]/g,'').replace(',','.'));if(!isNaN(valor))concExtrato.push({data:parts[0]?.trim(),descricao:parts[1]?.trim(),valor});}}if(concExtrato.length===0){toast('Nenhum dado no CSV','err');return;}const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);concLinhas=[...pr.filter(p=>p.dt_pagamento>=di&&p.dt_pagamento<=df&&(p.empresa||'DL')===emp).map(p=>({id:p.id,tipo:'receita',data:p.dt_pagamento,desc:p.tipo_nome||'Receita',valor:+(p.valor_pago||0)})),...pd.filter(p=>p.dt_pagamento>=di&&p.dt_pagamento<=df&&(p.empresa||'DL')===emp).map(p=>({id:p.id,tipo:'despesa',data:p.dt_pagamento,desc:p.cat_nome||'Despesa',valor:-(+(p.valor_pago||0))})),...cp.filter(p=>p.data_pagamento>=di&&p.data_pagamento<=df&&(p.empresa||'DL')===emp&&p.status==='paid').map(p=>({id:p.id,tipo:'cp',data:p.data_pagamento,desc:p.fornecedor||'Despesa',valor:-(+(p.valor_pago||p.valor||0))}))];const totalExt=concExtrato.reduce((s,e)=>s+e.valor,0);const totalSist=concLinhas.reduce((s,l)=>s+l.valor,0);document.getElementById('conc-resultado').innerHTML=`<div class="card"><div class="section-title">Resultado</div><div style="display:flex;gap:20px;flex-wrap:wrap"><div><div class="form-label">Total Extrato</div><div style="font-size:18px;font-weight:800;color:var(--info)">${R$(totalExt)}</div></div><div><div class="form-label">Total Sistema</div><div style="font-size:18px;font-weight:800;color:var(--info)">${R$(totalSist)}</div></div><div><div class="form-label">Diferença</div><div style="font-size:18px;font-weight:800;color:${Math.abs(totalExt-totalSist)<0.02?'var(--success)':'var(--danger)'}">${R$(totalExt-totalSist)}</div></div></div></div>`;}

async function relRecDesp(){relModal('📊 Rec × Desp',async(di,df)=>{const pr=empFilter(await dbGet('parcelas_receita'),'empresa').filter(p=>p.dt_pagamento>=di&&p.dt_pagamento<=df);const pd=empFilter(await dbGet('parcelas_despesa'),'empresa').filter(p=>p.dt_pagamento>=di&&p.dt_pagamento<=df);const cp=empFilter(await dbGet('contas_pagar'),'empresa').filter(p=>p.data_pagamento>=di&&p.data_pagamento<=df&&p.status==='paid');const tr=pr.reduce((s,p)=>s+(+p.valor_pago||0),0);const td=pd.reduce((s,p)=>s+(+p.valor_pago||0),0)+cp.reduce((s,r)=>s+(+(r.valor_pago!=null?r.valor_pago:(r.valor||0))),0);printReport(`<p><strong>Receitas:</strong> ${R$(tr)} · <strong>Despesas:</strong> ${R$(td)} · <strong>Saldo:</strong> ${R$(tr-td)}</p>`,`Rec × Desp — ${di} a ${df}`);});}

async function relComparativo(){const now=new Date();const yr=now.getFullYear();const mo=String(now.getMonth()+1).padStart(2,'0');const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);const calc=(emp)=>{const fpr=pr.filter(p=>(p.empresa||'DL')===emp&&p.dt_pagamento?.startsWith(`${yr}-${mo}`));const fpd=pd.filter(p=>(p.empresa||'DL')===emp&&p.dt_pagamento?.startsWith(`${yr}-${mo}`));const fcp=cp.filter(p=>(p.empresa||'DL')===emp&&p.data_pagamento?.startsWith(`${yr}-${mo}`)&&p.status==='paid');const r=fpr.reduce((s,p)=>s+(+p.valor_pago||0),0);const d=fpd.reduce((s,p)=>s+(+p.valor_pago||0),0)+fcp.reduce((s,x)=>s+(+(x.valor_pago!=null?x.valor_pago:(x.valor||0))),0);return{r,d,s:r-d};};const dl=calc('DL');const mg=calc('MG');printReport(`<table><thead><tr><th>Empresa</th><th>Receitas</th><th>Despesas</th><th>Saldo</th></tr></thead><tbody><tr><td><strong>${EMP_LABELS['DL']||'DL'}</strong></td><td class="green">${R$(dl.r)}</td><td class="red">${R$(dl.d)}</td><td class="${dl.s>=0?'green':'red'}">${R$(dl.s)}</td></tr><tr><td><strong>${EMP_LABELS['MG']||'MG'}</strong></td><td class="green">${R$(mg.r)}</td><td class="red">${R$(mg.d)}</td><td class="${mg.s>=0?'green':'red'}">${R$(mg.s)}</td></tr><tr class="total-row"><td>CONSOLIDADO</td><td class="green">${R$(dl.r+mg.r)}</td><td class="red">${R$(dl.d+mg.d)}</td><td class="${(dl.s+mg.s)>=0?'green':'red'}">${R$(dl.s+mg.s)}</td></tr></tbody></table>`,`Comparativo DL × MG — ${mo}/${yr}`);}
async function relCartoes(){const [cartoes,lancs]=await Promise.all([dbGet('cartao_credito'),dbGet('lancamentos_cartao')]);const now=new Date();const mes=String(now.getMonth()+1).padStart(2,'0');const ano=now.getFullYear();let html='';let grand=0;for(const cart of cartoes){const lm=lancs.filter(l=>l.cartao_id===cart.id&&l.data?.startsWith(`${ano}-${mes}`));const tot=lm.reduce((s,l)=>s+(+l.valor||0),0);grand+=tot;html+=`<h3 style="font-size:14px;margin:10px 0 5px">${cart.nome} — ${cart.empresa||'DL'} — Vence Dia ${cart.dia_vencimento}</h3><table><thead><tr><th>Data</th><th>Descrição</th><th>Parcelas</th><th>Valor</th></tr></thead><tbody>${lm.map(l=>`<tr><td>${fDate(l.data)}</td><td>${esc(l.descricao)}</td><td>${l.parcela_atual||1}/${l.qtde_parcelas||1}</td><td class="red">${R$(l.valor)}</td></tr>`).join('')}<tr class="total-row"><td colspan="3">Total ${cart.nome}</td><td class="red">${R$(tot)}</td></tr></tbody></table>`;}html+=`<h3>TOTAL GERAL: ${R$(grand)}</h3>`;printReport(html,`Faturas Cartões — ${mes}/${ano}`);}

async function cadSalvarEmpLabel(emp){

    const rows=await dbGet('config_sistema');

    const ex=(rows||[]).find(function(r){return r.chave===chave;});

// ── Parser XML ──
function parseNFe(xmlStr){
  const parser=new DOMParser();
  const doc=parser.parseFromString(xmlStr,'text/xml');
  const get=(sel,base)=>{const el=(base||doc).querySelector(sel);return el?el.textContent.trim():'';};
  const getF=(sel,base)=>parseFloat(get(sel,base)||'0')||0;
  const isNFSe=doc.querySelector('CompNfse,nfse,RPS,InfNfse,Nfse')!==null;
  const isCTe=doc.querySelector('CTe,cteProc,infCte')!==null;
  const tipo=isCTe?'CTe':isNFSe?'NFSe':'NFe';
  let inf=doc.querySelector('infNFe,infCte')||doc;
  // NFSe uses different structure
  const infNFSe=isNFSe?(doc.querySelector('InfNfse,Nfse')||doc):null;
  const base=infNFSe||inf;
  const numero=get('nNF,nCT',inf)||get('Numero,NumeroNfse',base)||'';
  const serie=get('serie',inf)||'';
  const rawDate=get('dhEmi,dEmi',inf)||get('DataEmissao',base)||'';
  const data_emissao=rawDate.slice(0,10);
  const natureza=get('natOp',inf)||get('DiscriminacaoServicos,ItemListaServico',base)||'';
  const emit_cnpj=get('emit CNPJ',inf)||get('PrestadorServico Cnpj',base)||get('CpfCnpj Cnpj',base)||'';
  const emit_nome=get('emit xNome',inf)||get('PrestadorServico RazaoSocial',base)||'';
  const emit_uf=get('emit enderEmit UF',inf)||'';
  const dest_cnpj=get('dest CNPJ',inf)||get('dest CPF',inf)||get('TomadorServico CpfCnpj Cnpj',base)||'';
  const dest_nome=get('dest xNome',inf)||get('TomadorServico RazaoSocial',base)||'';
  const vProd=getF('vProd',inf)||0;
  const vFrete=getF('vFrete,vTPrest',inf)||0;
  const vDesc=getF('vDesc',inf)||0;
  const vTotal=getF('vNF',inf)||getF('vTPrest',inf)||getF('ValorLiquidoNfse,ValorServicos',base)||0;
  const vBC=getF('vBC',inf)||0;
  const vICMS=getF('vICMS',inf)||0;
  const vIPI=getF('vIPI',inf)||0;
  const vPIS=getF('vPIS',inf)||getF('ValorPis',base)||0;
  const vCOFINS=getF('vCOFINS',inf)||getF('ValorCofins',base)||0;
  const vISS=getF('ValorIss',base)||0;
  const vIR=getF('ValorIr',base)||0;
  const vCSLL=getF('ValorCsll',base)||0;
  const chave=(doc.querySelector('[Id]')?.getAttribute('Id')||'').replace(/^NFe|^CTe/,'').slice(0,44)||get('chNFe',doc)||'';
  const itens=Array.from(doc.querySelectorAll('det')).map((det,i)=>({
    numero_item:parseInt(det.getAttribute('nItem')||i+1),
    codigo_produto:get('cProd',det),descricao:get('xProd',det),
    ncm:get('NCM',det),cfop:get('CFOP',det),unidade:get('uCom',det),
    quantidade:getF('qCom',det),valor_unitario:getF('vUnCom',det),
    valor_total:getF('vProd',det),base_icms:getF('vBC',det),
    aliquota_icms:getF('pICMS',det),valor_icms:getF('vICMS',det),
  }));
  return{tipo,numero,serie,data_emissao,natureza_operacao:natureza,
    emitente_cnpj:emit_cnpj,emitente_razao:emit_nome,emitente_uf:emit_uf,
    destinatario_cnpj:dest_cnpj,destinatario_razao:dest_nome,
    valor_produtos:vProd,valor_frete:vFrete,valor_desconto:vDesc,valor_total:vTotal,
    base_icms:vBC,valor_icms:vICMS,valor_ipi:vIPI,valor_pis:vPIS,
    valor_cofins:vCOFINS,valor_iss:vISS,valor_ir:vIR,valor_csll:vCSLL,
    chave_acesso:chave,itens,raw:xmlStr,
    mes_competencia:data_emissao.slice(0,7)||today().slice(0,7),
    natureza_contabil:tipo==='CTe'?'IMPORTACAO':tipo==='NFSe'?'DESP_OPERACIONAL':'DESP_OPERACIONAL'};
}

function nfRenderTabela(notas){
  if(!notas||notas.length===0)return'<div class="card"><div class="empty"><div class="ei">🔍</div><p>Nenhuma nota encontrada</p></div></div>';

  // Group by month
  const porMes={};
  notas.forEach(n=>{const m=n.mes_competencia||'Sem data';if(!porMes[m])porMes[m]=[];porMes[m].push(n);});
  const meses=Object.keys(porMes).sort().reverse();

  const tipoIcon={NFe:'🛒',NFSe:'🔧',CTe:'🚚'};
  const tipoBadge={NFe:'b-blue',NFSe:'b-green',CTe:'b-amber'};
  const tipoLabel={NFe:'NF-e Compra',NFSe:'NFS-e Serviço',CTe:'CT-e Frete'};

  return meses.map(mes=>{
    const mNotas=porMes[mes];
    const totMes=mNotas.reduce((s,n)=>s+(+n.valor_total||0),0);
    const icmsMes=mNotas.reduce((s,n)=>s+(+n.valor_icms||0),0);
    const issMes=mNotas.reduce((s,n)=>s+(+n.valor_iss||0),0);
    const [y,m]=mes.split('-');
    const mLabel=y&&m?['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(m)]+'/'+y:mes;
    return`<div class="card" style="padding:0;overflow:hidden;margin-bottom:8px">
      <div style="background:#f0f4f7;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div style="font-weight:800;font-size:14px">📅 ${mLabel} — ${mNotas.length} nota(s)</div>
        <div style="display:flex;gap:16px;font-size:12px;flex-wrap:wrap">
          <span>Total: <strong style="color:var(--success)">${R$(totMes)}</strong></span>
          ${icmsMes>0?`<span>ICMS: <strong style="color:var(--warn)">${R$(icmsMes)}</strong></span>`:''}
          ${issMes>0?`<span>ISS: <strong style="color:var(--info)">${R$(issMes)}</strong></span>`:''}
          <span style="color:var(--muted)">${[...new Set(mNotas.map(n=>n.tipo))].map(t=>`${tipoIcon[t]||''}${[...mNotas.filter(n=>n.tipo===t)].length} ${t}`).join(' · ')}</span>
        </div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Emp</th><th>Tipo</th><th>Número</th><th>Emissão</th><th>Emitente</th><th>CNPJ</th><th>Natureza</th><th>Total</th><th>ICMS</th><th>ISS</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>${mNotas.map(n=>`<tr>
          <td>${empTag(n.empresa)}</td>
          <td><span class="badge ${tipoBadge[n.tipo]||'b-gray'}">${tipoIcon[n.tipo]||''} ${n.tipo||'NF'}</span></td>
          <td class="mono" style="font-size:11px">${esc(n.numero||'—')}${n.serie?'/'+n.serie:''}</td>
          <td style="white-space:nowrap;font-size:11px">${fDate(n.data_emissao)}</td>
          <td><div style="font-weight:600;font-size:12px">${esc((n.emitente_razao||'').slice(0,28))}</div></td>
          <td style="font-size:10px;color:var(--muted)">${n.emitente_cnpj||''}</td>
          <td style="font-size:11px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((n.natureza_operacao||'').slice(0,25))}</td>
          <td class="mono" style="color:var(--success)">${R$(n.valor_total)}</td>
          <td class="mono" style="color:var(--warn);font-size:11px">${n.valor_icms>0?R$(n.valor_icms):'-'}</td>
          <td class="mono" style="color:var(--info);font-size:11px">${n.valor_iss>0?R$(n.valor_iss):'-'}</td>
          <td><span class="badge ${n.status==='vinculada'?'b-green':'b-amber'}">${n.status||'recebida'}</span> ${((n.irregular||nfEhIncompleta(n))?'<span class="badge b-amber">NF incompleta</span>':'')}</td>
          <td>
            <div style="display:flex;gap:3px">
              <button class="btn info xs" onclick="nfVerDetalhe(${n.id})">👁 Ver</button>
              <button class="btn secondary xs" onclick="nfGerarDANFEById(${n.id})">🖨</button>
              ${n.status!=='vinculada'?`<button class="btn success xs" onclick="nfAbrirVincular(${n.id})">🔗</button>`:''}
              <button class="btn danger xs" onclick="nfExcluir(${n.id})">🗑</button>
            </div>
          </td>
        </tr>`).join('')}
        </tbody>
      </table></div>
    </div>`;
  }).join('');
}

let _nfTipoTab='';
function nfSetTab(tipo){
  _nfTipoTab=tipo;
  document.querySelectorAll('#nf-tabs .tab').forEach(t=>t.classList.toggle('active',t.dataset.tipo===tipo));
  const el=document.getElementById('nf-fil-tipo');
  if(el)el.value=tipo;
  nfAplicarFiltros();
}

async function nfAplicarFiltros(){
  const notas=await dbGet('notas_fiscais');
  const emp=document.getElementById('nf-fil-emp')?.value||'';
  const tipo=document.getElementById('nf-fil-tipo')?.value||_nfTipoTab||'';
  const mes=document.getElementById('nf-fil-mes')?.value||'';
  const status=document.getElementById('nf-fil-status')?.value||'';
  const srch=(document.getElementById('nf-fil-srch')?.value||'').toLowerCase();

  let filt=(currentEmpresa==='GERAL'?notas:notas.filter(n=>(n.empresa||'DL')===currentEmpresa));
  if(emp)filt=filt.filter(n=>(n.empresa||'DL')===emp);
  if(tipo)filt=filt.filter(n=>n.tipo===tipo);
  if(mes)filt=filt.filter(n=>n.mes_competencia===mes);
  if(status)filt=filt.filter(n=>n.status===status);
  if(srch)filt=filt.filter(n=>[n.emitente_razao,n.emitente_cnpj,n.numero,n.natureza_operacao].join(' ').toLowerCase().includes(srch));

  const tabela=document.getElementById('nf-tabela');
  if(tabela)tabela.innerHTML=nfRenderTabela(filt);
}

function nfLimparFiltros(){
  _nfTipoTab='';
  ['nf-fil-emp','nf-fil-tipo','nf-fil-mes','nf-fil-status'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const s=document.getElementById('nf-fil-srch');if(s)s.value='';
  document.querySelectorAll('#nf-tabs .tab').forEach(t=>t.classList.toggle('active',t.dataset.tipo===''));
  nfAplicarFiltros();
}

async function nfSalvarClassif(id){
  const nat=document.getElementById('nf-det-nat').value;
  const irregular=document.getElementById('nf-det-irregular')?.checked||false;
  const irregDesc=document.getElementById('nf-irregular-desc')?.value||'';
  try{

// ── Importar XML ──
async function nfImportarXML(files){
  const fileArr=Array.from(files);if(!fileArr.length)return;
  const empresa=currentEmpresa!=='GERAL'?currentEmpresa:'DL';
  let ok=0,erros=0,dupl=0;
  toast(`Importando ${fileArr.length} arquivo(s)...`,'info');

  for(const file of fileArr){
    try{
      const xmlStr=await file.text();
      const parsed=parseNFe(xmlStr);
      if(!parsed.data_emissao&&!parsed.numero){erros++;continue;}
      // Verificar duplicata
      if(parsed.chave_acesso){
        const{data:existe}=await supa.from('notas_fiscais').select('id').eq('chave_acesso',parsed.chave_acesso).limit(1);
        if(existe&&existe.length>0){dupl++;continue;}
      }
      // Salvar nota
      const notaId=await dbAdd('notas_fiscais',{
        empresa,tipo:parsed.tipo,numero:parsed.numero,serie:parsed.serie,
        chave_acesso:parsed.chave_acesso||null,
        data_emissao:parsed.data_emissao||null,data_entrada:today(),
        natureza_operacao:parsed.natureza_operacao,
        emitente_cnpj:parsed.emitente_cnpj,emitente_razao:parsed.emitente_razao,emitente_uf:parsed.emitente_uf,
        destinatario_cnpj:parsed.destinatario_cnpj,destinatario_razao:parsed.destinatario_razao,
        valor_produtos:parsed.valor_produtos||0,valor_frete:parsed.valor_frete||0,
        valor_desconto:parsed.valor_desconto||0,valor_total:parsed.valor_total||0,
        base_icms:parsed.base_icms||0,valor_icms:parsed.valor_icms||0,valor_ipi:parsed.valor_ipi||0,
        valor_pis:parsed.valor_pis||0,valor_cofins:parsed.valor_cofins||0,
        valor_iss:parsed.valor_iss||0,valor_ir:parsed.valor_ir||0,valor_csll:parsed.valor_csll||0,
        mes_competencia:parsed.mes_competencia||today().slice(0,7),
        natureza_contabil:parsed.natureza_contabil||'DESP_OPERACIONAL',
        irregular: !parsed.destinatario_cnpj || String(parsed.destinatario_cnpj).replace(/\D/g,'').length<14,
        obs_irregular: (!parsed.destinatario_cnpj || String(parsed.destinatario_cnpj).replace(/\D/g,'').length<14) ? 'Destinatário em CPF/ausente — revisar emissão complementar.' : null,
        status:'recebida',
      });
      // Salvar itens
      if(parsed.itens&&parsed.itens.length>0){
        for(const item of parsed.itens){
          await dbAdd('notas_fiscais_itens',{nota_id:notaId,...item});
        }
      }
      ok++;
    }catch(e){console.error('XML import:',file.name,e);erros++;}
  }

  let msg=`${ok} nota(s) importada(s)`;
  if(dupl>0)msg+=` · ${dupl} duplicada(s)`;
  if(erros>0)msg+=` · ${erros} erro(s)`;
  toast(msg,ok>0?'ok':'err');
  await pgNotasFiscais(document.getElementById('content'));
}

async function nfConfirmarVinculo(nfId,cpId,marcarPago=false){
  try{
    const nota=await dbGet('notas_fiscais',nfId);
    // Atualiza a nota fiscal
    const updNF={status:'vinculada',contas_pagar_id:cpId};
    if(nota?.irregular||nfEhIncompleta(nota)){
      updNF.irregular=true;
      updNF.obs_irregular=nota?.obs_irregular||'Destinatário divergente/incompleto — conferir emissão interna complementar.';
    }
    await dbSafeUpdate('notas_fiscais',updNF,'id',nfId);

    // Atualiza a conta a pagar com todos os campos de NF
    const destLabel=nota?.destinatario_razao||(nota?.destinatario_cnpj?'CPF/CNPJ divergente':null)||'';
    const updCP={
      observacao:`NF vinculada: ${nota?.numero||nfId}${(nota?.irregular||nfEhIncompleta(nota))?' — destinatário: '+(destLabel||'divergente/incompleto'):''}`,
      nf_id:nfId,nf_numero:nota?.numero||null,nf_num:nota?.numero||null,
      nf_chave:nota?.chave_acesso||null,
      nf_incompleta:nfEhIncompleta(nota),
      nf_irregular:!!(nota?.irregular||nfEhIncompleta(nota))
    };
    if(marcarPago){
      updCP.status='paid';updCP.data_pagamento=today();updCP.valor_pago=nota?.valor_total||null;
      toast('NF vinculada e conta marcada como PAGA! ✅','ok');
    } else {
      toast('NF vinculada à conta a pagar!','ok');
    }
    await dbSafeUpdate('contas_pagar',updCP,'id',cpId);

    // Propaga para a despesa vinculada (se existir)
    try{
      const cpRec2=await dbGet('contas_pagar',cpId);
      if(cpRec2?.origem_id&&cpRec2?.origem_tipo==='despesas'){
        await dbSafeUpdate('despesas',{
          nf_id:nfId,nf_numero:nota?.numero||null,nf_num:nota?.numero||null,
          nf_chave:nota?.chave_acesso||null,
          nf_irregular:!!(nota?.irregular||nfEhIncompleta(nota)),
          nf_incompleta:nfEhIncompleta(nota)
        },'id',cpRec2.origem_id);
      }
    }catch(e2){console.warn('nfConfirmarVinculo: sync despesas skipped',e2);}

    document.getElementById('nf-vincular-modal').classList.remove('open');
    nfAplicarFiltros();
    if(currentPage==='contas_pagar') await PAGES.contas_pagar(document.getElementById('content'));
  }catch(e){toast('Erro: '+e.message,'err');}
}

async function nfCriarCP(nfId){
  const nota=await dbGet('notas_fiscais',nfId);
  if(!nota)return;
  try{
    const cpId=await dbAdd('contas_pagar',{
      empresa:nota.empresa||'DL',data_lanc:today(),
      tipo_despesa:nota.tipo==='NFSe'?'NFS-e SERVIÇO':nota.tipo==='CTe'?'CT-e FRETE':'NF-e MERCADORIA',
      fornecedor:nota.emitente_razao||'',parcela:'1/1',
      vencimento:nota.data_emissao||today(),valor:nota.valor_total||0,
      descricao_adicional:`${nota.tipo} Nº ${nota.numero||''} — ${nota.natureza_operacao||''}`,
      categoria:nota.tipo==='NFSe'?'SERVIÇOS':nota.tipo==='CTe'?'FRETE':'MERCADORIA',
      natureza:nota.natureza_contabil||'DESP_OPERACIONAL',status:'open',
      observacao:`Gerado de ${nota.tipo} Nº ${nota.numero}`,
      nf_id:nfId,nf_numero:nota.numero||null,nf_num:nota.numero||null,
      nf_chave:nota.chave_acesso||null,
      nf_incompleta:nfEhIncompleta(nota),
      nf_irregular:!!(nota.irregular||nfEhIncompleta(nota))
    });
    if(cpId){

    document.getElementById('nf-vincular-modal').classList.remove('open');

}

function cbParcelaBizKey(p={}){
  return [
    String(p.empresa||'DL'),
    String(p.forn_nome||'').trim().toLowerCase(),
    String((p.numero||1)+'/'+(p.total||1)),
    String(p.vencimento||'').slice(0,10),
    Number(p.valor||0).toFixed(2)
  ].join('::');
}
function cbCpBizKey(r={}){
  return [
    String(r.empresa||'DL'),
    String(r.fornecedor||'').trim().toLowerCase(),
    String(r.parcela||'1/1').replace(' (saldo)',''),
    String(r.vencimento||'').slice(0,10),
    Number(r.valor||0).toFixed(2)
  ].join('::');
}
function cbCpCorrespondeParcela(r={},p={}){
  if(String(r.origem_tipo||'')==='despesas' && r.origem_id && p.despesa_id){
    if(String(r.origem_id)===String(p.despesa_id) && String(r.parcela||'').replace(' (saldo)','')===String((p.numero||1)+'/'+(p.total||1))) return true;
  }
  return cbCpBizKey(r)===cbParcelaBizKey(p);
}

async function pgContasBancarias(c){
  const contas=await dbGet('contas');
  const fContas=empF(contas,'empresa');

  if(!window._cbState) window._cbState={contaId:null,tab:'all',mes:'',srch:''};
  const st=window._cbState;
  if(fContas.length>0 && !st.contaId) st.contaId=fContas[0].id;

  const now=new Date();
  const curMes=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  if(!st.mes) st.mes=curMes;

  const [pr,pd,cp,transf]=await Promise.all([
    dbGet('parcelas_receita'),dbGet('parcelas_despesa'),
    dbGet('contas_pagar'),dbGet('transferencias')
  ]);

  const _nfMap={};
  try{const _nfs=await dbGet('notas_fiscais');(_nfs||[]).forEach(n=>{_nfMap[n.id]={numero:n.numero,irregular:n.irregular,chave_acesso:n.chave_acesso};});}catch(e){}
  const getNfNum=(p)=>{const _nf=p.nf_id?_nfMap[p.nf_id]:null;return _nf?.numero||p.nf_numero||p.nf_num||null;};
  const getNfId=(p)=>p.nf_id||null;
  const getNfIrr=(p)=>{const _nf=p.nf_id?_nfMap[p.nf_id]:null;return!!(p.nf_irregular||p.nf_incompleta||_nf?.irregular);};
  const getNfChave=(p)=>{const _nf=p.nf_id?_nfMap[p.nf_id]:null;return _nf?.chave_acesso||p.nf_chave||null;};

  const cpPagas=(cp||[]).filter(r=>r.status==='paid');
  const cpByConta={};
  cpPagas.forEach(r=>{ const k=String(r.conta_bancaria_id||''); (cpByConta[k] ||= []).push(r); });

  const saldoConta=(ctId)=>{
    const ct=contas.find(c=>String(c.id)===String(ctId))||{};
    const si=+(ct.saldo_inicial||0);
    const ent=pr.filter(p=>String(p.conta_id)===String(ctId)&&p.dt_pagamento).reduce((s,p)=>s+(+p.valor_pago||+p.valor||0),0);
    const _cpOrigIds=new Set((cpByConta[String(ctId)]||[]).map(r=>String(r.origem_id||'')).filter(Boolean));
    const saiPD=pd.filter(p=>String(p.conta_id)===String(ctId)&&p.dt_pagamento).reduce((s,p)=>{
      if(p.despesa_id&&_cpOrigIds.has(String(p.despesa_id))) return s; // já contado via CP
      const esp=(cpByConta[String(ctId)]||[]).find(r=>cbCpCorrespondeParcela(r,p));
      return s + (esp?0:(+p.valor_pago||+p.valor||0));
    },0);
    const saiCP=(cpByConta[String(ctId)]||[]).reduce((s,p)=>s+(+(p.valor_pago!=null?p.valor_pago:p.valor||0)),0);
    const entT=transf.filter(t=>String(t.conta_destino_id)===String(ctId)).reduce((s,t)=>s+(+t.valor||0),0);
    const saiT=transf.filter(t=>String(t.conta_origem_id)===String(ctId)).reduce((s,t)=>s+(+t.valor||0),0);
    return si+ent-saiPD-saiCP+entT-saiT;
  };

  const ctId=st.contaId;

// ── State helpers ──
function cbSetConta(id){window._cbState={...window._cbState,contaId:id};pgContasBancarias(document.getElementById('content'));}
function cbSetTab(tab){window._cbState={...window._cbState,tab};pgContasBancarias(document.getElementById('content'));}
function cbSetMes(mes){window._cbState={...window._cbState,mes};pgContasBancarias(document.getElementById('content'));}
function cbSetSrch(s){clearTimeout(window._cbSrchT);window._cbSrchT=setTimeout(()=>{window._cbState={...window._cbState,srch:s};pgContasBancarias(document.getElementById('content'));},400);}

// ── Editar / Excluir lançamento ──
async function cbEditarLanc(origem,id){
  try{
    if(origem==='contas_pagar'){
      const rec=(await dbGet('contas_pagar',id));
      if(rec?.origem_tipo==='despesas'&&rec?.origem_id){
        go('despesas');
        setTimeout(()=>despAbrirForm(rec.origem_id),180);
      }else if(rec){
        cpRec=[...cpRec.filter(r=>r.id!==rec.id),rec];
        cpAbrirBaixa(id);
      }
    } else if(origem==='parcelas_despesa'){
      const parc=await dbGet('parcelas_despesa',id);
      if(parc?.despesa_id){
        go('despesas');
        setTimeout(()=>despAbrirForm(parc.despesa_id),180);
      }else{
        toast('Parcela sem despesa vinculada.','err');
      }
    } else if(origem==='parcelas_receita'){
      const parc=await dbGet('parcelas_receita',id);
      if(parc?.receita_id){
        go('receitas');
        setTimeout(()=>recAbrirForm(parc.receita_id),180);
      }else{
        toast('Parcela sem receita vinculada.','err');
      }
    } else if(origem==='transferencias'){go('transferencias');}
    else {toast('Edição disponível no módulo de origem','info');}
  }catch(e){toast('Erro ao abrir edição: '+e.message,'err');}
}

async function cbExcluirLanc(origem,id){
  if(!(await confirm2('Excluir este lançamento?')))return;
  try{
    if(origem==='contas_pagar') await supa.from('contas_pagar').delete().eq('id',id);
    else if(origem==='parcelas_receita') await supa.from('parcelas_receita').delete().eq('id',id);
    else if(origem==='parcelas_despesa') await supa.from('parcelas_despesa').delete().eq('id',id);
    else if(origem==='transferencias') await supa.from('transferencias').delete().eq('id',id);
    else {toast('Não foi possível excluir este tipo de lançamento','err');return;}
    toast('Excluído!','ok');
    pgContasBancarias(document.getElementById('content'));
  }catch(e){toast('Erro: '+e.message,'err');}
}


async function contaVerExtrato(contaId){
  try{
    const contas=await dbGet('contas');
    const ct=contas.find(c=>String(c.id)===String(contaId));
    if(!ct){toast('Conta não encontrada','err');return;}
    const now=new Date();
    const curYr=now.getFullYear();
    const curMo=String(now.getMonth()+1).padStart(2,'0');
    const [pr,pd,cp,transf]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar'),dbGet('transferencias')]);
    const cpConta=(cp||[]).filter(r=>r.status==='paid' && String(r.conta_bancaria_id||'')===String(contaId));
    const allDates=[...pr.filter(p=>String(p.conta_id)===String(contaId)&&p.dt_pagamento).map(p=>String(p.dt_pagamento).slice(0,7)),...pd.filter(p=>String(p.conta_id)===String(contaId)&&p.dt_pagamento).map(p=>String(p.dt_pagamento).slice(0,7)),...cpConta.filter(p=>p.data_pagamento).map(p=>String(p.data_pagamento).slice(0,7)),...transf.filter(t=>String(t.conta_origem_id)===String(contaId)||String(t.conta_destino_id)===String(contaId)).map(t=>String(t.data).slice(0,7))];
    const meses=[...new Set(allDates)].sort().reverse();
    if(!meses.includes(`${curYr}-${curMo}`))meses.unshift(`${curYr}-${curMo}`);
    const selMes=document.getElementById(`ext-mes-${contaId}`)?.value||`${curYr}-${curMo}`;
    const selTipo=document.getElementById(`ext-tipo-${contaId}`)?.value||'';
    let lancs=[];
    const _nfMap={};
    try{const _nfs=await dbGet('notas_fiscais');(_nfs||[]).forEach(n=>{_nfMap[n.id]={numero:n.numero,irregular:n.irregular,chave_acesso:n.chave_acesso};});}catch(e){}
    const addL=(data,desc,valor,tipo,origem,id,nf_id,nf_vinc,nf_numero=null,nf_irregular=false,nf_chave=null,comprovante=null)=>{ if((!selMes||String(data||'').startsWith(selMes)) && (!selTipo||(selTipo==='entrada'&&valor>0)||(selTipo==='saida'&&valor<0))){ lancs.push({data,desc,valor,tipo,origem,id,nf_id,nf_vinc,nf_numero,nf_irregular,nf_chave,comprovante}); }};
    pr.filter(p=>String(p.conta_id)===String(contaId)&&p.dt_pagamento).forEach(p=>{ const _nf2=p.nf_id?_nfMap[p.nf_id]:null; addL(p.dt_pagamento,`${p.tipo_nome||'Receita'} — ${p.cliente_nome||''}`,+p.valor_pago||+p.valor||0,'receita','parcelas_receita',p.id,p.nf_id,!!p.nf_id,_nf2?.numero||p.nf_numero||p.nf_num||null,_nf2?.irregular||p.nf_irregular||false,_nf2?.chave_acesso||p.nf_chave||null,p.comprovante||p.tipo_comprovante||null); });
    for(const p of pd.filter(p=>String(p.conta_id)===String(contaId)&&p.dt_pagamento)){
      const cpEsp=cpConta.find(r=>cbCpCorrespondeParcela(r,p));
      if(cpEsp) continue;
      const nfInfo=await obterNFParcelaDespesa(p);

    transf.filter(t=>String(t.conta_destino_id)===String(contaId)).forEach(t=> addL(t.data,`Transferência de ${t.conta_origem_nome||''}`,+t.valor||0,'transferencia','transferencias',t.id,null,false));
    transf.filter(t=>String(t.conta_origem_id)===String(contaId)).forEach(t=> addL(t.data,`Transferência p/ ${t.conta_destino_nome||''}`,-(+t.valor||0),'transferencia','transferencias',t.id,null,false));
    lancs.sort((a,b)=>a.data>b.data?1:-1);
    const totEnt=lancs.filter(l=>l.valor>0).reduce((s,l)=>s+l.valor,0);

saldoFinal>=0?'var(--success-soft)':'var(--danger-soft)'}"><div class="sl">Saldo Final</div><div class="sv" style="color:${saldoFinal>=0?'var(--success)':'var(--danger)'}">${R$(saldoFinal)}</div></div></div><div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Tipo</th><th>Descrição</th><th style="text-align:right">Entrada</th><th style="text-align:right">Saída</th><th style="text-align:right">Saldo</th><th>NF</th><th>Comp.</th><th>Ações</th></tr></thead><tbody><tr style="background:#f0f4f7;font-weight:700"><td colspan="5">Saldo Anterior</td><td class="mono" style="text-align:right;color:var(--info)">${R$(saldoInicial)}</td><td colspan="3"></td></tr>${lancsComSaldo.length===0?`<tr><td colspan="9" class="empty"><p>Nenhum lançamento neste período</p></td></tr>`:lancsComSaldo.map(l=>`<tr style="${l.valor>0?'background:rgba(23,128,61,.03)':''}"><td style="white-space:nowrap;font-size:12px">${fDate(l.data)}</td><td><span style="font-size:12px">${tipoIcon[l.tipo]||''} ${l.tipo==='receita'?'Receita':l.tipo==='conta_pagar'?'C.Pagar':l.tipo==='transferencia'?'Transf.':'Despesa'}</span></td><td style="font-size:12px">${esc(String(l.desc||'').slice(0,45))}</td><td class="mono" style="text-align:right;color:var(--success)">${l.valor>0?R$(l.valor):'—'}</td><td class="mono" style="text-align:right;color:var(--danger)">${l.valor<0?R$(Math.abs(l.valor)):'—'}</td><td class="mono" style="text-align:right;font-weight:700;color:${l.saldoAcc>=0?'var(--info)':'var(--danger)'}">${R$(l.saldoAcc)}</td><td>${l.nf_vinc?`<span class="badge b-green" style="font-size:10px;cursor:help" title="${l.nf_chave?('Chave: '+l.nf_chave):('NF '+(l.nf_numero||''))}">📄 ${l.nf_numero?'NF-'+l.nf_numero:'NF ✓'}</span>${l.nf_irregular?'<span class="badge b-amber" style="font-size:9px;margin-left:2px" title="NF irregular">⚠️</span>':''}`:`<button class="btn xs" style="background:#f0f4f7;font-size:10px;padding:2px 6px" onclick="extrato_vincularNF('${l.origem}',${l.id})">📎 Doc</button>`}</td><td><button class="btn xs" style="background:#f8fafc;font-size:10px;padding:2px 6px" onclick="extratoMarcarComprovante('${l.origem}',${l.id})">📎 Comp.</button></td><td>${l.origem==='transferencias'?`<button class="btn secondary xs" onclick="go('transferencias')">🔒</button>`:`<button class="btn secondary xs" onclick="extratoEditarLanc('${l.origem}',${l.id})">✏️</button>`}</td></tr>`).join('')}<tr style="background:#f0f4f7;font-weight:800;border-top:2px solid var(--line)"><td colspan="3"><strong>TOTAL DO PERÍODO</strong></td><td class="mono" style="text-align:right;color:var(--success)"><strong>${R$(totEnt)}</strong></td><td class="mono" style="text-align:right;color:var(--danger)"><strong>${R$(totSai)}</strong></td><td class="mono" style="text-align:right;color:${saldoFinal>=0?'var(--success)':'var(--danger)'}"><strong>${R$(saldoFinal)}</strong></td><td colspan="3"></td></tr></tbody></table></div></div>`;

async function extratoConfirmarNF(origem,lancId,nfId,btn){
  try{
    const nota=await dbGet('notas_fiscais',nfId);
    if(!nota) throw new Error('Nota fiscal não encontrada');

    // Invalida cache para garantir colunas atuais
    dbColsInvalidate('contas_pagar');
    dbColsInvalidate('parcelas_despesa');
    dbColsInvalidate('despesas');
    dbColsInvalidate('parcelas_receita');

    // Monta payload NF — sempre inclui nf_id; os demais dependem das colunas disponíveis
    const nfPayload=(cols)=>{
      const up={nf_id:nfId}; // nf_id sempre incluído
      const has=(f)=>!cols||cols.has(f);
      if(has('nf_numero')) up.nf_numero=nota?.numero||null;
      if(has('nf_num'))    up.nf_num=nota?.numero||null;
      if(has('nf_chave'))  up.nf_chave=nota?.chave_acesso||null;
      if(has('nf_incompleta')) up.nf_incompleta=nfEhIncompleta(nota);
      if(has('nf_irregular'))  up.nf_irregular=!!(nota?.irregular||nfEhIncompleta(nota));
      if(has('chave_acesso'))  up.chave_acesso=nota?.chave_acesso||null;
      return up;
    };

    // nfPayload — sempre inclui todos os campos NF; dbSafeUpdate remove automaticamente os que não existem
    const nfPayloadFull={
      nf_id:nfId,nf_numero:nota?.numero||null,nf_num:nota?.numero||null,
      nf_chave:nota?.chave_acesso||null,chave_acesso:nota?.chave_acesso||null,
      nf_incompleta:nfEhIncompleta(nota),
      nf_irregular:!!(nota?.irregular||nfEhIncompleta(nota))
    };

    const obsNF=`NF vinculada: ${nota?.numero||nfId}${(nota?.irregular||nfEhIncompleta(nota))?' — destinatário divergente/incompleto':''}`;

    if(origem==='parcelas_receita'){
      await dbSafeUpdate('parcelas_receita',nfPayloadFull,'id',lancId);
    }
    else if(origem==='parcelas_despesa'){
      const parc=await dbGet('parcelas_despesa',lancId);
      if(!parc) throw new Error('Parcela de despesa não encontrada');

      // parcelas_despesa pode não ter colunas NF — dbSafeUpdate remove automaticamente
      try{ await dbSafeUpdate('parcelas_despesa',nfPayloadFull,'id',lancId); }
      catch(e0){console.warn('parcelas_despesa NF skip:',e0);}

      // Despesa-pai
      if(parc.despesa_id){
        try{ await dbSafeUpdate('despesas',nfPayloadFull,'id',parc.despesa_id); }
        catch(e2){console.warn('despesas NF skip:',e2);}
      }

      // Contas a pagar correspondente — match em memória
      try{
        const parcTxt=`${parc?.numero||1}/${parc?.total||1}`;
        const allCP=await dbGet('contas_pagar');
        const candidatos=allCP.filter(r=>{
          if(parc.despesa_id && String(r.origem_id||'')===String(parc.despesa_id)) return true;
          if(String(r.parcela||'')===parcTxt && Math.abs((+r.valor||0)-(+parc.valor||0))<0.01) return true;
          if(parc.forn_nome && String(r.fornecedor||'').toLowerCase()===String(parc.forn_nome||'').toLowerCase()
             && String(r.parcela||'')===parcTxt) return true;
          return false;
        });
        for(const cp of candidatos){
          await dbSafeUpdate('contas_pagar',{...nfPayloadFull,observacao:obsNF},'id',cp.id);
        }
      }catch(e3){console.warn('contas_pagar NF skip:',e3);}
    }
    else if(origem==='contas_pagar'){
      await dbSafeUpdate('contas_pagar',{...nfPayloadFull,observacao:obsNF},'id',lancId);
      // Propaga para despesa vinculada
      try{
        const cp=await dbGet('contas_pagar',lancId);
        if(cp?.origem_id&&cp?.origem_tipo==='despesas'){
          await dbSafeUpdate('despesas',nfPayloadFull,'id',cp.origem_id);
        }
      }catch(e2){console.warn('despesas propagation skip:',e2);}
    }

    // Marca a nota como vinculada
    await dbSafeUpdate('notas_fiscais',{status:'vinculada'},'id',nfId);

    btn.closest('.modal').remove();
    toast(`✅ NF ${nota?.numero||nfId} vinculada com sucesso!`,'ok');
    if(currentPage==='despesas'&&typeof pgDespesas==='function') await pgDespesas(document.getElementById('content'));
    else if(typeof pgContasBancarias==='function') await pgContasBancarias(document.getElementById('content'));
    else if(PAGES?.contas_bancarias) await PAGES.contas_bancarias(document.getElementById('content'));
  }catch(e){
    console.error('extratoConfirmarNF',e);
    toast('Erro ao vincular NF: '+(e.message||e),'err');
  }
}

async function contaProcessarConciliacao(contaId){
  const file=document.getElementById('cbc-file').files[0];
  const di=document.getElementById('cbc-di').value;
  const df=document.getElementById('cbc-df').value;
  if(!file){toast('Selecione o CSV!','err');return;}

  const text=await file.text();
  const lines=text.split('\n').filter(l=>l.trim());
  const extrato=[];
  for(const line of lines.slice(1)){
    const parts=line.split(/[,;]/);
    if(parts.length>=3){
      const valor=parseFloat(parts[2]?.replace(/[^0-9.,-]/g,'').replace(',','.'));
      if(!isNaN(valor))extrato.push({data:normDate(parts[0]?.trim()),desc:parts[1]?.trim(),valor});
    }
  }
  if(extrato.length===0){toast('Nenhum dado no CSV','err');return;}

  const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);
  const sistema=[
    ...pr.filter(p=>p.conta_id===contaId&&p.dt_pagamento>=di&&p.dt_pagamento<=df).map(p=>({id:p.id,tabela:'parcelas_receita',data:p.dt_pagamento,desc:p.tipo_nome||'Receita',valor:+(p.valor_pago||0)})),
    ...pd.filter(p=>p.conta_id===contaId&&p.dt_pagamento>=di&&p.dt_pagamento<=df).map(p=>({id:p.id,tabela:'parcelas_despesa',data:p.dt_pagamento,desc:p.cat_nome||'Despesa',valor:-(+(p.valor_pago||0))})),
    ...cp.filter(p=>p.conta_bancaria_id===contaId&&p.status==='paid'&&p.data_pagamento>=di&&p.data_pagamento<=df).map(p=>({id:p.id,tabela:'contas_pagar',data:p.data_pagamento,desc:p.fornecedor||'C.Pagar',valor:-(+(p.valor_pago!=null?p.valor_pago:(p.valor||0)))})),
  ];

  // Cruzamento automático
  const usadoExt=new Set();const usadoSist=new Set();const matches=[];
  for(let ei=0;ei<extrato.length;ei++){
    const ext=extrato[ei];
    const extDt=new Date(ext.data+'T00:00:00');if(!extDt.getTime())continue;
    for(let si=0;si<sistema.length;si++){
      if(usadoSist.has(si)||usadoExt.has(ei))continue;
      const sist=sistema[si];
      const sistDt=new Date(sist.data+'T00:00:00');
      const diffDays=Math.abs((extDt-sistDt)/86400000);
      const diffVal=Math.abs(ext.valor-sist.valor);
      if(diffVal<=0.02&&diffDays<=3){
        matches.push({ei,si,ext,sist,auto:diffVal<0.01&&diffDays===0});
        usadoExt.add(ei);usadoSist.add(si);break;
      }
    }
  }
  const semVinc=extrato.filter((_,i)=>!usadoExt.has(i));
  const naoConcil=sistema.filter((_,i)=>!usadoSist.has(i));
  const totalExt=extrato.reduce((s,e)=>s+e.valor,0);
  const totalSist=sistema.reduce((s,l)=>s+l.valor,0);

  document.getElementById('conc-resultado-modal').innerHTML=`
    <div class="grid g4" style="margin-bottom:12px">
      <div class="sumcard"><div class="sl">Extrato Banco</div><div class="sv" style="color:var(--info)">${R$(totalExt)}</div><div style="font-size:11px">${extrato.length} lançs.</div></div>
      <div class="sumcard"><div class="sl">Sistema</div><div class="sv" style="color:var(--info)">${R$(totalSist)}</div><div style="font-size:11px">${sistema.length} lançs.</div></div>
      <div class="sumcard" style="background:${Math.abs(totalExt-totalSist)<0.02?'var(--success-soft)':'var(--danger-soft)'}">
        <div class="sl">Diferença</div>
        <div class="sv" style="color:${Math.abs(totalExt-totalSist)<0.02?'var(--success)':'var(--danger)'}">${R$(totalExt-totalSist)}</div>
      </div>

async function contaSalvarManual(contaId){
  const tipo=document.getElementById('lm-tipo').value;
  const data=document.getElementById('lm-data').value;
  const desc=document.getElementById('lm-desc').value.trim();
  const valor=parseFloat(document.getElementById('lm-valor').value)||0;
  const cat=document.getElementById('lm-cat').value.trim()||'Lançamento Manual';
  const forn=document.getElementById('lm-forn').value.trim();
  const forma=document.getElementById('lm-forma').value;
  const nat=document.getElementById('lm-nat').value||'DESP_OPERACIONAL';
  const status=document.getElementById('lm-status').value;
  const docTipo=document.getElementById('lm-doc-tipo').value;
  const nfIdSel=parseInt(document.getElementById('lm-nf-id')?.value)||null;
  const nfNumManual=document.getElementById('lm-nf-numero')?.value?.trim()||null;
  const obs=document.getElementById('lm-obs').value.trim();

  if(!data||!desc||!valor){toast('Preencha data, descrição e valor!','err');return;}

  const contas=await dbGet('contas');
  const ct=contas.find(c=>c.id===contaId)||{};
  const emp=ct.empresa||'DL';

  // Monta info de NF
  let nfId=null,nfNum=null,nfChave=null,nfIrr=false,nfInc=false,comprovTipo=null;
  if(docTipo==='nf_importada'&&nfIdSel){
    const nota=await dbGet('notas_fiscais',nfIdSel);
    nfId=nota?.id||null;nfNum=nota?.numero||null;nfChave=nota?.chave_acesso||null;
    nfIrr=!!(nota?.irregular||nfEhIncompleta(nota));nfInc=nfEhIncompleta(nota);
  }else if(docTipo==='nf_numero'&&nfNumManual){
    nfNum=nfNumManual;
  }else if(docTipo==='recibo'){
    comprovTipo='recibo';
  }else if(docTipo==='comprovante_banco'){
    comprovTipo='bancario';
  }

  const isPaid=status==='paid';
  try{
    if(tipo==='entrada'){
      // Cria receita + parcela — dbAdd remove automaticamente colunas inexistentes
      const recId=await dbAdd('receitas',{empresa:emp,data_lancamento:data,conta_id:contaId,conta_nome:ct.nome,tipo_nome:cat,descricao:desc,cliente_nome:forn,data_primeira:data,valor_parcela:valor,qtde_parcelas:1,valor_total:valor,recebido:isPaid});
      await dbAdd('parcelas_receita',{
        empresa:emp,receita_id:recId,numero:1,total:1,vencimento:data,valor,
        dt_pagamento:isPaid?data:null,valor_pago:isPaid?valor:0,
        conta_id:contaId,conta_nome:ct.nome,tipo_nome:cat,cliente_nome:forn,
        descricao:desc,categoria:cat,natureza:'RECEITA_BRUTA',forma_nome:forma,
        nf_id:nfId,nf_num:nfNum,nf_numero:nfNum,nf_chave:nfChave
      });
    }else{
      // Lançamento manual no banco deve existir também em Despesas + Parcela + Contas a Pagar vinculada
      const colsD=await dbColunas('despesas');
      const despObj={data_lancamento:data,data_emissao:data,descricao:desc,data_primeira:data,valor_parcela:valor,qtde_parcelas:1,valor_total:valor,quitado:isPaid};
      if(colsD.has('empresa'))despObj.empresa=emp;
      if(colsD.has('conta_id'))despObj.conta_id=contaId||null;
      if(colsD.has('conta_nome'))despObj.conta_nome=ct.nome||'';
      if(colsD.has('cat_nome'))despObj.cat_nome=cat;
      if(colsD.has('subcat'))despObj.subcat='';
      if(colsD.has('forn_nome'))despObj.forn_nome=forn||desc;
      if(colsD.has('forma_nome'))despObj.forma_nome=forma||'';
      if(colsD.has('nf_id'))despObj.nf_id=nfId;
      if(colsD.has('nf_numero'))despObj.nf_numero=nfNum;
      if(colsD.has('nf_num'))despObj.nf_num=nfNum;
      if(colsD.has('nf_chave'))despObj.nf_chave=nfChave;
      if(colsD.has('nf_irregular'))despObj.nf_irregular=nfIrr;
      if(colsD.has('nf_incompleta'))despObj.nf_incompleta=nfInc;
      let despId=await dbAdd('despesas',despObj);
      const parcObj={numero:1,total:1,vencimento:data,valor,dt_pagamento:isPaid?data:null,valor_pago:isPaid?valor:0,empresa:emp,despesa_id:despId,forma_nome:forma||'',conta_id:contaId||null,conta_nome:ct.nome||'',cat_nome:cat,forn_nome:forn||desc,descricao:desc,categoria:cat,natureza:nat,nf_id:nfId,nf_numero:nfNum,nf_num:nfNum,nf_chave:nfChave,nf_irregular:nfIrr,nf_incompleta:nfInc,tipo_comprovante:comprovTipo,comprovante_status:comprovTipo,comprovante:comprovTipo};
      await dbAdd('parcelas_despesa',parcObj);
      await syncContasPagarComDespesas();
      const cpAll=await dbGet('contas_pagar');
      const cpSync=(cpAll||[]).find(r=>String(r.origem_tipo||'')==='despesas'&&String(r.origem_id||'')===String(despId)&&String(r.parcela||'')==='1/1');
      if(cpSync){
        await dbSafeUpdate('contas_pagar',{natureza:nat,observacao:obs||null,nf_id:nfId,nf_numero:nfNum,nf_num:nfNum,nf_chave:nfChave,nf_irregular:nfIrr,nf_incompleta:nfInc,tipo_comprovante:comprovTipo,comprovante_status:comprovTipo,comprovante:comprovTipo,conta_bancaria_id:contaId||null,status:isPaid?'paid':'open',data_pagamento:isPaid?data:null,valor_pago:isPaid?valor:null},'id',cpSync.id);
      }
      if(nfId){
        await dbSafeUpdate('notas_fiscais',{status:'vinculada'},'id',nfId);
      }
    }
    document.getElementById('modal-lanc-manual').remove();
    confirmarSalvo(
      `Lançamento ${isPaid?'salvo e baixado':'registrado'}!`,
      `${empLabel(emp)} · ${desc} · ${tipo==='entrada'?'+':'-'}${R$(valor)}`
    );
    await pgContasBancarias(document.getElementById('content'));
  }catch(e){toast('Erro: '+e.message,'err');}
}

async function contaSalvarForm(){

  const obj={
    empresa:document.getElementById('cf-empresa').value,
    nome,banco:document.getElementById('cf-banco').value.trim(),
    tipo:document.getElementById('cf-tipo').value,
    agencia:document.getElementById('cf-agencia').value.trim(),

    saldo_inicial:parseFloat(document.getElementById('cf-saldo').value)||0,
    saldo_data:document.getElementById('cf-saldo-data').value,

  };

    if(_editContaId){await supa.from('contas').update(obj).eq('id',_editContaId);toast('Conta atualizada!','ok');}

}

  m.innerHTML = `<div class="modal-box wide">
    <div class="modal-head">
      <h3>📎 Documentar Lançamento</h3>
      <button class="close-x" onclick="document.getElementById('modal-ext-nf').remove()">✕</button>
    </div>
    <div class="tabs" style="margin-bottom:14px">
      <div class="tab active" onclick="extNfTab('nf',this)">📄 Vincular NF importada</div>
      <div class="tab" onclick="extNfTab('num',this)">🔢 Informar número NF</div>
      <div class="tab" onclick="extNfTab('comp',this)">📎 Comprovante</div>
    </div>
    <div id="ext-nf-tab-nf">
      ${nfDisp.length === 0
        ? '<div class="notice amber">Nenhuma NF disponível. Importe XMLs em Fiscal → Notas Recebidas.</div>'
        : `<div class="tbl-wrap" style="max-height:280px;overflow-y:auto"><table>
            <thead><tr><th>Tipo</th><th>Nº</th><th>Emissão</th><th>Emitente</th><th>Valor</th><th></th></tr></thead>
            <tbody>${nfDisp.map(n=>`<tr>
              <td><span class="badge b-blue">${n.tipo||'NF'}</span></td>
              <td class="mono">${n.numero||'—'}</td>
              <td style="font-size:11px">${fDate(n.data_emissao)}</td>
              <td style="font-size:11px">${(n.emitente_razao||'').slice(0,30)}</td>
              <td class="mono" style="color:var(--success)">${R$(n.valor_total)}</td>
              <td><button class="btn success xs" onclick="extratoConfirmarNF('${origem}',${lancId},${n.id},this)">✓ Vincular</button></td>
            </tr>`).join('')}
            </tbody>
          </table></div>`}
    </div>
    <div id="ext-nf-tab-num" style="display:none">
      <div class="frow c2" style="margin-bottom:12px">
        <div class="form-group"><label class="form-label">Número da NF *</label>
          <input class="field" id="ext-nf-numero" placeholder="Ex: 001234">
        </div>
        <div class="form-group"><label class="form-label">Chave de Acesso (opcional)</label>
          <input class="field" id="ext-nf-chave" placeholder="44 dígitos...">
        </div>
      </div>
      <button class="btn info" onclick="extratoSalvarNFManual('${origem}',${lancId})">💾 Salvar Número NF</button>
    </div>
    <div id="ext-nf-tab-comp" style="display:none">
      <div class="form-group" style="margin-bottom:12px"><label class="form-label">Tipo de Comprovante</label>
        <select class="field" id="ext-comp-tipo" style="max-width:280px">
          <option value="bancario">Comprovante Bancário</option>
          <option value="recibo">Recibo</option>
          <option value="sem_nf">Sem NF / Não se aplica</option>
        </select>
      </div>
      <button class="btn info" onclick="extratoSalvarComprovante('${origem}',${lancId})">💾 Salvar</button>
    </div>
    <div class="modal-foot">
      <button class="btn secondary small" onclick="document.getElementById('modal-ext-nf').remove()">Fechar</button>
    </div>
  </div>`;
  document.body.appendChild(m);
}

function extNfTab(tab, el) {
  ['nf','num','comp'].forEach(t => {
    const div = document.getElementById('ext-nf-tab-'+t);
    if(div) div.style.display = t===tab ? 'block' : 'none';
  });
  document.querySelectorAll('#modal-ext-nf .tab').forEach(t => t.classList.remove('active'));
  if(el) el.classList.add('active');
}

async function extratoSalvarNFManual(origem, lancId) {
  const num = document.getElementById('ext-nf-numero')?.value?.trim();
  const chave = document.getElementById('ext-nf-chave')?.value?.trim();
  if(!num) { toast('Informe o número da NF!','err'); return; }
  try {
    const payload = { nf_num: num, nf_numero: num, nf_chave: chave||null };
    if(origem==='contas_pagar') await dbSafeUpdate('contas_pagar', payload, 'id', lancId);
    else if(origem==='parcelas_despesa') await dbSafeUpdate('parcelas_despesa', payload, 'id', lancId);
    else if(origem==='parcelas_receita') await dbSafeUpdate('parcelas_receita', payload, 'id', lancId);
    document.getElementById('modal-ext-nf')?.remove();
    toast('NF registrada!','ok');
    pgContasBancarias(document.getElementById('content'));
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

async function extratoSalvarComprovante(origem, lancId) {
  const tipo = document.getElementById('ext-comp-tipo')?.value || 'bancario';
  try {
    await setComprovanteStatus(origem, lancId, tipo);
    document.getElementById('modal-ext-nf')?.remove();
    toast('Comprovante registrado!','ok');
    pgContasBancarias(document.getElementById('content'));
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

// ── Diagnóstico de Empresa ──────────────────────────────────────────────────
async function diagEmpresas(){
  const res=document.getElementById('diag-resultado');
  if(res) res.innerHTML='<div class="notice">⏳ Verificando...</div>';
  try{
    const [pr,pd,cp,rec,desp]=await Promise.all([
      dbGet('parcelas_receita'),dbGet('parcelas_despesa'),
      dbGet('contas_pagar'),dbGet('receitas'),dbGet('despesas')
    ]);
    const semEmp=[
      ...pr.filter(r=>!r.empresa).map(r=>({tbl:'parcelas_receita',id:r.id,desc:r.tipo_nome||r.descricao||'—',data:r.dt_pagamento||r.vencimento})),
      ...pd.filter(r=>!r.empresa).map(r=>({tbl:'parcelas_despesa',id:r.id,desc:r.cat_nome||r.descricao||'—',data:r.dt_pagamento||r.vencimento})),
      ...cp.filter(r=>!r.empresa).map(r=>({tbl:'contas_pagar',id:r.id,desc:r.fornecedor||'—',data:r.vencimento})),
      ...rec.filter(r=>!r.empresa).map(r=>({tbl:'receitas',id:r.id,desc:r.descricao||'—',data:r.data_lancamento})),
      ...desp.filter(r=>!r.empresa).map(r=>({tbl:'despesas',id:r.id,desc:r.descricao||'—',data:r.data_lancamento})),
    ];
    if(!res) return;
    if(semEmp.length===0){
      res.innerHTML='<div class="notice green">✅ Todos os registros têm empresa definida!</div>';
      return;
    }
    const porTabela={};
    semEmp.forEach(r=>{(porTabela[r.tbl]||=[]).push(r);});
    let html2=`<div class="notice amber">⚠️ ${semEmp.length} registro(s) sem empresa. Selecione a empresa correta para corrigir:</div>
    <div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select class="field" id="diag-emp-fix" style="width:120px">
        <option value="MG">MINEIRINHO</option>
        <option value="DL">DUARTE LACERDA</option>
      </select>
      <button class="btn info small" onclick="diagCorrigir(${semEmp.length})">✏️ Corrigir todos para empresa selecionada</button>
    </div>
    <div class="tbl-wrap" style="margin-top:10px;max-height:200px;overflow-y:auto">
    <table><thead><tr><th>Tabela</th><th>ID</th><th>Descrição</th><th>Data</th></tr></thead><tbody>
    ${semEmp.slice(0,30).map(r=>`<tr><td><span class="badge b-blue">${r.tbl.replace('_',' ')}</span></td><td class="mono">${r.id}</td><td>${esc(String(r.desc).slice(0,40))}</td><td style="font-size:11px">${fDate(r.data)}</td></tr>`).join('')}
    ${semEmp.length>30?`<tr><td colspan="4" style="text-align:center;color:var(--muted)">... e mais ${semEmp.length-30} registros</td></tr>`:''}
    </tbody></table></div>`;
    window._diagSemEmp=semEmp;
    res.innerHTML=html2;
  }catch(e){
    const res2=document.getElementById('diag-resultado');
    if(res2) res2.innerHTML=`<div class="notice red">Erro: ${esc(e.message)}</div>`;
  }
}

async function diagCorrigir(total){
  const emp=document.getElementById('diag-emp-fix')?.value;
  if(!emp){toast('Selecione a empresa!','err');return;}
  if(!(await confirm2(`Corrigir ${total} registro(s) sem empresa para "${emp}"?`)))return;
  const items=window._diagSemEmp||[];
  if(!items.length){toast('Nenhum item para corrigir','info');return;}
  const res=document.getElementById('diag-resultado');
  if(res) res.innerHTML='<div class="notice">⏳ Corrigindo...</div>';
  let ok=0,err=0;
  for(const r of items){
    try{
      await dbSafeUpdate(r.tbl,{empresa:emp},'id',r.id);
      ok++;
    }catch(e){err++;console.warn('diag fix error',r,e);}
  }
  if(res) res.innerHTML=`<div class="notice ${err===0?'green':'amber'}">
    ✅ ${ok} registro(s) corrigidos para ${emp}${err>0?` · ⚠️ ${err} erro(s)`:''}.
    <br>Recarregue a página para ver as mudanças.
    <button class="btn info small" style="margin-left:10px" onclick="location.reload()">🔄 Recarregar</button>
  </div>`;
  toast(`${ok} corrigido(s)!`,err===0?'ok':'info');
}

async function diagMostrarTudo(){
  const res=document.getElementById('diag-resultado');
  if(res) res.innerHTML='<div class="notice">⏳ Carregando...</div>';
  try{
    const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);
    const contagem={};
    [...pr,...pd,...cp].forEach(r=>{
      const emp=r.empresa||'(sem empresa)';
      contagem[emp]=(contagem[emp]||0)+1;
    });
    if(res) res.innerHTML=`<div class="notice blue">
      <strong>Distribuição de empresa nos lançamentos:</strong><br>
      ${Object.entries(contagem).sort((a,b)=>b[1]-a[1]).map(([emp,n])=>`<span style="margin-right:16px">${empTag(emp||'sem empresa')}: <strong>${n}</strong></span>`).join('')}
    </div>`;
  }catch(e){
    if(res) res.innerHTML=`<div class="notice red">Erro: ${esc(e.message)}</div>`;
  }
}

window.addEventListener('DOMContentLoaded',init);
