async function dbGet(table,id){
  try{
    if(id!==undefined){const{data,error}=await supa.from(table).select('*').eq('id',id).single();if(error){console.error(table,error);return null;}return data;}
    const{data,error}=await supa.from(table).select('*').order('id');
    if(error){console.error(table,error);toast('Erro ao carregar '+table+': '+error.message,'err');return[];}
    return data||[];
  }catch(e){console.error(table,e);toast('Falha de conexÃ£o: '+e.message,'err');return id!==undefined?null:[];}
}
async function dbAdd(table,obj){
  const clean={...obj};delete clean.id;
  const{data,error}=await supa.from(table).insert(clean).select('id').single();
  if(error){console.error('INSERT',table,error);toast('Erro ao salvar em '+table+': '+error.message,'err');throw error;}
  return data.id;
}
async function dbPut(table,obj){
  const{error}=await supa.from(table).upsert(obj);
  if(error){console.error('UPSERT',table,error);toast('Erro ao atualizar em '+table+': '+error.message,'err');throw error;}
}
async function dbDelete(table,id){

}

async function resilientInsert(table,objCompleto,objMinimo){
  const{data,error}=await supa.from(table).insert(objCompleto).select('id').single();
  if(!error)return data.id;
  const isSchemaErr=error.message.includes('column')||error.message.includes('schema')||error.message.includes('Could not find');
  if(!isSchemaErr)throw new Error(error.message);
  // Descobre colunas existentes
  const{data:sample}=await supa.from(table).select('*').limit(1);
  let objFinal={...objMinimo};
  if(sample&&sample.length>0){
    const cols=new Set(Object.keys(sample[0]));
    Object.entries(objCompleto).forEach(([k,v])=>{if(cols.has(k))objFinal[k]=v;});
  }
  const{data:d2,error:e2}=await supa.from(table).insert(objFinal).select('id').single();
  if(e2)throw new Error(e2.message+'\n\nð Execute o SQL de migraÃ§Ã£o em Config > Backup / SQL');
  toast('â ï¸ Salvo com schema parcial. Execute a migraÃ§Ã£o SQL.','info');
  return d2.id;
}
async function resilientInsertNoReturn(table,objCompleto,objMinimo){
  const{error}=await supa.from(table).insert(objCompleto);
  if(!error)return;
  const isSchemaErr=error.message.includes('column')||error.message.includes('schema')||error.message.includes('Could not find');
  if(!isSchemaErr){console.warn(table,error.message);return;}
  const{data:sample}=await supa.from(table).select('*').limit(1);
  let objFinal={...objMinimo};
  if(sample&&sample.length>0){
    const cols=new Set(Object.keys(sample[0]));
    Object.entries(objCompleto).forEach(([k,v])=>{if(cols.has(k))objFinal[k]=v;});
  }
  const{error:e2}=await supa.from(table).insert(objFinal);
  if(e2)console.warn(table+' mÃ­nimo:',e2.message);
}
