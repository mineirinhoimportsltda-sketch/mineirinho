<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceiroApp Pro — Mineirinho Importação v14</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f2f4f7;--panel:#fff;--panel-soft:#f8fafc;--line:#d5dbe5;--line-2:#c7d0db;
  --text:#1f2937;--muted:#667085;--heading:#111827;--nav:#1a2230;--nav-2:#232c3b;
  --success:#17803d;--danger:#b42318;--warn:#b54708;--info:#175cd3;--purple:#6d28d9;
  --success-soft:#e8f7ee;--danger-soft:#fdecea;--warn-soft:#fff3e6;--info-soft:#edf4ff;--purple-soft:#ede9fe;
  --shadow:0 4px 20px rgba(15,23,42,.08);--r:14px;--nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:14px}
button,input,select,textarea{font-family:inherit}
.hidden{display:none!important}
#nav{height:var(--nav-h);background:var(--nav);display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.05);z-index:200}
.brand{display:flex;flex-direction:column;flex-shrink:0;margin-right:20px}
.brand b{font-size:14px;color:#fff;letter-spacing:.2px}
.brand span{font-size:11px;color:#8a9ab5}
.top-menu{display:flex;align-items:stretch;gap:2px;flex:1}
.top-item{position:relative;display:flex;align-items:center;padding:0 14px;color:#b0bccc;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;height:var(--nav-h);user-select:none;transition:all .15s}
.top-item:hover{background:rgba(255,255,255,.06);color:#fff}
.top-item.active{color:#fff;border-bottom-color:#4ade80;background:rgba(74,222,128,.08)}
.top-item .arr{font-size:9px;opacity:.6;margin-left:5px}
.top-dropdown{position:absolute;top:100%;left:0;min-width:230px;background:#1e2838;border:1px solid rgba(255,255,255,.1);border-radius:0 0 12px 12px;box-shadow:0 14px 34px rgba(0,0,0,.25);padding:5px;display:none;z-index:300}
.top-item:hover .top-dropdown,.top-item:focus-within .top-dropdown{display:block}
.top-link{display:block;width:100%;text-align:left;border:none;background:transparent;border-radius:8px;padding:9px 12px;color:#b0bccc;cursor:pointer;font-weight:600;font-size:13px;transition:all .12s}
.top-link:hover{background:rgba(255,255,255,.07);color:#fff}
.top-link.active{background:#fff;color:#1f2937}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.emp-switcher{display:flex;background:rgba(255,255,255,.08);border-radius:20px;padding:3px;gap:2px}
.emp-btn{padding:4px 12px;border-radius:16px;border:none;background:transparent;color:#8a9ab5;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.emp-btn.active{background:#17803d;color:#fff}
.nav-user{color:#667085;font-size:12px;font-weight:600;white-space:nowrap}
.btn-logout{background:none;border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#667085;font-size:12px;padding:5px 10px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-logout:hover{background:rgba(255,255,255,.08);color:#fff}
#content{flex:1;overflow-y:auto;padding:18px}
.btn{border:none;border-radius:10px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit;transition:all .15s}
.btn.primary{background:linear-gradient(180deg,#2c3440,#1a2230);color:#fff}
.btn.success{background:linear-gradient(180deg,#1f9d4a,#17803d);color:#fff}
.btn.danger{background:linear-gradient(180deg,#d92d20,#b42318);color:#fff}
.btn.warn{background:linear-gradient(180deg,#dc6803,#b54708);color:#fff}
.btn.info{background:linear-gradient(180deg,#2970ff,#175cd3);color:#fff}
.btn.secondary{background:#fff;border:1px solid var(--line);color:var(--text)}
.btn.secondary:hover{background:#f5f7fa}
.btn.purple{background:linear-gradient(180deg,#7c3aed,#6d28d9);color:#fff}
.btn.small{padding:6px 10px;font-size:12px;border-radius:8px}
.btn.xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
.section-title{font-size:14px;font-weight:800;margin-bottom:10px;color:var(--heading)}
.section-sub{font-size:12px;color:var(--muted);margin:-6px 0 10px}
.kpi{padding:16px;border-radius:16px;background:linear-gradient(180deg,#fff,#f9fafb);border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi:before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.kpi.success:before{background:var(--success)}.kpi.danger:before{background:var(--danger)}
.kpi.warn:before{background:var(--warn)}.kpi.info:before{background:var(--info)}.kpi.purple:before{background:var(--purple)}
.kpi.success{background:linear-gradient(180deg,#fff,var(--success-soft))}
.kpi.danger{background:linear-gradient(180deg,#fff,var(--danger-soft))}
.kpi.warn{background:linear-gradient(180deg,#fff,var(--warn-soft))}
.kpi.info{background:linear-gradient(180deg,#fff,var(--info-soft))}
.kpi.purple{background:linear-gradient(180deg,#fff,var(--purple-soft))}
.kpi .label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.kpi .value{font-size:24px;font-weight:800;margin-top:8px;font-family:'JetBrains Mono',monospace}
.kpi.success .value{color:var(--success)}.kpi.danger .value{color:var(--danger)}
.kpi.warn .value{color:var(--warn)}.kpi.info .value{color:var(--info)}.kpi.purple .value{color:var(--purple)}
.kpi .sub{font-size:12px;color:var(--muted);margin-top:5px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
.g4{grid-template-columns:repeat(4,minmax(0,1fr))}
.g5{grid-template-columns:repeat(5,minmax(0,1fr))}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f8fafc}
th{padding:9px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#475569;border-bottom:1px solid var(--line)}
td{padding:9px 10px;border-bottom:1px solid #eceff2;vertical-align:middle}
tr:hover td{background:#fbfcfd}
tr:last-child td{border-bottom:none}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.badge{display:inline-flex;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
.b-green{background:var(--success-soft);color:var(--success)}
.b-red{background:var(--danger-soft);color:var(--danger)}
.b-amber{background:var(--warn-soft);color:var(--warn)}
.b-blue{background:var(--info-soft);color:var(--info)}
.b-gray{background:#edf4ff;color:#536173}
.b-purple{background:var(--purple-soft);color:var(--purple)}
.emp-tag{display:inline-flex;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:.4px}
.emp-DL{background:#dbeafe;color:#1d4ed8}
.emp-MG{background:#dcfce7;color:#166534}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px}
.field{width:100%;height:38px;border:1px solid var(--line-2);border-radius:9px;background:#fff;padding:0 11px;color:var(--text);outline:none;font-family:inherit;font-size:13px;transition:border .15s}
.field:focus{border-color:#8e99a8;box-shadow:0 0 0 3px rgba(123,135,148,.12)}
textarea.field{height:auto;padding:9px 11px;min-height:72px;resize:vertical}
.frow{display:grid;gap:10px}
.c2{grid-template-columns:1fr 1fr}
.c3{grid-template-columns:1fr 1fr 1fr}
.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.inline-select{display:flex;gap:6px}
.inline-select .field{flex:1}
.modal{position:fixed;inset:0;background:rgba(17,24,39,.4);display:none;align-items:center;justify-content:center;padding:20px;z-index:999;backdrop-filter:blur(2px)}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.18);width:min(760px,96vw);max-height:92vh;overflow-y:auto;padding:20px}
.modal-box.wide{width:min(1000px,96vw)}
.modal-box.sm{width:min(500px,96vw)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-head h3{margin:0;font-size:17px;font-weight:800}
.close-x{background:#fff;border:1px solid var(--line);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.close-x:hover{background:#f5f7fa}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--line)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:700;color:#4b5563;font-size:13px;transition:all .15s}
.tab:hover{background:#f5f7fa}
.tab.active{background:var(--nav);color:#fff;border-color:var(--nav)}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:800;color:var(--heading)}
.page-sub{font-size:13px;color:var(--muted);margin-top:3px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.notice{padding:11px 13px;border-radius:10px;background:#f8fafc;border:1px solid var(--line);color:var(--muted);font-size:13px}
.notice.green{background:var(--success-soft);border-color:#cfe8d8;color:var(--success)}
.notice.red{background:var(--danger-soft);border-color:#f3cfc9;color:var(--danger)}
.notice.amber{background:var(--warn-soft);border-color:#f2d8b5;color:var(--warn)}
.notice.blue{background:var(--info-soft);border-color:#cdddfa;color:var(--info)}
.baixa-modal .modal-box{background:#ededee;border-radius:8px;max-width:420px;padding:0}
.baixa-header{background:#1a2e45;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-radius:8px 8px 0 0}
.baixa-header h3{margin:0;font-size:14px;font-weight:700}
.baixa-body{padding:14px}
.baixa-lbl{font-size:12px;font-weight:700;color:#333;margin-top:9px;margin-bottom:3px}
.baixa-field{width:100%;background:#fff;border:1px solid #b0b8c4;border-radius:4px;padding:5px 9px;font-size:13px;font-family:inherit;color:#333;height:32px}
.baixa-field:focus{border-color:#1a2e45;outline:none}
.baixa-row{display:grid;grid-template-columns:80px 110px 1fr;gap:6px;margin-top:6px;background:#e2e2e2;border:1px solid #ccc;padding:7px 9px;border-radius:4px;font-size:12px;font-weight:700}
.baixa-row .bval{color:var(--danger);font-family:'JetBrains Mono',monospace}
.baixa-footer{background:#d8d8d8;padding:10px 14px;display:flex;gap:8px;justify-content:center;border-top:1px solid #bbb;border-radius:0 0 8px 8px}
.btn-baixa{border:none;border-radius:4px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:60px;font-family:inherit;transition:all .12s}
.btn-baixa .ico{font-size:18px}
.btn-baixa.save{background:#2d6a4f;color:#fff}.btn-baixa.del{background:#b42318;color:#fff}
.btn-baixa.close{background:#6b7280;color:#fff}.btn-baixa.attach{background:#1a2e45;color:#fff}
.comprovante-warn{color:var(--danger);font-size:11px;font-weight:700;text-align:center;margin-top:5px}
.twocol-head{display:grid;grid-template-columns:1.1fr .9fr;gap:3px}
.col-head{color:#fff;font-weight:800;text-align:center;padding:9px;font-size:14px;border-radius:6px 6px 0 0}
.col-red{background:var(--danger)}.col-blue{background:var(--info)}.col-green{background:var(--success)}
.twocol-body{display:grid;grid-template-columns:1.1fr .9fr;gap:3px;background:#d5dbe5;border-radius:0 0 8px 8px;overflow:hidden}
.col-tbl{overflow:auto;max-height:420px;background:#f3f6f9}
.sum-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.sumcard{background:#fffbf0;border:1px solid #e8ddc2;border-radius:10px;padding:9px 10px;text-align:center}
.sumcard .sl{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted)}
.sumcard .sv{font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace;margin-top:4px}
.dre-group{background:#f0f4f7;border-left:4px solid var(--info);padding:8px 12px;font-weight:800;font-size:13px;display:flex;justify-content:space-between;margin-bottom:2px;border-radius:0 6px 6px 0}
.dre-group.rec{border-color:var(--success)}.dre-group.cost{border-color:var(--danger)}.dre-group.desp{border-color:var(--warn)}.dre-group.res{border-color:var(--purple)}
.dre-row{display:flex;justify-content:space-between;padding:5px 12px 5px 22px;font-size:13px;border-bottom:1px solid #f0f4f7}
.dre-row:hover{background:#f8fafc}
.dre-subtotal{display:flex;justify-content:space-between;padding:7px 12px;font-weight:700;border-top:2px solid var(--line);background:#fff;border-radius:6px;margin:4px 0}
.dre-total{display:flex;justify-content:space-between;padding:11px 14px;font-weight:800;font-size:16px;border-radius:10px;margin-top:8px}
.dre-total.lucro{background:var(--success-soft);color:var(--success)}
.dre-total.prejuizo{background:var(--danger-soft);color:var(--danger)}
.prog{background:#e8eef3;border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
#toast-wrap{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:5px}
.toast{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;box-shadow:var(--shadow);font-size:13px;display:flex;align-items:center;gap:8px;min-width:240px;animation:tIn .2s ease}
.toast.ok{border-left:4px solid var(--success)}.toast.err{border-left:4px solid var(--danger)}.toast.info{border-left:4px solid var(--info)}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
#rt{position:fixed;bottom:14px;right:14px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;z-index:9998;box-shadow:var(--shadow)}
#rt-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#rt.off #rt-dot{background:var(--danger);animation:none}
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty .ei{font-size:38px;margin-bottom:8px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
hr.sep{border:none;border-top:1px solid #eceff2;margin:12px 0}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#c8d4de;border-radius:3px}
@media(max-width:1100px){.g4,.g5{grid-template-columns:1fr 1fr}.twocol-head,.twocol-body{grid-template-columns:1fr}}
@media(max-width:768px){.g2,.g3,.g4{grid-template-columns:1fr}.frow.c2,.frow.c3,.frow.c4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="toast-wrap"></div>
<div id="rt"><div id="rt-dot"></div><span id="rt-lbl">Conectado</span></div>

<nav id="nav" style="display:none">
  <div class="brand"><b>FinanceiroApp Pro</b><span>Duarte Lacerda & Mineirinho</span></div>
  <div class="top-menu" id="top-menu">
    <div class="top-item active" onclick="go('dashboard')" data-page="dashboard">📊 Dashboard</div>
    <div class="top-item" tabindex="0">📝 Lançamentos <span class="arr">▾</span>
      <div class="top-dropdown">
        <button class="top-link" onclick="go('receitas')" data-page="receitas">💚 Receitas</button>

        <button class="top-link" onclick="go('poupanca')" data-page="poupanca">🏦 Poupança</button>

      <div class="top-dropdown">

<div id="content"></div>

<script>
const SURL='https://iqefyujbohknfkiitqcj.supabase.co';
const EMP_LABELS={'DL':'DUARTE LACERDA','MG':'MINEIRINHO','GERAL':'Geral'};
const empLabel=e=>EMP_LABELS[e]||e||'?';
const SKEY='sb_publishable_yko8fI9f5g4yV4OL3NI84Q_jYgehJe-';
const supa=supabase.createClient(SURL,SKEY);

// ─── SCHEMA AUTO-CURATIVO ───────────────────────────────────────────────────
// Colunas confirmadas como inexistentes na tabela real (aprendido em runtime)
const _badCols={};
function _extractBadCol(msg){
  // Supabase: "Could not find the 'col_name' column of 'table' in the schema cache"
  const m=String(msg||'').match(/Could not find the '([^']+)' column/);
  return m?m[1]:null;
}
function _stripBad(tbl,obj){
  const bad=_badCols[tbl];if(!bad||!bad.size)return{...obj};
  const o={...obj};bad.forEach(c=>delete o[c]);return o;
}
function _learnBad(tbl,col){
  // Se a coluna for 'empresa', nunca a tratamos como bad; mantê-la é crucial para integridade
  if(!col || col==='empresa') return;
  if(!_badCols[tbl]) _badCols[tbl] = new Set();
  _badCols[tbl].add(col);
  // invalida cache de colunas também
  delete _colCache[tbl];
  console.warn(`Schema aprendido: '${col}' não existe em '${tbl}'`);
}

// Update seguro — retira colunas inexistentes e tenta novamente automaticamente
async function dbSafeUpdate(tbl,payload,eqKey,eqVal,eqKey2,eqVal2){
  let p=_stripBad(tbl,payload);
  for(let attempt=0;attempt<10;attempt++){
    if(!Object.keys(p).length)return false;
    let q=supa.from(tbl).update(p).eq(eqKey,eqVal);
    if(eqKey2)q=q.eq(eqKey2,eqVal2);
    const{error}=await q;
    if(!error)return true;
    const bad=_extractBadCol(error.message);
    if(bad){_learnBad(tbl,bad);delete p[bad];continue;}
    throw error;
  }
  return false;
}

// Insert seguro — retira colunas inexistentes e tenta novamente
async function dbSafeInsert(tbl,obj){
  let o=_stripBad(tbl,{...obj});delete o.id;
  for(let attempt=0;attempt<10;attempt++){
    if(!Object.keys(o).length)throw new Error(`Sem campos válidos para inserir em ${tbl}`);
    const{data,error}=await supa.from(tbl).insert(o).select('id').single();
    if(!error&&data?.id)return data.id;
    if(!error&&!data?.id){
      const{data:d2}=await supa.from(tbl).select('id').order('id',{ascending:false}).limit(1).single();
      if(d2?.id)return d2.id;
      return Date.now();
    }
    const bad=_extractBadCol(error?.message);
    if(bad){_learnBad(tbl,bad);delete o[bad];continue;}
    // Tenta sem select (pode ser RLS)
    const{error:e2}=await supa.from(tbl).insert(o);
    if(!e2){
      const{data:d3}=await supa.from(tbl).select('id').order('id',{ascending:false}).limit(1).single();
      return d3?.id||Date.now();
    }
    const bad2=_extractBadCol(e2?.message);
    if(bad2){_learnBad(tbl,bad2);delete o[bad2];continue;}
    throw new Error(e2.message||JSON.stringify(e2));
  }
  return Date.now();
}

// Cache de colunas (para verificações opcionais — não mais usado para gatekeeping crítico)
const _colCache={};
function dbColsInvalidate(tbl){delete _colCache[tbl];}
async function dbColunas(tbl){
  if(_colCache[tbl])return _colCache[tbl];
  try{
    const{data,error}=await supa.from(tbl).select('*').limit(1);
    if(!error&&data&&data.length>0){
      _colCache[tbl]=new Set(Object.keys(data[0]));
      (_badCols[tbl]||new Set()).forEach(c=>_colCache[tbl].delete(c));
      return _colCache[tbl];
    }
    // Tabela vazia ou erro: busca schema via INSERT vazio para descobrir colunas reais
    // Enquanto isso, retorna um set AMPLO — melhor tentar e o schema auto-curativo remove
    // colunas que não existem. Nunca remover 'empresa' por padrão.
    const amplo=new Set([
      'id','empresa','status','created_at','updated_at',
      'data_lancamento','data_emissao','descricao','valor','valor_pago','valor_total',
      'conta_id','conta_nome','cat_id','cat_nome','subcat','forn_id','forn_nome',
      'tipo_id','tipo_nome','cliente_id','cliente_nome','forma_id','forma_nome',
      'data_primeira','valor_parcela','qtde_parcelas','recebido','quitado',
      'numero','total','vencimento','dt_pagamento','despesa_id','receita_id',
      'natureza','categoria','descricao','parcela','origem_tipo','origem_id',
      'tipo_despesa','fornecedor','data_lanc','data_pagamento','forma_pagamento',
      'conta_bancaria_id','baixado_por','baixado_em','observacao','nf_id',
      'nf_numero','nf_num','nf_chave','nf_irregular','nf_incompleta',
      'comprovante','tipo_comprovante','comprovante_status'
    ]);
    (_badCols[tbl]||new Set()).forEach(c=>amplo.delete(c));
    return amplo;
  }catch(e){
    const amplo=new Set(['id','empresa','status','created_at','valor','descricao','natureza','categoria']);
    return amplo;
  }
}

async function obterNFParcelaDespesa(parcela={}){
  try{
    const nulo={nf_id:null,nf_numero:null,nf_chave:null,nf_irregular:false,nf_incompleta:false};
    if(!parcela) return nulo;
    const nfs=await dbGet('notas_fiscais');
    const nfMap={};
    (nfs||[]).forEach(n=>nfMap[n.id]=n);

    const montar=(base={}, nfId=null)=>{
      const nf=nfId?(nfMap[nfId]||null):null;
      return {
        nf_id:nfId||base.nf_id||null,
        nf_numero:nf?.numero||base.nf_numero||base.nf_num||null,
        nf_chave:nf?.chave_acesso||base.nf_chave||base.chave_acesso||null,
        nf_irregular:!!(base.nf_irregular||base.irregular||nf?.irregular||nfEhIncompleta(nf||{})),
        nf_incompleta:!!(base.nf_incompleta||nfEhIncompleta(nf||{})),
        nf_destinatario:nf?.destinatario_razao||(nf?.destinatario_cnpj?'CPF/CNPJ divergente':null)||base.nf_destinatario||null
      };
    };

    if(parcela.nf_id || parcela.nf_numero || parcela.nf_num || parcela.nf_chave){
      return montar(parcela, parcela.nf_id||null);
    }

    const despesas=await dbGet('despesas');
    const desp=(despesas||[]).find(d=>String(d.id||'')===String(parcela.despesa_id||''))||null;
    if(desp && (desp.nf_id || desp.nf_numero || desp.nf_num || desp.nf_chave)){
      return montar(desp, desp.nf_id||null);
    }

    const cps=await dbGet('contas_pagar');
    const parcTxt=`${parcela.numero||1}/${parcela.total||1}`;
    const fornBase=String(parcela.forn_nome||parcela.fornecedor||'').trim().toLowerCase();
    const descBase=String(parcela.descricao||'').trim().toLowerCase();
    const valorBase=Number(parcela.valor||0);
    const vencBase=String(parcela.vencimento||'');
    const candidatos=(cps||[]).filter(r=>{
      const mesmoOrigemId=parcela.despesa_id && String(r.origem_id||'')===String(parcela.despesa_id);
      const mesmaParcela=String(r.parcela||'')===parcTxt;
      const mesmoTipo=(String(r.origem_tipo||'')==='despesas') || !r.origem_tipo;
      const mesmoFornecedor=fornBase && String(r.fornecedor||'').trim().toLowerCase()===fornBase;
      const mesmaDescricao=descBase && String(r.descricao_adicional||'').trim().toLowerCase()===descBase;
      const mesmoValor=Math.abs(Number(r.valor||0)-valorBase)<0.01;
      const mesmoVenc=vencBase && String(r.vencimento||'')===vencBase;
      return (
        mesmoOrigemId && mesmoTipo && (mesmaParcela || (!r.parcela && (mesmoValor || mesmoVenc)))
      ) || (
        mesmoTipo && (mesmaParcela || mesmoVenc) && (mesmoFornecedor || mesmaDescricao) && mesmoValor
      );
    });

    const cpComNF=candidatos.find(r=>r.nf_id || r.nf_numero || r.nf_num || r.nf_chave);
    if(cpComNF) return montar(cpComNF, cpComNF.nf_id||null);

    return nulo;
  }catch(e){
    console.warn('obterNFParcelaDespesa',e);
    return {nf_id:null,nf_numero:null,nf_chave:null,nf_irregular:false,nf_incompleta:false};
  }
}
let _syncCPRunning=false;
function cpKeyFromParcela(p){return `${String(p?.despesa_id||'')}::${String(p?.numero||1)}/${String(p?.total||1)}`;}
function cpIsAutoGerada(r={}){
  const obs=String(r.observacao||'').toLowerCase();
  return obs.includes('automaticamente') || obs.includes('espelhado automaticamente') || obs.includes('gerado automaticamente pela tela despesas');
}
async function syncContasPagarComDespesas(){
  if(_syncCPRunning)return;
  _syncCPRunning=true;
  try{
    const [despesas,parcelas,cp,nfs]=await Promise.all([dbGet('despesas'),dbGet('parcelas_despesa'),dbGet('contas_pagar'),dbGet('notas_fiscais')]);
    const despesasArr=despesas||[];
    const parcelasArr=(parcelas||[]).filter(p=>p&&p.despesa_id);
    const cpArr=cp||[];
    const nfById={};(nfs||[]).forEach(n=>nfById[n.id]=n);
    const colsCP=await dbColunas('contas_pagar');
    const despMap={};despesasArr.forEach(d=>despMap[String(d.id)]=d);
    const validKeys=new Set(parcelasArr.map(cpKeyFromParcela));

    // 1) remove fantasmas auto-gerados sem origem válida ou sem parcela correspondente
    for(const r of cpArr){
      const hasOrigem=String(r.origem_tipo||'')==='despesas' && !!r.origem_id;
      const key=`${String(r.origem_id||'')}::${String(r.parcela||'')}`;
      const semParcelaValida=hasOrigem && !validKeys.has(key);
      const semOrigemMasAutomatica=!hasOrigem && cpIsAutoGerada(r);
      const fornecedorVazio=!String(r.fornecedor||'').trim();
      const tipoGenerico=String(r.tipo_despesa||'').trim().toLowerCase()==='despesa';
      if(r.status!=='paid' && (semParcelaValida || semOrigemMasAutomatica || (semOrigemMasAutomatica && fornecedorVazio) || (tipoGenerico && fornecedorVazio && cpIsAutoGerada(r)))){
        try{await dbDel('contas_pagar',r.id);}catch(e){console.warn('cp ghost cleanup',r.id,e);}
      }
    }

    // recarrega após limpeza
    const cpAtual=(await dbGet('contas_pagar'))||[];

    // 2) deduplica por origem/parcela mantendo o melhor registro
    const grouped={};
    for(const r of cpAtual){
      if(String(r.origem_tipo||'')!=='despesas' || !r.origem_id || !r.parcela) continue;
      const k=`${String(r.origem_id)}::${String(r.parcela)}`;
      (grouped[k] ||= []).push(r);
    }
    function cpScore(r={}){
      let s=0;
      if(r.nf_id||r.nf_numero||r.nf_num)s+=50;
      if(r.status==='paid')s+=1000;// paid é inviolável
      if(r.comprovante||r.tipo_comprovante||r.comprovante_status)s+=10;
      if(String(r.fornecedor||'').trim())s+=5;
      if(String(r.tipo_despesa||'').trim() && String(r.tipo_despesa||'').trim().toLowerCase()!=='despesa')s+=5;
      return s;
    }
    for(const k of Object.keys(grouped)){
      const items=grouped[k];
      if(items.length<=1) continue;
      items.sort((a,b)=>cpScore(b)-cpScore(a) || Number(a.id)-Number(b.id));
      const keep=items[0];
      for(const dup of items.slice(1)){
        try{await dbDel('contas_pagar',dup.id);}catch(e){console.warn('cp dedupe',dup.id,e);}
      }
    }

    const cpFinal=(await dbGet('contas_pagar'))||[];

    // 3) espelha parcelas válidas em contas_pagar, sempre por update/upsert, nunca duplicando
    for(const p of parcelasArr){
      const desp=despMap[String(p.despesa_id)];
      if(!desp) continue;
      const parcelaTxt=`${p.numero||1}/${p.total||1}`;
      // FIX-15: busca por origem OU fuzzy (cobre CPs criados manualmente sem vínculo)
      const fornP=(p.forn_nome||desp.forn_nome||'').trim().toLowerCase();
      const vencP=(p.vencimento||desp.data_primeira||'').slice(0,10);
      const valorP=+(p.valor||0);
      const empP=p.empresa||desp.empresa||null;
      const candidatos=cpFinal.filter(r=>{
        const parc=String(r.parcela||'').replace(' (saldo)','');
        if(String(r.origem_tipo||'')==='despesas'&&String(r.origem_id||'')===String(p.despesa_id)&&parc===parcelaTxt) return true;
        const fornR=(r.fornecedor||'').trim().toLowerCase();
        const vencR=(r.vencimento||'').slice(0,10);
        const valR=+(r.valor||0);
        const empR=r.empresa||null;
        // match fuzzy: bate empresa OU ambos sem empresa
        const _empOk=empP?empR===empP:empR===null||empR===undefined;
        return fornR===fornP&&vencR===vencP&&Math.abs(valR-valorP)<0.02&&_empOk&&parc===parcelaTxt;
      });
      // Prioriza: paid > nf > maior id
      const existe=(candidatos||[]).sort((a,b)=>
        (b.status==='paid'?10:0)-(a.status==='paid'?10:0)||
        (b.nf_id?1:0)-(a.nf_id?1:0)||Number(b.id)-Number(a.id))[0];
      const jaEstaPago=existe?.status==='paid';
      const nfId=existe?.nf_id||null;
      const nf=nfId?nfById[nfId]:null;
      // Preserva dados da baixa — nunca regride paid→open
      const pgtoStatus=jaEstaPago?'paid':(p.dt_pagamento?'paid':'open');
      const pgtoData=jaEstaPago?(existe.data_pagamento||null):(p.dt_pagamento||null);
      const pgtoValor=jaEstaPago?(existe.valor_pago??null):(p.dt_pagamento?(+(p.valor_pago||p.valor||0)):null);
      const pgtoForma=jaEstaPago?(existe.forma_pagamento||p.forma_nome||desp.forma_nome||''):(p.forma_nome||desp.forma_nome||'');
      const pgtoObs=jaEstaPago?(existe.observacao||'Espelhado automaticamente de Despesas'):'Espelhado automaticamente de Despesas';
      const base={
        empresa:existe?.empresa||p.empresa||desp.empresa||null,
        data_lanc:desp.data_lancamento||today(),
        tipo_despesa:p.cat_nome||p.categoria||desp.cat_nome||'Despesa',
        fornecedor:p.forn_nome||desp.forn_nome||'',
        parcela:parcelaTxt,
        vencimento:p.vencimento||desp.data_primeira||today(),
        valor:+(p.valor||0),
        descricao_adicional:p.descricao||desp.descricao||'',
        forma_pagamento:pgtoForma,
        categoria:p.cat_nome||p.categoria||desp.cat_nome||'',
        status:pgtoStatus,
        data_pagamento:pgtoData,
        valor_pago:pgtoValor,
        observacao:pgtoObs,
        origem_tipo:'despesas',
        origem_id:p.despesa_id||desp.id||null
      };
      if(colsCP.has('conta_bancaria_id')) base.conta_bancaria_id=jaEstaPago
        ?(existe.conta_bancaria_id??p.conta_id??desp.conta_id??null)
        :(p.conta_id||desp.conta_id||null);
      if(colsCP.has('baixado_por')&&jaEstaPago) base.baixado_por=existe.baixado_por||'';
      if(colsCP.has('baixado_em') &&jaEstaPago) base.baixado_em=existe.baixado_em||null;
      if(colsCP.has('nf_id')) base.nf_id=nfId;
      if(colsCP.has('nf_numero')) base.nf_numero=nf?.numero||existe?.nf_numero||null;
      if(colsCP.has('nf_num')) base.nf_num=nf?.numero||existe?.nf_num||null;
      if(colsCP.has('nf_incompleta')) base.nf_incompleta=nf?nfEhIncompleta(nf):!!(existe?.nf_incompleta);
      if(colsCP.has('nf_irregular')) base.nf_irregular=nf?!!(nf.irregular||nfEhIncompleta(nf)):!!(existe?.nf_irregular);
      if(colsCP.has('comprovante')) base.comprovante=existe?.comprovante||null;
      if(colsCP.has('tipo_comprovante')) base.tipo_comprovante=existe?.tipo_comprovante||null;
      if(colsCP.has('comprovante_status')) base.comprovante_status=existe?.comprovante_status||null;
      if(existe) await dbSafeUpdate('contas_pagar',base,'id',existe.id);
      else await dbAdd('contas_pagar',base);
    }
  }catch(e){console.warn('syncContasPagarComDespesas',e);}finally{_syncCPRunning=false;}
}
async function setComprovanteStatus(tbl,id,status){
  // Tenta todos os 3 nomes de coluna possíveis; dbSafeUpdate remove os inexistentes
  const up={comprovante_status:status,tipo_comprovante:status,comprovante:status};
  const ok=await dbSafeUpdate(tbl,up,'id',id);
  if(!ok)toast('Tabela sem campo de comprovante.','info');
}

function cpToggle(id,checked){if(checked)cpSel.add(id);else cpSel.delete(id);}
function cpTogAll(checked,isPaid){cpRec.filter(r=>(r.status==='paid')===isPaid).forEach(r=>{if(checked)cpSel.add(r.id);else cpSel.delete(r.id);});}

async function cpAbrirForm(id=null){
  cpEditId=id||null;
  // Busca registro — usa comparação por string para evitar mismatch de tipo
  let rec=id?cpRec.find(r=>String(r.id)===String(id)):null;
  // Se não encontrou no cache, busca direto no banco
  if(id&&!rec){
    rec=await dbGet('contas_pagar',id);
    if(rec&&!cpRec.find(r=>String(r.id)===String(id)))cpRec=[...cpRec,rec];
  }
  const forns=[...new Set(cpRec.map(r=>r.fornecedor).filter(Boolean))];
  document.getElementById('cpf-forn-list').innerHTML=forns.map(f=>`<option>${esc(f)}</option>`).join('');
  // Load categories dynamically with subcategoria
  const _allCats=await dbGet('categorias_despesa');
  document.getElementById('cpf-cat-list').innerHTML=_allCats.filter(c=>c.ativo).map(c=>`<option value="${esc(c.nome+(c.subcategoria?' / '+c.subcategoria:''))}">${esc(c.nome+(c.subcategoria?' / '+c.subcategoria:''))}</option>`).join('');
  document.getElementById('cpfm-title').textContent=id?'Editar Conta a Pagar':'Nova Conta a Pagar';
  document.getElementById('cpf-empresa').value=rec?.empresa||(['DL','MG'].includes(currentEmpresa)?currentEmpresa:'DL');
  document.getElementById('cpf-dlanc').value=rec?.data_lanc||today();
  document.getElementById('cpf-venc').value=rec?.vencimento||today();
  document.getElementById('cpf-tipo').value=rec?.tipo_despesa||'';
  document.getElementById('cpf-forn').value=rec?.fornecedor||'';
  document.getElementById('cpf-parc').value=rec?.parcela||'1/1';
  document.getElementById('cpf-val').value=rec?.valor??'';
  document.getElementById('cpf-rec').value='1';
  document.getElementById('cpf-total').value='';
  document.getElementById('cpf-desc').value=rec?.descricao_adicional||'';
  document.getElementById('cpf-forma').value=rec?.forma_pagamento||'PIX';
  document.getElementById('cpf-cat').value=rec?.categoria||'';
  document.getElementById('cpf-nat').value=rec?.natureza||'DESP_OPERACIONAL';
  document.getElementById('cpf-dpgto').value=rec?.data_pagamento||'';
  document.getElementById('cpf-vpago').value=rec?.valor_pago??'';
  document.getElementById('cpf-status').value=rec?.status||'open';
  document.getElementById('cpf-obs').value=rec?.observacao||'';

}

function cpCalcTotal(){const v=parseFloat(document.getElementById('cpf-val')?.value)||0;const r=parseInt(document.getElementById('cpf-rec')?.value)||1;const el=document.getElementById('cpf-total');if(el)el.value=v>0?`${R$(v)} × ${r} = ${R$(v*r)}`:''}

async function cpSalvar(){
  const _empCP=document.getElementById('cpf-empresa')?.value||'';
  if(!['DL','MG'].includes(_empCP)){toast('Selecione DL ou MG no campo Empresa!','err');return;}
  const forn=document.getElementById('cpf-forn').value.trim();
  const venc=document.getElementById('cpf-venc').value;
  const valor=Number(document.getElementById('cpf-val').value||0);
  const rec=parseInt(document.getElementById('cpf-rec').value)||1;
  if(!forn||!venc||!valor){toast('Preencha fornecedor, vencimento e valor!','err');return;}
  // Monta objeto base com campos garantidos
  const baseCore={
    empresa:document.getElementById('cpf-empresa').value,
    data_lanc:document.getElementById('cpf-dlanc').value,
    tipo_despesa:document.getElementById('cpf-tipo').value.trim(),
    fornecedor:forn,vencimento:venc,valor,
    descricao_adicional:document.getElementById('cpf-desc').value.trim(),
    forma_pagamento:document.getElementById('cpf-forma').value,
    categoria:document.getElementById('cpf-cat').value.trim(),
    data_pagamento:document.getElementById('cpf-dpgto').value||null,
    valor_pago:document.getElementById('cpf-vpago').value?Number(document.getElementById('cpf-vpago').value):null,
    status:document.getElementById('cpf-status').value,
    observacao:document.getElementById('cpf-obs').value.trim()
  };
  // Adiciona campos opcionais se existirem na tabela
  const colsCP=await dbColunas('contas_pagar');
  const base={...baseCore};
  if(colsCP.has('natureza'))base.natureza=document.getElementById('cpf-nat').value;
  if(colsCP.has('comprovante'))base.comprovante=document.getElementById('cpf-comprovante').value;
  if(colsCP.has('tipo_comprovante'))base.tipo_comprovante=document.getElementById('cpf-comprovante').value;
  if(colsCP.has('baixado_por'))base.baixado_por='';
  if(colsCP.has('baixado_em'))base.baixado_em=null;
  try{
    if(cpEditId){
      base.parcela=document.getElementById('cpf-parc').value||'1/1';
      await dbSafeUpdate('contas_pagar',base,'id',cpEditId);
      toast('Atualizado!','ok');
    }else{
      for(let i=0;i<rec;i++){
        await dbAdd('contas_pagar',{...base,vencimento:addMonths(venc,i),parcela:rec>1?`${i+1}/${rec}`:'1/1'});
      }
      toast(rec>1?`${rec} parcelas criadas!`:'Salvo!','ok');
    }
    document.getElementById('cp-form-modal').classList.remove('open');
    confirmarSalvo(
      cpEditId?'Conta a pagar atualizada!':'Conta(s) a pagar criada(s)!',
      `${empLabel(document.getElementById('cpf-empresa')?.value||'')} · ${forn} · ${R$(valor)}`
    );
    if(currentPage==='despesas') pgDespesas(document.getElementById('content'));
    else PAGES.contas_pagar(document.getElementById('content'));
  }catch(e){toast('Erro: '+(e.message||String(e)),'err');}
}

async function cpAbrirBaixa(id){
  const rec=cpRec.find(r=>r.id===id)||await dbGet('contas_pagar',id);
  if(!rec){toast('Registro não encontrado','err');return;}
  if(!cpRec.find(r=>r.id===id)) cpRec=[...cpRec,rec];
  const contas=await dbGet('contas');

  // ✅ FIX: garante que o modal existe no DOM (pode ser chamado de qualquer página)
  if(!document.getElementById('cp-baixa-modal')){
    const wrap=document.createElement('div');
    wrap.innerHTML=cpBaixaModal();
    document.body.appendChild(wrap.firstElementChild);
  }
  if(!document.getElementById('cp-form-modal')){
    const wrap=document.createElement('div');
    wrap.innerHTML=cpFormModal();
    document.body.appendChild(wrap.firstElementChild);
  }

  document.getElementById('bx-id').value=id;
  document.getElementById('bx-descricao').value=rec.tipo_despesa||'';
  document.getElementById('bx-desc2').value=rec.descricao_adicional||'';
  document.getElementById('bx-forn').value=rec.fornecedor||'';
  document.getElementById('bx-parc').textContent=rec.parcela||'1/1';
  document.getElementById('bx-venc').textContent=fDate(rec.vencimento);
  document.getElementById('bx-valor').textContent=R$(rec.valor);
  // ✅ FIX: filtra contas pela empresa da despesa + String() para selected correto
  const contasDaEmpresa=contas.filter(ct=>(ct.empresa||'DL')===(rec.empresa||'DL'));
  const contasOpt=contasDaEmpresa.length>0?contasDaEmpresa:contas;
  const contaSel=document.getElementById('bx-conta');
  if(contasOpt.length>0){
    contaSel.innerHTML=contasOpt.map(ct=>`<option value="${ct.id}" ${String(ct.id)===String(rec.conta_bancaria_id)?'selected':''}>${esc(ct.nome)}${ct.banco?' — '+esc(ct.banco):''}</option>`).join('');
  } else {
    contaSel.innerHTML='<option value="">⚠️ Cadastre contas em Config → Cadastros → Contas</option>';
  }
  document.getElementById('bx-forma').value=rec.forma_pagamento||'PIX';
  document.getElementById('bx-data').value=rec.data_pagamento||today();
  document.getElementById('bx-valor-pago').value=rec.valor_pago||rec.valor||'';
  document.getElementById('bx-obs').value=rec.observacao||'';
  const pw=document.getElementById('bx-partial-warn');if(pw)pw.style.display='none';
  const w=document.getElementById('bx-comprov-lbl');
  if(w){w.textContent=rec.comprovante_url?'✅ Comprovante anexado':'Comprovante não anexado';w.style.color=rec.comprovante_url?'var(--success)':'var(--danger)';}
  document.getElementById('cp-baixa-modal').classList.add('open');
}

async function cpFindLinkedParcela(rec){
  const parcelas=(await dbGet('parcelas_despesa'))||[];
  const parcTxt=String(rec?.parcela||'1/1').replace(' (saldo)','');

  if(String(rec?.origem_tipo||'')==='despesas' && rec?.origem_id){
    const direta=parcelas.find(p=>String(p.despesa_id||'')===String(rec.origem_id||'') && String((p.numero||1)+'/'+(p.total||1))===parcTxt);
    if(direta) return direta;
  }

  const forn=String(rec?.fornecedor||'').trim().toLowerCase();
  const venc=String(rec?.vencimento||'').slice(0,10);
  const emp=rec?.empresa||null;
  const valor=Number(rec?.valor||0);
  const cand=parcelas.find(p=>{
    const pParc=String((p.numero||1)+'/'+(p.total||1));
    const pForn=String(p.forn_nome||'').trim().toLowerCase();
    const pVenc=String(p.vencimento||'').slice(0,10);
    const pEmp=p.empresa||null;
    const pValor=Number(p.valor||0);
    const _empM=emp?pEmp===emp:true;// sem empresa: não filtra
    return pParc===parcTxt && _empM && pForn===forn && pVenc===venc && Math.abs(pValor-valor)<0.01;
  });
  return cand||null;
}

async function cpSyncDespesaPai(despesaId){
  if(!despesaId) return;
  const parcelas=(await dbGet('parcelas_despesa'))||[];
  const itens=parcelas.filter(p=>String(p.despesa_id||'')===String(despesaId));
  if(!itens.length) return;
  const pagas=itens.filter(p=>!!p.dt_pagamento);
  const abertas=itens.filter(p=>!p.dt_pagamento);
  const payload={
    situacao: abertas.length===0 ? 'pago' : (pagas.length>0 ? 'parcial' : 'aberto'),
    data_pagamento: pagas.length? pagas.map(p=>p.dt_pagamento).sort().slice(-1)[0] : null,
    conta_id: pagas.length? (pagas.map(p=>p.conta_id).filter(Boolean).slice(-1)[0]||null) : null,
    conta_nome: pagas.length? (pagas.map(p=>p.conta_nome).filter(Boolean).slice(-1)[0]||null) : null,
    forma_nome: pagas.length? (pagas.map(p=>p.forma_nome).filter(Boolean).slice(-1)[0]||null) : null
  };
  await dbSafeUpdate('despesas',payload,'id',despesaId);
}

async function cpDedupMesmoEspelho(rec,keepId){
  const all=(await dbGet('contas_pagar'))||[];
  const parcTxt=String(rec.parcela||'1/1').replace(' (saldo)','');
  const dups=all.filter(r=>Number(r.id)!==Number(keepId)
    && String(r.origem_tipo||'')===String(rec.origem_tipo||'')
    && String(r.origem_id||'')===String(rec.origem_id||'')
    && String(r.parcela||'').replace(' (saldo)','')===parcTxt);
  for(const dup of dups){
    try{ await dbDel('contas_pagar',dup.id); }catch(e){ console.warn('cp duplicate cleanup',dup.id,e); }
  }
}

async function bxConfirmar(){
  const id=parseInt(document.getElementById('bx-id').value);
  const data=document.getElementById('bx-data').value;
  const valor=parseFloat(document.getElementById('bx-valor-pago').value);
  const forma=document.getElementById('bx-forma').value;
  const contaId=parseInt(document.getElementById('bx-conta').value)||null;
  const obs=document.getElementById('bx-obs')?.value||'';
  if(!data||!valor){toast('Preencha data e valor!','err');return;}
  const rec=cpRec.find(r=>r.id===id);if(!rec)return;
  const valorOrig=parseFloat(rec.valor||0);
  const isPartial=valor<valorOrig-0.01;
  try{
    const contas=(await dbGet('contas'))||[];
    const contaRef=contas.find(c=>String(c.id)===String(contaId));
    const parcelaRef=await cpFindLinkedParcela(rec);

    await dbSafeUpdate('contas_pagar',{
      status:'paid',data_pagamento:data,valor_pago:valor,
      forma_pagamento:forma,conta_bancaria_id:contaId,
      baixado_por:currentUser?.nome||'',baixado_em:new Date().toISOString(),
      observacao:obs||rec.observacao||null
    },'id',id);

    if(parcelaRef?.id){
      await dbSafeUpdate('parcelas_despesa',{
        dt_pagamento:data,
        valor_pago:valor,
        conta_id:contaId||null,
        conta_nome:contaRef?.nome||parcelaRef.conta_nome||null,
        forma_nome:forma||parcelaRef.forma_nome||null,
        descricao:parcelaRef.descricao||rec.descricao_adicional||null,
        forn_nome:parcelaRef.forn_nome||rec.fornecedor||null,
        cat_nome:parcelaRef.cat_nome||rec.categoria||rec.tipo_despesa||null,
        categoria:parcelaRef.categoria||rec.categoria||rec.tipo_despesa||null
      },'id',parcelaRef.id);
    }

    // FIX-PERF: fecha modal e mostra toast ANTES de processar resto
    document.getElementById('cp-baixa-modal')?.classList.remove('open');
    // Fecha modal antes de processar saldo
    document.getElementById('cp-baixa-modal')?.classList.remove('open');
    if(isPartial){
      const saldo=+(valorOrig-valor).toFixed(2);
      confirmarSalvo(
        `Baixa parcial registrada!`,
        `${empLabel(rec.empresa)} · ${rec.fornecedor||''} · Pago: ${R$(valor)} · Saldo: ${R$(saldo)}`
      );
      await dbAdd('contas_pagar',{
        empresa:rec.empresa||null,
        data_lanc:today(),
        tipo_despesa:rec.tipo_despesa,
        fornecedor:rec.fornecedor,
        parcela:(rec.parcela||'1/1')+' (saldo)',
        vencimento:rec.vencimento,
        valor:saldo,
        descricao_adicional:`Saldo pgto parcial — original: ${R$(valorOrig)} — pago: ${R$(valor)}`,
        forma_pagamento:rec.forma_pagamento,
        categoria:rec.categoria,
        natureza:rec.natureza||'DESP_OPERACIONAL',
        status:'open',
        observacao:`Gerado automaticamente em ${fDate(data)}`,
        origem_tipo:rec.origem_tipo||null,
        origem_id:rec.origem_id||null
      });
      toast(`✅ Baixa parcial! Saldo de ${R$(saldo)} criado como nova conta.`,'info');
    } else {
      confirmarSalvo(
        'Baixa realizada com sucesso!',
        `${empLabel(rec.empresa)} · ${rec.fornecedor||''} · ${R$(valor)} · ${fDate(data)}`
      );
    }

    await cpDedupMesmoEspelho(rec,id);
    if(rec.origem_id) await cpSyncDespesaPai(rec.origem_id);
    // Atualiza cache imediatamente
    cpRec=cpRec.map(r=>r.id===id?{...r,status:'paid',data_pagamento:data,valor_pago:valor,forma_pagamento:forma,conta_bancaria_id:contaId}:r);
    // Atualiza cache em memória imediatamente — render não mostra estado antigo
    cpRec=cpRec.map(r=>r.id===id?{...r,status:'paid',data_pagamento:data,valor_pago:valor,forma_pagamento:forma,conta_bancaria_id:contaId,observacao:obs||rec.observacao||null}:r);

    if(rec.conta_contabil){
      try{await dbAdd('lancamentos_contabeis',{empresa:rec.empresa||'DL',data_competencia:data,data_caixa:data,historico:`Pgto ${rec.fornecedor} — ${rec.tipo_despesa||'Despesa'}`,valor,conta_debito:rec.conta_contabil,conta_credito:'1.1.01',origem_tipo:'contas_pagar',origem_id:id});}
      catch(e2){console.warn('lancamentos_contabeis skipped:',e2.message);}
    }
    // Render sem await — UI já está responsiva (modal foi fechado antes)
    if(currentPage==='despesas') pgDespesas(document.getElementById('content'));
    else if(currentPage==='contas_bancarias') PAGES.contas_bancarias(document.getElementById('content'));
    else PAGES.contas_pagar(document.getElementById('content'));
  }catch(e){toast('Erro: '+e.message,'err');}
}

async function bxExcluir(){
  const id=parseInt(document.getElementById('bx-id').value);
  const rec=cpRec.find(r=>r.id===id);
  if(!(await confirm2('Excluir este lançamento? Se ele estiver vinculado à despesa, a parcela correspondente também será sincronizada/excluída.')))return;
  try{
    if(rec){
      const parcelaRef=await cpFindLinkedParcela(rec);
      if(parcelaRef?.id){
        await dbDel('parcelas_despesa',parcelaRef.id);
        const restantes=((await dbGet('parcelas_despesa'))||[]).filter(p=>String(p.despesa_id||'')===String(rec.origem_id||''));
        if(!restantes.length){
          try{ await dbDel('despesas',rec.origem_id); }catch(e){ console.warn('delete despesa pai',e); }
        }else{
          await cpSyncDespesaPai(rec.origem_id);
        }
      }
    }
    const { error } = await supa.from('contas_pagar').delete().eq('id',id);
    if(error) throw error;
    await syncContasPagarComDespesas();
    cpRec=cpRec.filter(r=>r.id!==id);
    cpSel.delete(id);
    document.getElementById('cp-baixa-modal')?.classList.remove('open');
    toast('Lançamento excluído e sincronizado!','ok');
    if(PAGES?.contas_bancarias && currentPage==='contas_bancarias') await PAGES.contas_bancarias(document.getElementById('content'));
    else await PAGES.contas_pagar(document.getElementById('content'));
  }catch(e){toast('Erro ao excluir: '+(e.message||String(e)),'err');}
}

async function cpBaixarSel(){
  const ids=[...cpSel];if(!ids.length){toast('Selecione ao menos uma conta','info');return;}
  if(ids.length===1){await cpAbrirBaixa(ids[0]);return;}
  const date=prompt('Data do pagamento (AAAA-MM-DD):',today());if(!date)return;
  for(const id of ids){
    const rec=cpRec.find(r=>r.id===id);
    await dbSafeUpdate('contas_pagar',{status:'paid',data_pagamento:date,valor_pago:rec?.valor,baixado_por:currentUser?.nome||''},'id',id);
  }
  cpSel.clear();toast(`${ids.length} conta(s) baixada(s)!`,'ok');
  if(currentPage==='despesas') await pgDespesas(document.getElementById('content'));
  else await PAGES.contas_pagar(document.getElementById('content'));
}

function cpImprimir(mode){

  <tr class="total-row"><td colspan="6"><strong>TOTAL</strong></td><td class="mono"><strong>${R$(tot)}</strong></td><td colspan="4">Qtd: ${rows.length}</td></tr></tbody></table>`,

        <select class="field" style="width:110px" id="dre-mo"><option value="">Ano todo</option>${mNames.map((m,i)=>`<option value="${String(i+1).padStart(2,'0')}">${m}</option>`).join('')}</select>

async function dreCalc(){
  const emp=document.getElementById('dre-emp').value;
  const yr=document.getElementById('dre-yr').value;
  const mo=document.getElementById('dre-mo').value;
  const body=document.getElementById('dre-body');
  body.innerHTML='<div class="notice">⏳ Calculando...</div>';
  const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);
  const period=(arr,campo)=>arr.filter(r=>{
    if(emp!=='GERAL'&&r.empresa!==emp)return false;
    const d=r[campo];if(!d)return false;
    if(!d.startsWith(yr))return false;
    if(mo&&d.slice(5,7)!==mo)return false;
    return true;
  });
  const fPR=period(pr,'dt_pagamento'),fPD=period(pd,'dt_pagamento'),fCP=period(cp,'data_pagamento').filter(r=>r.status==='paid');
  const sumN=(arr,nat)=>arr.filter(p=>(p.natureza||'DESP_OPERACIONAL')===nat).reduce((s,p)=>s+(+p.valor_pago||+p.valor||0),0);
  // FIX-4: CP no DRE só conta lançamentos SEM origem em parcelas_despesa (evita dupla contagem)
  const _cpSemDupl=fCP.filter(r=>!r.origem_tipo||r.origem_tipo!=='despesas');
  const sumCP=(nat)=>_cpSemDupl.filter(r=>(r.natureza||'DESP_OPERACIONAL')===nat).reduce((s,r)=>s+(+(r.valor_pago!=null?r.valor_pago:(r.valor||0))),0);
  const recBruta=fPR.filter(p=>(p.natureza||'RECEITA_BRUTA')!=='DEDUCAO'&&(p.natureza||'RECEITA_BRUTA')!=='RECEITA_FINANCEIRA').reduce((s,p)=>s+(+p.valor_pago||0),0);
  const deducoes=fPR.filter(p=>p.natureza==='DEDUCAO').reduce((s,p)=>s+(+p.valor_pago||0),0);
  const recLiq=recBruta-deducoes;
  const cmv=sumN(fPD,'CMV')+sumCP('CMV');
  const lubroBruto=recLiq-cmv;
  const despPessoal=sumN(fPD,'PESSOAL')+sumCP('PESSOAL');
  const despOp=sumN(fPD,'DESP_OPERACIONAL')+sumCP('DESP_OPERACIONAL');
  const despTrib=sumN(fPD,'TRIBUTARIA')+sumCP('TRIBUTARIA');
  const despImport=sumN(fPD,'IMPORTACAO')+sumCP('IMPORTACAO');
  const despCartao=sumN(fPD,'CARTAO')+sumCP('CARTAO');
  const totalDespOp=despPessoal+despOp+despTrib+despImport+despCartao;
  const ebit=lubroBruto-totalDespOp;
  const recFin=fPR.filter(p=>p.natureza==='RECEITA_FINANCEIRA').reduce((s,p)=>s+(+p.valor_pago||0),0);
  const despFin=sumN(fPD,'DESP_FINANCEIRA')+sumCP('DESP_FINANCEIRA');
  const resFin=recFin-despFin;
  const lucroLiq=ebit+resFin;
  const catMap={};
  [...fPD,...fCP.map(r=>({...r,cat_nome:r.tipo_despesa||r.categoria}))].forEach(p=>{const k=p.cat_nome||p.categoria||'Outros';catMap[k]=(catMap[k]||0)+(+p.valor_pago||+p.valor||0);});
  const topCat=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const mNames=['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const periodo=mo?`${mNames[parseInt(mo)]}/${yr}`:`Ano ${yr}`;
  const dreHtml=`
    <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;text-align:center;margin-bottom:12px">${emp==='GERAL'?'DL + MG Consolidado':emp} — ${periodo}</div>
    <div class="dre-group rec"><span>RECEITA OPERACIONAL BRUTA</span><span class="mono" style="color:var(--success)">${R$(recBruta)}</span></div>
    ${deducoes>0?`<div class="dre-row"><span style="color:var(--muted)">(-) Deduções da Receita</span><span class="mono" style="color:var(--danger)">(${R$(deducoes)})</span></div>`:''}
    <div class="dre-subtotal"><span>= RECEITA LÍQUIDA</span><span class="mono" style="color:var(--success)">${R$(recLiq)}</span></div>
    ${cmv>0?`<div class="dre-group cost"><span>(-) CMV</span><span class="mono" style="color:var(--danger)">(${R$(cmv)})</span></div>`:''}
    <div class="dre-total ${lubroBruto>=0?'lucro':'prejuizo'}"><span>= LUCRO BRUTO</span><span class="mono">${R$(lubroBruto)}</span></div>
    <div class="dre-group desp"><span>(-) DESPESAS OPERACIONAIS</span><span class="mono" style="color:var(--warn)">(${R$(totalDespOp)})</span></div>
    ${despPessoal>0?`<div class="dre-row"><span>Pessoal</span><span class="mono" style="color:var(--danger)">(${R$(despPessoal)})</span></div>`:''}
    ${despOp>0?`<div class="dre-row"><span>Administrativas/Operacionais</span><span class="mono" style="color:var(--danger)">(${R$(despOp)})</span></div>`:''}
    ${despTrib>0?`<div class="dre-row"><span>Tributárias</span><span class="mono" style="color:var(--danger)">(${R$(despTrib)})</span></div>`:''}
    ${despImport>0?`<div class="dre-row"><span>Importação</span><span class="mono" style="color:var(--danger)">(${R$(despImport)})</span></div>`:''}
    ${despCartao>0?`<div class="dre-row"><span>Cartão</span><span class="mono" style="color:var(--danger)">(${R$(despCartao)})</span></div>`:''}
    <div class="dre-subtotal"><span>= RESULTADO OPERACIONAL (EBIT)</span><span class="mono" style="color:${ebit>=0?'var(--info)':'var(--danger)'}">${R$(ebit)}</span></div>
    ${(recFin>0||despFin>0)?`<div class="dre-group res"><span>RESULTADO FINANCEIRO</span><span class="mono">${R$(resFin)}</span></div>${recFin>0?`<div class="dre-row"><span>(+) Receitas Financeiras</span><span class="mono" style="color:var(--success)">${R$(recFin)}</span></div>`:''}${despFin>0?`<div class="dre-row"><span>(-) Despesas Financeiras</span><span class="mono" style="color:var(--danger)">(${R$(despFin)})</span></div>`:''}`:''}
    <div class="dre-total ${lucroLiq>=0?'lucro':'prejuizo'}" style="font-size:17px"><span>${lucroLiq>=0?'✅ LUCRO LÍQUIDO':'❌ PREJUÍZO'} DO PERÍODO</span><span class="mono">${R$(lucroLiq)}</span></div>
    ${lucroLiq>0&&recLiq>0?`<div class="notice green" style="margin-top:8px">Margem Líquida: <strong>${(lucroLiq/recLiq*100).toFixed(1)}%</strong> | Margem Bruta: ${lubroBruto>0?(lubroBruto/recLiq*100).toFixed(1)+'%':'—'} | EBIT: ${R$(ebit)}</div>`:''}`;
  body.innerHTML=`<div style="max-width:820px">${dreHtml}</div>
  <div class="card" style="margin-top:14px"><div class="section-title">📋 Detalhe por Categoria</div>
    ${tbl(['Categoria','Valor','% Rec. Líq.','% Total Desp.'],topCat.map(([cat,val])=>`<tr><td>${esc(cat)}</td><td class="mono" style="color:var(--danger)">${R$(val)}</td><td class="mono">${recLiq>0?(val/recLiq*100).toFixed(1)+'%':'—'}</td><td class="mono">${totalDespOp+cmv>0?(val/(totalDespOp+cmv)*100).toFixed(1)+'%':'—'}</td></tr>`))}
  </div>`;
  window._dreData={dreHtml,emp,periodo};
}
function dreImprimir(){if(!window._dreData){toast('Gere o DRE primeiro','info');return;}printReport(`<div class="section-head">DRE — ${window._dreData.periodo}</div>${window._dreData.dreHtml}`,'DEMONSTRAÇÃO DO RESULTADO DO EXERCÍCIO',`${window._dreData.emp==='GERAL'?'DL + MG Consolidado':window._dreData.emp} — ${window._dreData.periodo}`);}

PAGES.balanco=async function(c){
  const now=new Date();const yr=now.getFullYear();
  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:16px">
    <div class="sec-head"><div><div class="page-title">⚖️ Balanço Patrimonial</div></div>
      <div class="toolbar">
        <select class="field" style="width:150px" id="bp-emp"><option value="GERAL">Geral</option><option value="DL">DUARTE LACERDA</option><option value="MG">MINEIRINHO</option></select>
        <select class="field" style="width:96px" id="bp-yr">${[yr,yr-1,yr-2].map(y=>`<option value="${y}">${y}</option>`).join('')}</select>
        <button class="btn info small" onclick="bpCalc()">⚖️ Gerar</button>
        <button class="btn secondary small" onclick="bpImprimir()">🖨 Imprimir</button>
      </div>
    </div>
    <div id="bp-body"><div class="notice">Clique em Gerar para calcular o Balanço.</div></div>
  </div>`;
  document.getElementById('bp-emp').value=currentEmpresa;
  await bpCalc();
};
async function bpCalc(){
  const emp=document.getElementById('bp-emp').value;const yr=document.getElementById('bp-yr').value;
  const body=document.getElementById('bp-body');body.innerHTML='<div class="notice">⏳ Calculando...</div>';
  const [pr,pd,cp,contas,lancCartao]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar'),dbGet('contas'),dbGet('lancamentos_cartao')]);
  const fE=arr=>emp==='GERAL'?arr:arr.filter(r=>(r.empresa||'DL')===emp);
  const saldoContas=fE(contas).reduce((s,ct)=>s+(+ct.saldo_inicial||0),0);
  const recebido=fE(pr).filter(p=>p.dt_pagamento?.startsWith(yr)).reduce((s,p)=>s+(+p.valor_pago||0),0);
  const pagoD=fE(pd).filter(p=>p.dt_pagamento?.startsWith(yr)).reduce((s,p)=>s+(+p.valor_pago||0),0);
  const pagoCP=fE(cp).filter(r=>r.status==='paid'&&r.data_pagamento?.startsWith(yr)).reduce((s,r)=>s+(+(r.valor_pago!=null?r.valor_pago:(r.valor||0))),0);
  const disponivel=saldoContas+recebido-pagoD-pagoCP;
  const aReceber=fE(pr).filter(p=>!p.dt_pagamento).reduce((s,p)=>s+(+p.valor||0),0);
  const aFornec=fE(cp).filter(r=>r.status!=='paid').reduce((s,r)=>s+(+r.valor||0),0);
  const totalCartao=fE(lancCartao,'empresa').reduce((s,l)=>s+(+l.valor||0),0);
  const fatFechado=fE(cp).filter(r=>r.natureza==='CARTAO').reduce((s,r)=>s+(+r.valor||0),0);
  const cartPend=Math.max(0,totalCartao-fatFechado);
  const atCir=disponivel+aReceber;const pasCir=aFornec+cartPend;
  const pl=atCir-pasCir;const totalAt=atCir;const totalPas=pasCir+Math.max(0,pl);
  const lucroAno=recebido-pagoD-pagoCP;
  const bpHtml=`<div class="grid g2">
    <div>
      <div class="dre-group rec" style="font-size:15px;font-weight:900">ATIVO <span class="mono">${R$(totalAt)}</span></div>
      <div class="dre-group" style="border-color:var(--info);background:var(--info-soft)">ATIVO CIRCULANTE <span class="mono">${R$(atCir)}</span></div>
      <div class="dre-row"><span>Disponível em Conta (Estimado)</span><span class="mono" style="color:var(--success)">${R$(disponivel)}</span></div>
      ${aReceber>0?`<div class="dre-row"><span>Contas a Receber</span><span class="mono" style="color:var(--warn)">${R$(aReceber)}</span></div>`:''}
      <div class="dre-subtotal">= Total Ativo Circulante<span class="mono">${R$(atCir)}</span></div>
    </div>
    <div>
      <div class="dre-group cost" style="font-size:15px;font-weight:900">PASSIVO + PL <span class="mono">${R$(totalPas)}</span></div>
      <div class="dre-group" style="border-color:var(--danger);background:var(--danger-soft)">PASSIVO CIRCULANTE <span class="mono">${R$(pasCir)}</span></div>
      ${aFornec>0?`<div class="dre-row"><span>Fornecedores / A Pagar</span><span class="mono" style="color:var(--danger)">${R$(aFornec)}</span></div>`:''}
      ${cartPend>0?`<div class="dre-row"><span>Cartões (Pendentes)</span><span class="mono" style="color:var(--danger)">${R$(cartPend)}</span></div>`:''}
      <div class="dre-subtotal">= Total Passivo Circulante<span class="mono" style="color:var(--danger)">${R$(pasCir)}</span></div>
      <div class="dre-group res" style="margin-top:8px">PATRIMÔNIO LÍQUIDO <span class="mono" style="color:var(--purple)">${R$(pl)}</span></div>
      <div class="dre-row" style="font-weight:700"><span>Resultado do Exercício ${yr}</span><span class="mono" style="color:${lucroAno>=0?'var(--success)':'var(--danger)'}">${R$(lucroAno)}</span></div>
      <div class="dre-subtotal">= Total PL<span class="mono" style="color:var(--purple)">${R$(pl)}</span></div>
    </div>
  </div>
  <div class="notice ${Math.abs(totalAt-(pasCir+pl))<1?'green':'amber'}" style="margin-top:12px">
    Ativo (${R$(totalAt)}) = Passivo (${R$(pasCir)}) + PL (${R$(pl)}) ${Math.abs(totalAt-(pasCir+pl))<1?'✅ Balanceado':'⚠️ Diferença: '+R$(totalAt-(pasCir+pl))}
  </div>`;
  body.innerHTML=bpHtml;window._bpData={bpHtml,emp,yr};
}
function bpImprimir(){if(!window._bpData)return;printReport(window._bpData.bpHtml,'BALANÇO PATRIMONIAL',`Empresa: ${window._bpData.emp} — Exercício: ${window._bpData.yr}`);}

    <div class="sec-head"><div><div class="page-title">📋 Plano de Contas</div></div>

      <div class="frow c2">
        <div class="form-group"><label class="form-label">Código *</label><input class="field" id="pc-cod"></div>
        <div class="form-group"><label class="form-label">Tipo *</label><select class="field" id="pc-tipo"><option value="ATIVO">ATIVO</option><option value="PASSIVO">PASSIVO</option><option value="PL">PL</option><option value="RECEITA">RECEITA</option><option value="CUSTO">CUSTO</option><option value="DESPESA">DESPESA</option></select></div>
        <div class="form-group"><label class="form-label">Sub-tipo</label><select class="field" id="pc-subtipo"><option>CIRCULANTE</option><option>NAO_CIRCULANTE</option><option>OPERACIONAL</option><option>FINANCEIRA</option><option>CMV</option><option>IMPORTACAO</option><option>TRIBUTARIA</option><option>PESSOAL</option></select></div>
        <div class="form-group"><label class="form-label">Empresa</label><select class="field" id="pc-emp"><option value="AMBAS">Ambas</option><option value="DL">DUARTE LACERDA</option><option value="MG">MINEIRINHO</option></select></div>

        <div class="form-group"><label class="form-label">Grupo</label><input class="field" id="pc-grupo"></div>

async function recAbrirForm(id=null){
  const modal=document.getElementById('modal-rec'); if(!modal) return;
  const head=modal.querySelector('.modal-box h3');
  const foot=modal.querySelector('.modal-foot');
  const oldDel=foot.querySelector('.btn-rec-del'); if(oldDel) oldDel.remove();
  window._recEditId=id||null;
  const _recEmpDef=currentEmpresa!=='GERAL'?currentEmpresa:'DL';
  if(id){
    const receitas=await dbGet('receitas');
    const parcelas=await dbGet('parcelas_receita');
    const rec=(receitas||[]).find(r=>String(r.id)===String(id))||await dbGet('receitas',id);
    const pp=(parcelas||[]).filter(p=>String(p.receita_id||'')===String(id));
    const p0=pp[0]||{};
    // FIX: empresa vem do banco — nunca sobrescrever com switcher se registro tem empresa
    // Empresa real é priorizada das parcelas; se não existir, usa do registro pai
    const _recEmpReal=p0.empresa || rec?.empresa || null;
    document.getElementById('rec-emp').value=_recEmpReal||(['DL','MG'].includes(currentEmpresa)?currentEmpresa:'DL');
    // Aviso visual se empresa diverge do switcher
    if(_recEmpReal&&currentEmpresa!=='GERAL'&&_recEmpReal!==currentEmpresa){
      setTimeout(()=>{
        const sel=document.getElementById('rec-emp');
        if(sel){sel.style.outline='2px solid #b54708';sel.title='Atenção: empresa do registro é '+empLabel(_recEmpReal);}
      },100);
    }
    if(rec?.conta_id||p0.conta_id) document.getElementById('rec-conta').value=String(rec?.conta_id||p0.conta_id);
    else setSelectByText('rec-conta', rec?.conta_nome||p0.conta_nome||'');
    if(rec?.tipo_id) document.getElementById('rec-tipo').value=String(rec.tipo_id); else setSelectByText('rec-tipo', rec?.tipo_nome||p0.tipo_nome||p0.categoria||'');
    if(rec?.cliente_id) document.getElementById('rec-cli').value=String(rec.cliente_id); else setSelectByText('rec-cli', rec?.cliente_nome||p0.cliente_nome||'');
    if(rec?.forma_id) document.getElementById('rec-forma').value=String(rec.forma_id); else setSelectByText('rec-forma', rec?.forma_nome||p0.forma_nome||'');
    document.getElementById('rec-desc').value=rec?.descricao||p0.descricao||'';
    document.getElementById('rec-data1').value=rec?.data_primeira||p0.vencimento||today();
    document.getElementById('rec-recorr').value=(pp.length>1?'parcelada':'unica');
    document.getElementById('rec-valor').value=rec?.valor_parcela||p0.valor||'';
    document.getElementById('rec-qtde').value=rec?.qtde_parcelas||pp.length||1;
    parcRecTemp=pp.map(p=>({numero:+(p.numero||1),total:+(p.total||pp.length||1),vencimento:p.vencimento,valor:+(p.valor||0),recebido:!!p.dt_pagamento}));
    if(parcRecTemp.length){
      document.getElementById('tb-rec-parc').innerHTML=parcRecTemp.map((p,i)=>`<tr><td>${p.numero}/${p.total}</td><td>${fDate(p.vencimento)}</td><td class="mono" style="color:var(--success)">${R$(p.valor)}</td><td><input type="checkbox" ${p.recebido?'checked':''} onchange="parcRecTemp[${i}].recebido=this.checked"></td></tr>`).join('');
      document.getElementById('rec-parcelas-wrap').style.display='block';
    }
    recCalcTotal();
    head.textContent=`✏️ Editar Receita #${id}`;
    const delBtn=document.createElement('button');
    delBtn.className='btn danger btn-rec-del';
    delBtn.textContent='🗑️ Excluir';
    delBtn.onclick=async()=>{ if(await confirm2('Deletar esta receita?')) await excluirReceita(id); };
    foot.insertBefore(delBtn,foot.firstElementChild);
  }else{
    parcRecTemp=[];
    document.getElementById('rec-parcelas-wrap').style.display='none';
    document.getElementById('rec-emp').value=['DL','MG'].includes(currentEmpresa)?currentEmpresa:'DL';
    document.getElementById('rec-conta').selectedIndex=0;
    document.getElementById('rec-tipo').selectedIndex=0;
    document.getElementById('rec-cli').selectedIndex=0;
    document.getElementById('rec-forma').selectedIndex=0;
    ['rec-desc','rec-valor'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('rec-qtde').value='1';
    document.getElementById('rec-data1').value=today();
    document.getElementById('rec-recorr').value='unica';
    document.getElementById('rec-total-lbl').value='';
    head.textContent='💚 Nova Receita';
  }
  modal.classList.add('open');
}
function recCalcTotal(){const v=parseFloat(document.getElementById('rec-valor')?.value)||0;const q=parseInt(document.getElementById('rec-qtde')?.value)||1;const el=document.getElementById('rec-total-lbl');if(el)el.value=v>0?`${R$(v)} × ${q} = ${R$(v*q)}`:''}
function recToggleRecorr(){const r=document.getElementById('rec-recorr').value;const l=document.getElementById('lbl-rec-qtde');if(l)l.textContent=r==='mensal'?'Qtde Meses':'Qtde Parcelas';}
function recAddCat(){document.getElementById('modal-rec-cat').classList.add('open');const n=document.getElementById('rccat-nome');if(n)n.value='';}
function recAddCliente(){document.getElementById('modal-rec-cli').classList.add('open');const n=document.getElementById('rccli-nome');if(n)n.value='';}
async function recSalvarCat(){const nome=document.getElementById('rccat-nome').value.trim();if(!nome){toast('Nome obrigatório!','err');return;}const id=await dbAdd('categorias_receita',{nome,ativo:true});const sel=document.getElementById('rec-tipo');const opt=document.createElement('option');opt.value=id;opt.textContent=nome+(sub?' / '+sub:'');opt.selected=true;sel.appendChild(opt);document.getElementById('modal-rec-cat').classList.remove('open');toast('Categoria adicionada!','ok');}
async function recSalvarCliente(){const nome=document.getElementById('rccli-nome').value.trim();if(!nome){toast('Nome obrigatório!','err');return;}const id=await dbAdd('clientes',{nome,cpf_cnpj:document.getElementById('rccli-doc').value,telefone:document.getElementById('rccli-tel').value,ativo:true});const sel=document.getElementById('rec-cli');const opt=document.createElement('option');opt.value=id;opt.textContent=nome;opt.selected=true;sel.appendChild(opt);document.getElementById('modal-rec-cli').classList.remove('open');toast('Cliente adicionado!','ok');}
function gerarParcelasRec(){const data1=document.getElementById('rec-data1').value;const valor=parseFloat(document.getElementById('rec-valor').value)||0;const qtde=parseInt(document.getElementById('rec-qtde').value)||1;const prazo=parseInt(document.getElementById('rec-prazo').value)||0;if(!data1||valor<=0){toast('Preencha data e valor!','err');return;}parcRecTemp=[];for(let i=0;i<qtde;i++){let venc=addMonths(data1,i);if(prazo>0&&i===0){const d=new Date(data1+'T00:00:00');d.setDate(d.getDate()+prazo);venc=d.toISOString().split('T')[0];}parcRecTemp.push({numero:i+1,total:qtde,vencimento:venc,valor,recebido:false});}document.getElementById('tb-rec-parc').innerHTML=parcRecTemp.map((p,i)=>`<tr><td>${p.numero}/${p.total}</td><td>${fDate(p.vencimento)}</td><td class="mono" style="color:var(--success)">${R$(p.valor)}</td><td><input type="checkbox" ${p.recebido?'checked':''} onchange="parcRecTemp[${i}].recebido=this.checked"></td></tr>`).join('');document.getElementById('rec-parcelas-wrap').style.display='block';document.getElementById('rec-total-lbl').value=`${R$(valor)} × ${qtde} = ${R$(valor*qtde)}`;toast(`${qtde} parcela(s)!`,'ok');}
async function salvarReceita(){
  if(parcRecTemp.length===0){toast('Gere as parcelas primeiro!','err');return;}
  const _empRec=document.getElementById('rec-emp')?.value||'';
  if(!['DL','MG'].includes(_empRec)){toast('Selecione DL ou MG no campo Empresa!','err');return;}
  const valor=parseFloat(document.getElementById('rec-valor').value)||0;
  const qtde=parseInt(document.getElementById('rec-qtde').value)||1;
  if(valor<=0){toast('Informe o valor!','err');return;}
  try{
    const [cats,contas,clientes,formas]=await Promise.all([
      dbGet('categorias_receita'),dbGet('contas'),dbGet('clientes'),dbGet('formas_pagamento')
    ]);
    const emp=document.getElementById('rec-emp').value;
    const tipoId=parseInt(document.getElementById('rec-tipo').value)||0;
    const contaId=parseInt(document.getElementById('rec-conta').value)||0;
    const cliId=parseInt(document.getElementById('rec-cli').value)||0;
    const formaId=parseInt(document.getElementById('rec-forma').value)||0;
    const cat=cats.find(c=>c.id===tipoId);
    const conta=contas.find(c=>c.id===contaId);
    const cli=clientes.find(c=>c.id===cliId);
    const forma=formas.find(f=>f.id===formaId);
    const descricao=document.getElementById('rec-desc').value||'';
    const data_primeira=document.getElementById('rec-data1').value||today();

    // Tenta salvar na tabela receitas — usa apenas colunas seguras
    // Se falhar por schema, continua e salva só as parcelas
    let recId=null;
    const receitaObj={
      empresa:emp,
      data_lancamento:today(),
      conta_id:contaId||null,
      tipo_id:tipoId||null,
      cliente_id:cliId||null,
      forma_id:formaId||null,
      descricao,
      data_primeira,
      valor_parcela:valor,
      qtde_parcelas:qtde,
      valor_total:valor*qtde,
      recebido:parcRecTemp.every(p=>p.recebido)
    };
    const colsDisp=await dbColunas('receitas');
    // empresa sempre mantida — nunca deletar (fix MG→DL)
    if(colsDisp.has('conta_nome'))receitaObj.conta_nome=conta?.nome||'';
    if(colsDisp.has('tipo_nome'))receitaObj.tipo_nome=cat?.nome||'Receita';
    if(colsDisp.has('cliente_nome'))receitaObj.cliente_nome=cli?.nome||'';
    if(colsDisp.has('forma_nome'))receitaObj.forma_nome=forma?.nome||'';

    const editId=window._recEditId||null;
    try{
      if(editId){
        await dbSafeUpdate('receitas',receitaObj,'id',editId);
        recId=editId;
        // Deleta parcelas antigas ANTES de recriar
        await supa.from('parcelas_receita').delete().eq('receita_id',editId);
      }else{
        recId=await dbAdd('receitas',receitaObj);
        // FIX: se recId é inválido (Date.now fallback), não salva empresa errada
        const recIdNum=Number(recId);
        if(!recId||isNaN(recIdNum)||recIdNum<=0){
          throw new Error('Falha ao obter ID da receita — tente novamente');
        }
        recId=recIdNum;
      }
    }
    catch(e2){
      // Não usa Date.now como ID — lança o erro para o usuário ver
      throw new Error('Erro ao salvar receita: '+(e2.message||String(e2)));
    }

    // Salva parcelas (tabela principal dos relatórios)
    for(const p of parcRecTemp){
      const parcObj={
        numero:p.numero,
        total:p.total,
        vencimento:p.vencimento,
        valor:p.valor,
        dt_pagamento:p.recebido?p.vencimento:null,
        valor_pago:p.recebido?p.valor:0,
      };
      // empresa sempre mantida na parcela
      const colsP=await dbColunas('parcelas_receita');
      parcObj.empresa=emp;
      if(colsP.has('receita_id'))parcObj.receita_id=recId;
      if(colsP.has('forma_id'))parcObj.forma_id=formaId||null;
      if(colsP.has('forma_nome'))parcObj.forma_nome=forma?.nome||'';
      if(colsP.has('conta_id'))parcObj.conta_id=contaId||null;
      if(colsP.has('conta_nome'))parcObj.conta_nome=conta?.nome||'';
      if(colsP.has('tipo_nome'))parcObj.tipo_nome=cat?.nome||'Receita';
      if(colsP.has('cliente_nome'))parcObj.cliente_nome=cli?.nome||'';
      if(colsP.has('descricao'))parcObj.descricao=descricao;
      if(colsP.has('categoria'))parcObj.categoria=cat?.nome||'';
      if(colsP.has('natureza'))parcObj.natureza='RECEITA_BRUTA';
      await dbAdd('parcelas_receita',parcObj);
    }
    document.getElementById('modal-rec').classList.remove('open');
    window._recEditId=null;
    const empNome=empLabel(emp);
    confirmarSalvo(
      `Receita ${editId?'atualizada':'salva'} com sucesso!`,
      `${empNome} · ${qtde} parcela(s) · ${R$(valor*qtde)}`
    );
    pgReceitas(document.getElementById('content'));
  }catch(e){
    console.error('salvarReceita error:',e);
    toast('Erro: '+(e.message||JSON.stringify(e)),'err');
  }
}
async function excluirReceita(id){
  if(!(await confirm2('Excluir a receita e todas as parcelas vinculadas?')))return;
  try{
    const parcelas=await dbGet('parcelas_receita');
    const vinculadas=(parcelas||[]).filter(p=>String(p.receita_id)===String(id));
    for(const p of vinculadas){await dbDel('parcelas_receita',p.id);}
    await dbDel('receitas',id);
    toast(`Receita excluída${vinculadas.length?` + ${vinculadas.length} parcela(s)`:''}!`,'ok');
    pgReceitas(document.getElementById('content'));
  }catch(e){
    console.error('excluirReceita error:',e);
    toast('Erro ao excluir receita: '+(e.message||String(e)),'err');
  }
}
async function excluirParcelaReceita(id){
  if(!(await confirm2('Excluir esta parcela órfã? Ela deixará de aparecer no Dashboard.')))return;
  try{
    await dbDel('parcelas_receita',id);
    toast('Parcela órfã excluída!','ok');
    pgReceitas(document.getElementById('content'));
  }catch(e){
    console.error('excluirParcelaReceita error:',e);
    toast('Erro ao excluir parcela: '+(e.message||String(e)),'err');
  }
}

async function despAbrirForm(id=null){

  const setSelect=(elId,val,fallbackTxt)=>{
    const el=document.getElementById(elId);if(!el)return;
    el.value=val||'';
    if(el.value!=String(val||'')&&fallbackTxt){
      for(const o of el.options){if(o.text.toLowerCase().includes(String(fallbackTxt).toLowerCase())){el.value=o.value;break;}}
    }
  };
  if(id){
    let rec = await dbGet('despesas', id);
    const pp = await dbGet('parcelas_despesa');
    const cpAll = await dbGet('contas_pagar');
    // Filtra parcelas desta despesa para cálculo e fallback de empresa
    const ppId = (pp || []).filter(p => String(p.despesa_id) === String(id));
    if(!rec){
      if(ppId.length){
        rec = {
          id,
          empresa: ppId[0].empresa || (['DL','MG'].includes(currentEmpresa) ? currentEmpresa : 'DL'),
          conta_id: ppId[0].conta_id || '',
          cat_id: '',
          forn_id: '',
          forma_id: ppId[0].forma_id || '',
          descricao: ppId[0].descricao || '',
          data_primeira: ppId[0].vencimento || today(),
          valor_parcela: ppId[0].valor || 0,
          qtde_parcelas: ppId.length,
          valor_total: ppId.reduce((s,p) => s + (+p.valor || 0), 0)
        };
        const cpRef = cpAll.find(r => String(r.origem_tipo || '') === 'despesas' && String(r.origem_id || '') === String(id));
        if(cpRef) rec.descricao = rec.descricao || cpRef.descricao_adicional || '';
      } else {
        toast('Despesa não encontrada','err'); return;
      }
    }
    // Monta array de parcelas temporárias para edição
    parcDespTemp = ppId.map(p => ({
      numero: +(p.numero || 1),
      total: +(p.total || 1),
      vencimento: p.vencimento,
      valor: +(p.valor || 0),
      quitado: !!p.dt_pagamento,
      dt_pagamento: p.dt_pagamento || null
    }));
    // Empresa real vem primeiro das parcelas, depois do cadastro pai
    const p0 = ppId[0] || {};
    const _despEmpReal = p0.empresa || rec.empresa || null;
    document.getElementById('desp-emp').value = _despEmpReal || (['DL','MG'].includes(currentEmpresa) ? currentEmpresa : 'DL');
    if(_despEmpReal&&currentEmpresa!=='GERAL'&&_despEmpReal!==currentEmpresa){
      setTimeout(()=>{
        const sel=document.getElementById('desp-emp');
        if(sel){sel.style.outline='2px solid #b54708';sel.title='Atenção: empresa do registro é '+empLabel(_despEmpReal);}
      },100);
    }
    setSelect('desp-conta',rec.conta_id,rec.conta_nome);
    setSelect('desp-cat',rec.cat_id,rec.cat_nome);
    setSelect('desp-forn',rec.forn_id,rec.forn_nome);
    setSelect('desp-forma',rec.forma_id,rec.forma_nome);
    document.getElementById('desp-desc').value=rec.descricao||'';
    document.getElementById('desp-data1').value=rec.data_primeira||parcDespTemp[0]?.vencimento||today();
    document.getElementById('desp-situacao').value=parcDespTemp.some(p=>p.quitado)?'pago':'aberto';
    document.getElementById('desp-dt-pago').value=parcDespTemp.find(p=>p.dt_pagamento)?.dt_pagamento||today();
    document.getElementById('desp-valor').value=rec.valor_parcela||parcDespTemp[0]?.valor||0;
    document.getElementById('desp-qtde').value=rec.qtde_parcelas||parcDespTemp.length||1;
    document.getElementById('desp-total-lbl').value=`${R$(+(rec.valor_parcela||parcDespTemp[0]?.valor||0))} × ${rec.qtde_parcelas||parcDespTemp.length||1} = ${R$(+(rec.valor_total||parcDespTemp.reduce((s,p)=>s+(+p.valor||0),0)||0))}`;
    document.getElementById('tb-desp-parc').innerHTML=parcDespTemp.map((p,i)=>`<tr><td>${p.numero}/${p.total}</td><td>${fDate(p.vencimento)}</td><td class="mono" style="color:var(--danger)">${R$(p.valor)}</td><td><input type="checkbox" ${p.quitado?'checked':''} onchange="parcDespTemp[${i}].quitado=this.checked"></td></tr>`).join('');
    document.getElementById('desp-parcelas-wrap').style.display='block';
    window._despEditId=id;
    document.getElementById('modal-desp').querySelector('.modal-box h3').textContent=`✏️ Editar Despesa #${id}`;
    const foot=document.getElementById('modal-desp').querySelector('.modal-foot');
    const oldDel=foot.querySelector('.btn-desp-del');
    if(oldDel) oldDel.remove();
    const delBtn=document.createElement('button');
    delBtn.className='btn danger btn-desp-del';
    delBtn.textContent='🗑️ Excluir';
    delBtn.onclick=async()=>{ if(await confirm2('Deletar esta despesa?')) await excluirDespesa(id); };
    foot.insertBefore(delBtn,foot.firstElementChild);
  } else {
    parcDespTemp=[];
    window._despEditId=null;
    document.getElementById('desp-parcelas-wrap').style.display='none';
    document.getElementById('desp-emp').value=['DL','MG'].includes(currentEmpresa)?currentEmpresa:'DL';
    document.getElementById('desp-conta').selectedIndex=0;
    document.getElementById('desp-cat').selectedIndex=0;
    document.getElementById('desp-forn').selectedIndex=0;
    document.getElementById('desp-forma').selectedIndex=0;
    document.getElementById('desp-desc').value='';
    document.getElementById('desp-data1').value=today();
    document.getElementById('desp-situacao').value='pago';
    document.getElementById('desp-dt-pago').value=today();
    document.getElementById('desp-valor').value='';
    document.getElementById('desp-qtde').value='1';
    document.getElementById('desp-total-lbl').value='';
    const foot=document.getElementById('modal-desp').querySelector('.modal-foot');
    const oldDel=foot.querySelector('.btn-desp-del');
    if(oldDel) oldDel.remove();
    document.getElementById('modal-desp').querySelector('.modal-box h3').textContent='❤️ Nova Despesa Parcelada';
  }
  document.getElementById('modal-desp').classList.add('open');
}
