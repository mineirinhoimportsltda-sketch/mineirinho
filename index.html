<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceiroApp Pro — Mineirinho Importação</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#eef3f6;--panel:#fff;--line:#c8d4de;--text:#0e1c2b;--muted:#5a7080;
  --red:#c5151b;--blue:#0e6eb5;--green:#1f9e4a;--amber:#b07a10;--purple:#6d28d9;
  --soft-red:#fce8e9;--soft-blue:#e3f0fb;--soft-green:#e1f5e9;--soft-amber:#fef5dc;--soft-purple:#ede9fe;
  --shadow:0 4px 20px rgba(14,28,43,.09);--r:12px;
  --nav-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── TOP NAV ── */
#nav{height:var(--nav-h);background:#0e1c2b;display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0;z-index:200}
.nav-logo{display:flex;align-items:center;gap:10px;margin-right:20px;flex-shrink:0}
.nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#1f9e4a,#0e6eb5);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-logo-text{font-weight:800;font-size:13px;color:#fff;line-height:1.2}
.nav-logo-text small{color:#7a9ab5;font-weight:400;font-size:10px;display:block}
.nav-menu{display:flex;align-items:center;gap:2px;flex:1}
.nav-item{position:relative;display:flex;align-items:center;gap:6px;padding:0 14px;height:var(--nav-h);color:#8aacbf;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;border-bottom:3px solid transparent;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.07);color:#c8dbe7}
.nav-item.active{color:#4cde85;border-bottom-color:#1f9e4a;background:rgba(31,158,74,.12)}
.nav-item .arr{font-size:9px;margin-left:2px;opacity:.6}
.nav-dropdown{position:absolute;top:100%;left:0;background:#0e1c2b;border:1px solid rgba(255,255,255,.12);border-radius:0 0 10px 10px;min-width:220px;padding:5px 0;display:none;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.nav-item:hover .nav-dropdown,.nav-item:focus-within .nav-dropdown{display:block}
.nav-dd-item{display:block;padding:9px 16px;color:#8aacbf;font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.nav-dd-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-dd-item.active{color:#4cde85}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.empresa-switcher{display:flex;background:rgba(255,255,255,.1);border-radius:20px;padding:3px;gap:2px}
.emp-btn{padding:4px 12px;border-radius:16px;border:none;background:transparent;color:#8aacbf;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.emp-btn.active{background:#1f9e4a;color:#fff}
.nav-user{color:#7a9ab5;font-size:12px;font-weight:600;white-space:nowrap}
.nav-logout{background:none;border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#7a9ab5;font-size:12px;padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.nav-logout:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:18px}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-green{background:#1f9e4a;color:#fff}.btn-green:hover{background:#178c3e}
.btn-blue{background:#0e6eb5;color:#fff}.btn-blue:hover{background:#0b5e9c}
.btn-red{background:#c5151b;color:#fff}.btn-red:hover{background:#a81116}
.btn-amber{background:#b07a10;color:#fff}.btn-amber:hover{background:#9a6a0d}
.btn-white{background:#fff;color:#3a5060;border:1px solid var(--line)}.btn-white:hover{background:#f0f4f7}
.btn-ghost{background:transparent;color:#5a7080;border:1px solid var(--line)}.btn-ghost:hover{background:#f0f4f7}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:8px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── CARDS ── */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:700;color:#7a9ab5;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

/* ── KPI ── */
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.kpi-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.kpi-green .kpi-icon{background:var(--soft-green);color:var(--green)}
.kpi-red .kpi-icon{background:var(--soft-red);color:var(--red)}
.kpi-blue .kpi-icon{background:var(--soft-blue);color:var(--blue)}
.kpi-amber .kpi-icon{background:var(--soft-amber);color:var(--amber)}
.kpi-purple .kpi-icon{background:var(--soft-purple);color:var(--purple)}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-size:19px;font-weight:800;font-family:'DM Mono',monospace;margin-top:2px}
.kpi-green .kpi-val{color:var(--green)}.kpi-red .kpi-val{color:var(--red)}
.kpi-blue .kpi-val{color:var(--blue)}.kpi-amber .kpi-val{color:var(--amber)}.kpi-purple .kpi-val{color:var(--purple)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f0f4f7}
th{padding:8px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#3a5060;white-space:nowrap;border-bottom:1px solid var(--line)}
td{padding:8px 10px;border-bottom:1px solid #e8eef3;vertical-align:middle}
tr:hover td{background:#f6f9fb}
tr:last-child td{border-bottom:none}
.td-mono{font-family:'DM Mono',monospace;font-size:12px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.b-green{background:var(--soft-green);color:var(--green)}.b-red{background:var(--soft-red);color:var(--red)}
.b-amber{background:var(--soft-amber);color:var(--amber)}.b-blue{background:var(--soft-blue);color:var(--blue)}
.b-gray{background:#eef1f4;color:#607285}.b-purple{background:var(--soft-purple);color:var(--purple)}
.st-red{background:var(--soft-red);color:#b31217}
.st-amber{background:var(--soft-amber);color:#8c6200}
.st-green{background:var(--soft-green);color:#177035}
.st-blue{background:var(--soft-blue);color:#0b5e9c}

/* ── FORMS ── */
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:11px;font-weight:700;color:#3a5060;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.field{width:100%;background:#fff;border:1px solid var(--line);border-radius:8px;color:var(--text);padding:7px 11px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;height:36px;transition:border .15s}
.field:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(14,110,181,.12)}
textarea.field{height:auto;min-height:64px;resize:vertical}
.frow{display:grid;gap:10px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}.c4{grid-template-columns:1fr 1fr 1fr 1fr}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(10,20,30,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:999;backdrop-filter:blur(3px)}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.22);width:min(700px,96vw);max-height:92vh;overflow-y:auto;padding:20px}
.modal-box.wide{width:min(960px,96vw)}
.modal-box.xl{width:min(1200px,96vw)}
.modal-box.sm{width:min(480px,96vw)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-head h2{font-size:17px;font-weight:800}
.modal-close{background:none;border:1px solid var(--line);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:17px;color:#5a7080;display:flex;align-items:center;justify-content:center}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--line)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:16px;overflow-x:auto}
.tab{padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── CP LAYOUT ── */
.twocol{display:grid;grid-template-columns:1.1fr .9fr;gap:4px;background:#d0dae4;border-radius:12px 12px 0 0;overflow:hidden}
.colhead{color:#fff;font-weight:900;text-align:center;padding:10px;font-size:15px}
.colhead.red{background:var(--red)}.colhead.blue{background:var(--blue)}.colhead.green{background:var(--green)}
.tablesplit{display:grid;grid-template-columns:1.1fr .9fr;gap:4px}
.tblbox{overflow:auto;max-height:420px;background:#f3f6f9}
.dotbtn{background:none;border:none;font-size:19px;color:#5a7080;cursor:pointer;padding:1px 5px}
.sum-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.sumcard{background:#fffbf0;border:1px solid #e8ddc2;border-radius:10px;padding:9px 10px;text-align:center}
.sumcard .st{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted)}
.sumcard .sv{font-size:17px;font-weight:800;font-family:'DM Mono',monospace;margin-top:4px}
.sumcard .sq{font-size:12px;font-weight:700;margin-top:1px}

/* ── BAIXA MODAL (estilo do sistema de referência) ── */
.baixa-modal .modal-box{background:#f0f0f0;border-radius:8px;max-width:420px;padding:0;overflow:hidden}
.baixa-header{background:#2d5f8a;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.baixa-header h3{font-size:14px;font-weight:700;margin:0}
.baixa-body{padding:14px}
.baixa-field-lbl{font-size:12px;font-weight:700;color:#333;margin-bottom:3px;margin-top:8px}
.baixa-field{width:100%;background:#fff;border:1px solid #aaa;border-radius:4px;padding:5px 9px;font-size:13px;font-family:'DM Sans',sans-serif;color:#333;height:32px}
.baixa-field:focus{border-color:#2d5f8a;outline:none}
.baixa-row{display:grid;grid-template-columns:80px 110px 1fr;gap:8px;margin-top:6px;background:#e8e8e8;border:1px solid #ccc;padding:6px 8px;border-radius:4px;font-size:12px;font-weight:700}
.baixa-row span{color:#555}
.baixa-row .val{color:#c5151b;font-family:'DM Mono',monospace}
.baixa-footer{background:#e0e0e0;padding:10px 14px;display:flex;gap:8px;justify-content:center;border-top:1px solid #ccc}
.btn-baixa{border:none;border-radius:4px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:64px;font-family:'DM Sans',sans-serif}
.btn-baixa .ico{font-size:18px}
.btn-baixa.save{background:#4a8f5e;color:#fff}
.btn-baixa.del{background:#c5151b;color:#fff}
.btn-baixa.close{background:#6b7280;color:#fff}
.btn-baixa.attach{background:#2d5f8a;color:#fff}
.comprovante-warn{color:var(--red);font-size:11px;font-weight:700;text-align:center;margin-top:6px}

/* ── DRE / BALANÇO ── */
.dre-section{margin-bottom:4px}
.dre-group{background:#f0f4f7;border-left:4px solid var(--blue);padding:8px 12px;font-weight:800;font-size:13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.dre-group.receita{border-color:var(--green)}
.dre-group.custo{border-color:var(--red)}
.dre-group.despesa{border-color:var(--amber)}
.dre-group.resultado{border-color:var(--purple)}
.dre-row{display:flex;justify-content:space-between;padding:5px 12px 5px 24px;font-size:13px;border-bottom:1px solid #f0f4f7}
.dre-row:hover{background:#f6f9fb}
.dre-subtotal{display:flex;justify-content:space-between;padding:7px 12px;font-weight:700;font-size:13px;background:#fff;border-top:2px solid var(--line);margin-top:2px}
.dre-total{display:flex;justify-content:space-between;padding:10px 12px;font-weight:800;font-size:15px;border-radius:8px;margin-top:8px}
.dre-total.lucro{background:var(--soft-green);color:var(--green)}
.dre-total.prejuizo{background:var(--soft-red);color:var(--red)}

/* ── ALERTS ── */
.alert{padding:10px 13px;border-radius:8px;font-size:13px;margin-bottom:10px;border:1px solid}
.alert-green{background:var(--soft-green);border-color:rgba(31,158,74,.3);color:#177035}
.alert-red{background:var(--soft-red);border-color:rgba(197,21,27,.3);color:#b31217}
.alert-amber{background:var(--soft-amber);border-color:rgba(176,122,16,.3);color:#8c6200}
.alert-blue{background:var(--soft-blue);border-color:rgba(14,110,181,.3);color:#0b5e9c}

/* ── TOAST ── */
#toast-wrap{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;box-shadow:var(--shadow);font-size:13px;display:flex;align-items:center;gap:8px;min-width:240px;animation:tIn .2s ease}
.toast.ok{border-left:4px solid var(--green)}.toast.err{border-left:4px solid var(--red)}.toast.info{border-left:4px solid var(--blue)}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── RT ── */
#rt{position:fixed;bottom:14px;right:14px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;z-index:9998;box-shadow:var(--shadow)}
#rt-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#rt.off #rt-dot{background:var(--red);animation:none}

/* ── MISC ── */
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty .ei{font-size:38px;margin-bottom:8px}
.prog{background:#e8eef3;border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:16px;font-weight:800}
.emp-tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:.5px}
.emp-DL{background:#dbeafe;color:#1d4ed8}.emp-MG{background:#fce7f3;color:#9d174d}

::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#c8d4de;border-radius:3px}

@media(max-width:1100px){.g4,.g5{grid-template-columns:1fr 1fr}.twocol,.tablesplit,.split{grid-template-columns:1fr}}
@media(max-width:768px){.g2,.g3,.g4{grid-template-columns:1fr}.frow.c2,.frow.c3,.frow.c4{grid-template-columns:1fr}.nav-menu{display:none}}
</style>
</head>
<body>
<div id="toast-wrap"></div>
<div id="rt"><div id="rt-dot"></div><span id="rt-lbl">Conectado</span></div>

<nav id="nav" style="display:none">
  <div class="nav-logo">
    <div class="nav-logo-icon">💰</div>
    <div class="nav-logo-text">FinanceiroApp Pro<small>Mineirinho Importação</small></div>
  </div>
  <div class="nav-menu">
    <div class="nav-item active" onclick="go('dashboard')" data-page="dashboard">📊 Dashboard</div>
    <div class="nav-item" tabindex="0">
      📝 Lançamentos <span class="arr">▾</span>
      <div class="nav-dropdown">
        <button class="nav-dd-item" onclick="go('receitas')" data-page="receitas">💚 Receitas</button>
        <button class="nav-dd-item" onclick="go('despesas')" data-page="despesas">❤️ Despesas Parceladas</button>
        <button class="nav-dd-item" onclick="go('poupanca')" data-page="poupanca">🏦 Poupança/Reserva</button>
        <button class="nav-dd-item" onclick="go('transferencias')" data-page="transferencias">🔄 Transferências</button>
      </div>
    </div>
    <div class="nav-item" tabindex="0">
      💳 Contas <span class="arr">▾</span>
      <div class="nav-dropdown">
        <button class="nav-dd-item" onclick="go('contas_receber')" data-page="contas_receber">📥 A Receber</button>
        <button class="nav-dd-item" onclick="go('contas_pagar')" data-page="contas_pagar">📤 A Pagar</button>
        <button class="nav-dd-item" onclick="go('cartao')" data-page="cartao">💳 Cartões de Crédito</button>
      </div>
    </div>
    <div class="nav-item" tabindex="0">
      📊 Contábil <span class="arr">▾</span>
      <div class="nav-dropdown">
        <button class="nav-dd-item" onclick="go('dre')" data-page="dre">📈 DRE</button>
        <button class="nav-dd-item" onclick="go('balanco')" data-page="balanco">⚖️ Balanço Patrimonial</button>
        <button class="nav-dd-item" onclick="go('plano_contas')" data-page="plano_contas">📋 Plano de Contas</button>
      </div>
    </div>
    <div class="nav-item" tabindex="0">
      🧾 Fiscal <span class="arr">▾</span>
      <div class="nav-dropdown">
        <button class="nav-dd-item" onclick="go('notas_fiscais')" data-page="notas_fiscais">📥 Notas Recebidas</button>
        <button class="nav-dd-item" onclick="go('fiscal_dashboard')" data-page="fiscal_dashboard">📊 Painel Fiscal</button>
      </div>
    </div>
    <div class="nav-item" tabindex="0">
      📈 Análise <span class="arr">▾</span>
      <div class="nav-dropdown">
        <button class="nav-dd-item" onclick="go('extrato')" data-page="extrato">📋 Extrato Comparativo</button>
        <button class="nav-dd-item" onclick="go('relatorios')" data-page="relatorios">📑 Relatórios</button>
        <button class="nav-dd-item" onclick="go('graficos')" data-page="graficos">📊 Gráficos</button>
        <button class="nav-dd-item" onclick="go('conciliacao')" data-page="conciliacao">🔍 Conciliação Bancária</button>
      </div>
    </div>
    <div class="nav-item" tabindex="0">
      ⚙️ Config <span class="arr">▾</span>
      <div class="nav-dropdown">
        <button class="nav-dd-item" onclick="go('cadastros')" data-page="cadastros">⚙️ Cadastros</button>
        <button class="nav-dd-item" onclick="go('usuarios')" data-page="usuarios">👥 Usuários</button>
        <button class="nav-dd-item" onclick="go('backup')" data-page="backup">💾 Backup</button>
      </div>
    </div>
  </div>
  <div class="nav-right">
    <div class="empresa-switcher">
      <button class="emp-btn active" id="emp-btn-GERAL" onclick="setEmpresa('GERAL')">Geral</button>
      <button class="emp-btn" id="emp-btn-DL" onclick="setEmpresa('DL')">DL</button>
      <button class="emp-btn" id="emp-btn-MG" onclick="setEmpresa('MG')">MG</button>
    </div>
    <span class="nav-user" id="nav-user">...</span>
    <button class="nav-logout" onclick="logout()">Sair</button>
  </div>
</nav>

<div id="content"></div>

<script>
// ═══════════════════════════════════
// SUPABASE

async function dbGet(table,id){
  if(id!==undefined){const{data,error}=await supa.from(table).select('*').eq('id',id).single();return error?null:data;}
  const{data,error}=await supa.from(table).select('*').order('id');
  if(error){console.error(table,error);return[];}return data||[];
}
async function dbAdd(table,obj){const clean={...obj};delete clean.id;const{data,error}=await supa.from(table).insert(clean).select('id').single();if(error)throw error;return data.id;}
async function dbPut(table,obj){const{error}=await supa.from(table).upsert(obj);if(error)throw error;}
async function dbDelete(table,id){const{error}=await supa.from(table).delete().eq('id',id);if(error)throw error;}
async function dbClear(table){await supa.from(table).delete().neq('id',0);}

function toast(msg,type='info'){
  const w=document.getElementById('toast-wrap');
  const icons={ok:'✅',err:'❌',info:'ℹ️'};
  const el=document.createElement('div');el.className=`toast ${type}`;
  el.innerHTML=`<span>${icons[type]}</span><span>${esc(msg)}</span>`;
  w.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='.3s';setTimeout(()=>el.remove(),300);},3500);
}

async function doLogin(){
  const u=document.getElementById('l-user').value;const p=document.getElementById('l-pass').value;
  const users=await dbGet('usuarios');
  const user=users.find(x=>x.username===u&&x.password===p&&x.ativo);
  if(user){
    currentUser=user;sessionStorage.setItem('user',JSON.stringify(user));
    const ls=document.getElementById('login-screen');if(ls)ls.style.display='none';
    document.getElementById('nav').style.display='flex';
    document.getElementById('nav-user').textContent=user.nome;
    go('dashboard');
  } else {
    const err=document.getElementById('l-err');err.textContent='Usuário ou senha inválidos';err.style.display='block';
  }
}
function logout(){sessionStorage.removeItem('user');currentUser=null;showLogin();}

async function pgDashboard(c){
  const now=new Date();const yr=now.getFullYear();const mo=String(now.getMonth()+1).padStart(2,'0');
  const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);

  const calc=(emp)=>{
    const fpr=emp==='GERAL'?pr:pr.filter(r=>(r.empresa||'DL')===emp);
    const fpd=emp==='GERAL'?pd:pd.filter(r=>(r.empresa||'DL')===emp);
    const fcp=emp==='GERAL'?cp:cp.filter(r=>(r.empresa||'DL')===emp);
    const recMes=fpr.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${mo}`));
    const despMes=fpd.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${mo}`));
    const totalR=recMes.reduce((s,p)=>s+(+p.valor_pago||0),0);
    const totalD=despMes.reduce((s,p)=>s+(+p.valor_pago||0),0);
    const cpVenc=fcp.filter(r=>r.status!=='paid'&&r.vencimento<today());
    const cpHoje=fcp.filter(r=>r.status!=='paid'&&r.vencimento===today());
    const cpPend=fcp.filter(r=>r.status!=='paid');
    return{totalR,totalD,saldo:totalR-totalD,cpVenc:cpVenc.length,cpVencVal:cpVenc.reduce((s,r)=>s+(+r.valor||0),0),cpHoje:cpHoje.length,cpHojeVal:cpHoje.reduce((s,r)=>s+(+r.valor||0),0),cpPendVal:cpPend.reduce((s,r)=>s+(+r.valor||0),0),cpPend:cpPend.length};
  };

  const kDL=calc('DL');const kMG=calc('MG');const kG=calc('GERAL');
  const kpi=currentEmpresa==='GERAL'?kG:currentEmpresa==='DL'?kDL:kMG;

  const resumo=meses.map((_,i)=>{
    const m=String(i+1).padStart(2,'0');
    const fpr=empF(pr,'empresa');const fpd=empF(pd,'empresa');
    const r=fpr.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${m}`)).reduce((s,p)=>s+(+p.valor_pago||0),0);
    const d=fpd.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${m}`)).reduce((s,p)=>s+(+p.valor_pago||0),0);
    return{mes:meses[i],r,d,s:r-d};
  });
  const totR=resumo.reduce((s,m)=>s+m.r,0);const totD=resumo.reduce((s,m)=>s+m.d,0);
  const catMap={};
  empF(pd,'empresa').filter(p=>p.dt_pagamento?.startsWith(`${yr}-${mo}`)).forEach(p=>{const k=p.categoria||'Outros';catMap[k]=(catMap[k]||0)+(+p.valor_pago||0);});
  const topCat=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:16px">
  ${currentEmpresa==='GERAL'?`<div class="card" style="padding:14px">
    <div class="card-title">⚖️ Comparativo DL × MG — ${meses[now.getMonth()]}/${yr}</div>
    <div class="g2" style="gap:10px">
      <div style="border:2px solid #dbeafe;border-radius:10px;padding:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="emp-tag emp-DL">DL</span><span style="font-weight:800">D&L Importadora</span></div>
        <div class="g3" style="gap:8px">
          <div class="sumcard"><div class="st">Receitas</div><div class="sv" style="color:var(--green);font-size:15px">${R$(kDL.totalR)}</div></div>
          <div class="sumcard"><div class="st">Despesas</div><div class="sv" style="color:var(--red);font-size:15px">${R$(kDL.totalD)}</div></div>
          <div class="sumcard"><div class="st">Saldo</div><div class="sv" style="color:${kDL.saldo>=0?'var(--blue)':'var(--red)'};font-size:15px">${R$(kDL.saldo)}</div></div>
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--muted)">A Pagar: <strong style="color:var(--amber)">${R$(kDL.cpPendVal)}</strong> · Vencidas: <strong style="color:var(--red)">${kDL.cpVenc}</strong></div>
      </div>
      <div style="border:2px solid #fce7f3;border-radius:10px;padding:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="emp-tag emp-MG">MG</span><span style="font-weight:800">Mineirinha Ltda</span></div>
        <div class="g3" style="gap:8px">
          <div class="sumcard"><div class="st">Receitas</div><div class="sv" style="color:var(--green);font-size:15px">${R$(kMG.totalR)}</div></div>
          <div class="sumcard"><div class="st">Despesas</div><div class="sv" style="color:var(--red);font-size:15px">${R$(kMG.totalD)}</div></div>
          <div class="sumcard"><div class="st">Saldo</div><div class="sv" style="color:${kMG.saldo>=0?'var(--blue)':'var(--red)'};font-size:15px">${R$(kMG.saldo)}</div></div>
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--muted)">A Pagar: <strong style="color:var(--amber)">${R$(kMG.cpPendVal)}</strong> · Vencidas: <strong style="color:var(--red)">${kMG.cpVenc}</strong></div>
      </div>
    </div>
    <div style="margin-top:12px;display:flex;gap:16px;align-items:center">

  <div class="g5">

    <div class="kpi kpi-amber"><div class="kpi-icon">⚠️</div><div><div class="kpi-lbl">C.Pagar Vencido</div><div class="kpi-val">${R$(kpi.cpVencVal)}</div><div class="kpi-sub">${kpi.cpVenc} conta(s)</div></div></div>
    <div class="kpi kpi-purple"><div class="kpi-icon">📅</div><div><div class="kpi-lbl">Vence Hoje</div><div class="kpi-val">${R$(kpi.cpHojeVal)}</div><div class="kpi-sub">${kpi.cpHoje} conta(s)</div></div></div>
  </div>

  <div class="g2">
    <div class="card"><div class="card-title">📊 Receitas × Despesas — ${yr}</div><canvas id="ch-anual" height="180"></canvas></div>
    <div class="card"><div class="card-title">🍕 Despesas por Categoria — ${meses[now.getMonth()]}</div><canvas id="ch-pizza" height="180"></canvas></div>
  </div>

  <div class="g2">
    <div class="card"><div class="card-title">📅 Resumo ${yr}</div>
      <div class="tbl-wrap"><table><thead><tr><th>Mês</th><th>Receita</th><th>Despesa</th><th>Saldo</th></tr></thead>
      <tbody>${resumo.map(m=>`<tr><td style="font-weight:700">${m.mes}</td>
        <td class="td-mono" style="color:var(--green)">${m.r>0?R$(m.r):'-'}</td>
        <td class="td-mono" style="color:var(--red)">${m.d>0?R$(m.d):'-'}</td>
        <td class="td-mono" style="color:${m.s>=0?'var(--blue)':'var(--red)'}">${m.r>0||m.d>0?R$(m.s):'-'}</td></tr>`).join('')}
      <tr style="font-weight:800;border-top:2px solid var(--line)"><td>TOTAL</td>
        <td class="td-mono" style="color:var(--green)">${R$(totR)}</td>
        <td class="td-mono" style="color:var(--red)">${R$(totD)}</td>
        <td class="td-mono" style="color:${totR-totD>=0?'var(--blue)':'var(--red)'}">${R$(totR-totD)}</td></tr>
      </tbody></table></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card"><div class="card-title">🏆 Top Despesas</div>
        ${topCat.length===0?'<p style="color:var(--muted)">Sem dados</p>':topCat.map(([cat,val])=>{const pct=kpi.totalD>0?Math.round(val/kpi.totalD*100):0;return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span>${cat}</span><span class="td-mono" style="color:var(--red);font-size:12px">${R$(val)} (${pct}%)</span></div><div class="prog"><div class="prog-fill" style="width:${pct}%;background:var(--red)"></div></div></div>`;}).join('')}
      </div>
      ${kpi.cpVenc>0?`<div class="card" style="border-color:var(--red)"><div class="card-title">🚨 Contas Vencidas</div><div class="alert alert-red">${kpi.cpVenc} conta(s) — ${R$(kpi.cpVencVal)}</div><button class="btn btn-red btn-sm" onclick="go('contas_pagar')">Ver e baixar →</button></div>`:`<div class="card" style="border-color:var(--green)"><div class="card-title">✅ Situação</div><div class="alert alert-green">Nenhuma conta vencida!</div></div>`}
    </div>
  </div></div>`;

  if(typeof Chart==='undefined'){const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';s.onload=()=>drawDashCharts(resumo,meses,topCat,kpi.totalD);document.head.appendChild(s);}
  else drawDashCharts(resumo,meses,topCat,kpi.totalD);
}

let cpRec=[],cpSel=new Set(),cpEditId=null,cpQF='',cpOnlySel=false;

const cpSt=rec=>{
  if(rec.status==='paid')return'PAGO';
  const t=today();
  if(rec.vencimento<t)return'VENCIDO';
  if(rec.vencimento===t)return'VENCE HOJE';
  const d=Math.ceil((new Date(rec.vencimento+'T00:00:00')-new Date(t+'T00:00:00'))/86400000);
  return`${d}d A VENCER`;
};
const cpStCls=txt=>txt==='VENCIDO'?'st-red':txt==='VENCE HOJE'?'st-green':txt.includes('VENCER')?'st-amber':'st-blue';

async function pgContasPagar(c){
  const{data,error}=await supa.from('contas_pagar').select('*').order('vencimento');
  if(error){toast('Erro: '+error.message,'err');cpRec=[];}
  else cpRec=data||[];
  cpDoRender(c||document.getElementById('content'));
}

function cpDoRender(c){
  const yr=document.getElementById('cpfyr')?.value||'';
  const mo=document.getElementById('cpfmo')?.value||'';
  const srch=(document.getElementById('cpfsrch')?.value||'').toLowerCase();
  const supp=document.getElementById('cpfsupp')?.value||'';
  const t=today();const now=new Date();
  const curYr=String(now.getFullYear());const curMo=String(now.getMonth()+1).padStart(2,'0');
  const months=['TODOS','JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

  let all=currentEmpresa==='GERAL'?cpRec:cpRec.filter(r=>(r.empresa||'DL')===currentEmpresa);
  const open=all.filter(r=>r.status!=='paid');
  const paid=all.filter(r=>r.status==='paid');

  const filt=(arr,isPaid)=>arr.filter(r=>{
    if(yr&&!r.vencimento?.startsWith(yr))return false;
    if(mo&&r.vencimento?.slice(5,7)!==mo)return false;
    if(supp&&r.fornecedor!==supp)return false;
    if(srch){const h=[r.fornecedor,r.tipo_despesa,r.descricao_adicional,r.categoria,r.observacao].join(' ').toLowerCase();if(!h.includes(srch))return false;}
    if(cpOnlySel&&!cpSel.has(r.id))return false;
    if(!isPaid){
      if(cpQF==='today'&&r.vencimento!==t)return false;
      if(cpQF==='overdue'&&!(r.vencimento<t))return false;
      if(cpQF==='upcoming'&&!(r.vencimento>t))return false;
    }
    if(isPaid&&cpQF==='paid')return true;
    if(cpQF==='paid'&&!isPaid)return false;
    return true;
  });

  const openF=filt(open,false).sort((a,b)=>a.vencimento>b.vencimento?1:-1);
  const paidF=filt(paid,true).sort((a,b)=>(a.data_pagamento||a.vencimento)>(b.data_pagamento||b.vencimento)?1:-1);
  const suppList=[...new Set(all.map(r=>r.fornecedor).filter(Boolean))].sort();
  const yrs=[...new Set(all.map(r=>r.vencimento?.slice(0,4)).filter(Boolean))].sort().reverse();

  const ovd=open.filter(r=>r.vencimento<t);const tod=open.filter(r=>r.vencimento===t);
  const ovdV=ovd.reduce((s,r)=>s+(+r.valor||0),0);const todV=tod.reduce((s,r)=>s+(+r.valor||0),0);
  const paidV=paid.reduce((s,r)=>s+(+(r.valor_pago??r.valor)||0),0);const openV=open.reduce((s,r)=>s+(+r.valor||0),0);

  c.innerHTML=`
  <div style="display:flex;flex-direction:column;gap:12px">
    <div class="sec-head">
      <div class="sec-title">📤 Contas a Pagar</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-white btn-sm" onclick="cpOnlySel=!cpOnlySel;cpDoRender()">☑ Selecionados</button>
        <button class="btn btn-green btn-sm" onclick="cpBaixarSelecionados()">✔ Baixar Selecionados</button>
        <button class="btn btn-white btn-sm" onclick="cpPrint('open')">🖨 A Pagar</button>
        <button class="btn btn-white btn-sm" onclick="cpPrint('paid')">🖨 Pagas</button>
        <button class="btn btn-red btn-sm" onclick="cpOpenForm()">＋ Nova Conta</button>
      </div>
    </div>

    <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div><div class="form-label">Ano</div><select class="field" style="width:88px" id="cpfyr" onchange="cpDoRender()"><option value="">Todos</option>${yrs.map(y=>`<option value="${y}" ${y===curYr?'selected':''}>${y}</option>`).join('')}</select></div>
      <div><div class="form-label">Mês</div><select class="field" style="width:100px" id="cpfmo" onchange="cpDoRender()">${months.map((m,i)=>`<option value="${i===0?'':String(i).padStart(2,'0')}" ${i>0&&String(i).padStart(2,'0')===curMo?'selected':''}>${m}</option>`).join('')}</select></div>
      <div style="flex:1;min-width:140px"><div class="form-label">Buscar</div><input class="field" id="cpfsrch" placeholder="Fornecedor, tipo..." oninput="cpDoRender()"></div>
      <div><div class="form-label">Fornecedor</div><select class="field" style="width:160px" id="cpfsupp" onchange="cpDoRender()"><option value="">Todos</option>${suppList.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('')}</select></div>
      <button class="btn btn-white btn-sm" onclick="cpQF='today';cpDoRender()">Hoje</button>
      <button class="btn btn-white btn-sm" onclick="cpQF='overdue';cpDoRender()">Vencido</button>
      <button class="btn btn-white btn-sm" onclick="cpQF='upcoming';cpDoRender()">À vencer</button>
      <button class="btn btn-white btn-sm" onclick="cpQF='paid';cpDoRender()">Pago</button>
      <button class="btn btn-ghost btn-sm" onclick="cpQF='';document.getElementById('cpfsrch').value='';document.getElementById('cpfsupp').value='';cpDoRender()">Limpar</button>
    </div>

    <div style="background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)">
      <div class="twocol">
        <div class="colhead red">DESPESAS A PAGAR (${openF.length})</div>
        <div class="colhead blue">DESPESAS PAGAS (${paidF.length})</div>
      </div>
      <div class="tablesplit">
        <div class="tblbox"><table>
          <thead><tr><th><input type="checkbox" onchange="cpTogAll(this.checked,false)"></th><th>Emp</th><th>Data</th><th>Tipo / Fornecedor</th><th>Parc.</th><th>Vencimento</th><th>Valor</th><th>Status</th><th>Ação</th></tr></thead>
          <tbody>${openF.length===0?`<tr><td colspan="9" class="empty"><div class="ei">📭</div><p>Nenhuma conta a pagar</p></td></tr>`:
          openF.map(r=>{const st=cpSt(r);return`<tr>
            <td><input type="checkbox" ${cpSel.has(r.id)?'checked':''} onchange="cpToggle(${r.id},this.checked)"></td>
            <td>${empTag(r.empresa)}</td>
            <td style="white-space:nowrap;font-size:12px">${fDate(r.data_lanc)}</td>
            <td><div style="font-weight:600;font-size:13px">${esc(r.fornecedor||'')}</div><div style="font-size:11px;color:var(--muted)">${esc(r.tipo_despesa||'')}${r.descricao_adicional?' — '+esc(r.descricao_adicional):''}</div></td>
            <td>${esc(r.parcela||'')}</td>
            <td style="white-space:nowrap">${fDate(r.vencimento)}</td>
            <td class="td-mono" style="color:var(--red)">${R$(r.valor)}</td>
            <td><span class="badge ${cpStCls(st)}">${st}</span></td>
            <td><button class="btn btn-amber btn-xs" onclick="cpAbrirBaixa(${r.id})">💰 Baixar</button> <button class="dotbtn" onclick="cpMenu(${r.id})">⋮</button></td>
          </tr>`}).join('')}
          </tbody>
        </table></div>
        <div class="tblbox"><table>
          <thead><tr><th><input type="checkbox" onchange="cpTogAll(this.checked,true)"></th><th>Emp</th><th>Fornecedor</th><th>Parc.</th><th>Pgto</th><th>Valor Pago</th><th>Conta</th><th></th></tr></thead>
          <tbody>${paidF.length===0?`<tr><td colspan="8" class="empty"><div class="ei">💸</div><p>Nenhum pagamento</p></td></tr>`:
          paidF.map(r=>`<tr>
            <td><input type="checkbox" ${cpSel.has(r.id)?'checked':''} onchange="cpToggle(${r.id},this.checked)"></td>
            <td>${empTag(r.empresa)}</td>
            <td><div style="font-weight:600">${esc(r.fornecedor||'')}</div><div style="font-size:11px;color:var(--muted)">${esc(r.tipo_despesa||'')}</div></td>
            <td>${esc(r.parcela||'')}</td>
            <td style="white-space:nowrap">${fDate(r.data_pagamento)}</td>
            <td class="td-mono" style="color:var(--green)">${R$(r.valor_pago??r.valor)}</td>
            <td style="font-size:11px;color:var(--muted)">${esc(r.forma_pagamento||'-')}</td>
            <td><button class="dotbtn" onclick="cpMenu(${r.id})">⋮</button></td>
          </tr>`).join('')}
          </tbody>
        </table></div>
      </div>
      <div style="padding:10px 12px;background:#f5f7f9;border-top:1px solid var(--line)">
        <div class="sum-bar">
          <div class="sumcard"><div class="st">Vencido</div><div class="sv" style="color:var(--red)">${R$(ovdV)}</div><div class="sq" style="color:var(--red)">${ovd.length} conta(s)</div></div>
          <div class="sumcard"><div class="st">Vence Hoje</div><div class="sv" style="color:var(--green)">${R$(todV)}</div><div class="sq" style="color:var(--green)">${tod.length} conta(s)</div></div>
          <div class="sumcard"><div class="st">Pago</div><div class="sv" style="color:var(--blue)">${R$(paidV)}</div><div class="sq" style="color:var(--blue)">${paid.length} conta(s)</div></div>
          <div class="sumcard"><div class="st">A Pagar</div><div class="sv" style="color:var(--amber)">${R$(openV)}</div><div class="sq" style="color:var(--amber)">${open.length} conta(s)</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL INCLUIR/EDITAR -->
  ${cpFormModalHTML()}

  <!-- MODAL BAIXA (estilo sistema ref.) -->
  <div class="modal baixa-modal" id="cp-baixa-modal">
    <div class="modal-box sm" style="padding:0;background:#f0f0f0">
      <div class="baixa-header">
        <h3>💰 BAIXA — DESPESA</h3>
        <button onclick="document.getElementById('cp-baixa-modal').classList.remove('open')" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer">✕</button>
      </div>

          <option>DÉBITO EM CONTA</option><option>DINHEIRO</option><option>CARTÃO DÉBITO</option>

}

function cpToggle(id,checked){if(checked)cpSel.add(id);else cpSel.delete(id);}
function cpTogAll(checked,paid){
  cpRec.filter(r=>(r.status==='paid')===paid).forEach(r=>{if(checked)cpSel.add(r.id);else cpSel.delete(r.id);});
  cpDoRender();
}

async function cpOpenForm(id=null){
  cpEditId=id;const rec=id?cpRec.find(r=>r.id===id):null;
  // Preencher datalist de fornecedores com histórico
  const uniq=[...new Set(cpRec.map(r=>r.fornecedor).filter(Boolean))];
  const dl=document.getElementById('list-fornecedores-cp');
  if(dl)dl.innerHTML=uniq.map(f=>`<option>${esc(f)}</option>`).join('');
  // Preencher contas contábeis
  const pc=await dbGet('plano_contas');
  const sel=document.getElementById('cpf-conta-contabil');
  if(sel){sel.innerHTML='<option value="">Selecionar...</option>'+pc.filter(p=>p.nivel===3&&['DESPESA','CUSTO'].includes(p.tipo)).map(p=>`<option value="${esc(p.codigo)}">${esc(p.codigo)} — ${esc(p.nome)}</option>`).join('');}
  document.getElementById('cp-form-title').textContent=id?'Editar Conta a Pagar':'Nova Conta a Pagar';
  document.getElementById('cpf-empresa').value=rec?.empresa||(currentEmpresa!=='GERAL'?currentEmpresa:'DL');
  document.getElementById('cpf-data_lanc').value=rec?.data_lanc||today();
  document.getElementById('cpf-vencimento').value=rec?.vencimento||today();
  document.getElementById('cpf-tipo').value=rec?.tipo_despesa||'';
  document.getElementById('cpf-fornecedor').value=rec?.fornecedor||'';
  document.getElementById('cpf-parcela').value=rec?.parcela||'1/1';
  document.getElementById('cpf-valor').value=rec?.valor??'';
  document.getElementById('cpf-recorrencia').value='1';
  document.getElementById('cpf-total-prev').value='';
  document.getElementById('cpf-descricao').value=rec?.descricao_adicional||'';
  document.getElementById('cpf-forma').value=rec?.forma_pagamento||'PIX';
  document.getElementById('cpf-categoria').value=rec?.categoria||'';
  document.getElementById('cpf-conta-contabil').value=rec?.conta_contabil||'';
  document.getElementById('cpf-natureza').value=rec?.natureza||'DESP_OPERACIONAL';
  document.getElementById('cpf-dt_pgto').value=rec?.data_pagamento||'';
  document.getElementById('cpf-valor_pago').value=rec?.valor_pago??'';
  document.getElementById('cpf-status').value=rec?.status||'open';
  document.getElementById('cpf-observacao').value=rec?.observacao||'';
  document.getElementById('cp-form-modal').classList.add('open');
}

function cpCalcTotal(){
  const v=parseFloat(document.getElementById('cpf-valor')?.value)||0;
  const r=parseInt(document.getElementById('cpf-recorrencia')?.value)||1;
  const el=document.getElementById('cpf-total-prev');
  if(el)el.value=v>0?`${R$(v)} × ${r} = ${R$(v*r)}`:'';
}

async function cpSalvar(){
  const emp=document.getElementById('cpf-empresa').value;
  const forn=document.getElementById('cpf-fornecedor').value.trim();
  const venc=document.getElementById('cpf-vencimento').value;
  const valor=Number(document.getElementById('cpf-valor').value||0);
  const recorr=parseInt(document.getElementById('cpf-recorrencia').value)||1;
  if(!forn||!venc||!valor){toast('Preencha fornecedor, vencimento e valor!','err');return;}
  const base={
    empresa:emp,data_lanc:document.getElementById('cpf-data_lanc').value,
    tipo_despesa:document.getElementById('cpf-tipo').value.trim(),
    fornecedor:forn,vencimento:venc,valor,
    descricao_adicional:document.getElementById('cpf-descricao').value.trim(),
    forma_pagamento:document.getElementById('cpf-forma').value,

// TELA DE BAIXA
async function cpAbrirBaixa(id){
  const rec=cpRec.find(r=>r.id===id);if(!rec)return;
  const contas=await dbGet('contas');
  document.getElementById('baixa-id').value=id;
  document.getElementById('baixa-descricao').value=rec.tipo_despesa||'';
  document.getElementById('baixa-desc-adicional').value=rec.descricao_adicional||'';
  document.getElementById('baixa-fornecedor').value=rec.fornecedor||'';
  document.getElementById('baixa-parcela').textContent=rec.parcela||'1/1';
  document.getElementById('baixa-vencimento').textContent=fDate(rec.vencimento);
  document.getElementById('baixa-valor').textContent=R$(rec.valor);
  document.getElementById('baixa-conta').innerHTML=contas.map(ct=>`<option value="${ct.id}" ${ct.id===rec.conta_bancaria_id?'selected':''}>${esc(ct.nome)}</option>`).join('');
  document.getElementById('baixa-forma').value=rec.forma_pagamento||'PIX';
  document.getElementById('baixa-data-pgto').value=rec.data_pagamento||today();
  document.getElementById('baixa-valor-pago').value=rec.valor_pago||rec.valor||'';
  const warn=document.getElementById('baixa-comprovante-warn');
  warn.textContent=rec.comprovante_url?'✅ Comprovante anexado':'Comprovante não anexado';
  warn.style.color=rec.comprovante_url?'var(--green)':'var(--red)';
  document.getElementById('cp-baixa-modal').classList.add('open');
}

async function baixaConfirmar(){
  const id=parseInt(document.getElementById('baixa-id').value);
  const data=document.getElementById('baixa-data-pgto').value;
  const valor=parseFloat(document.getElementById('baixa-valor-pago').value);
  const forma=document.getElementById('baixa-forma').value;
  const contaId=parseInt(document.getElementById('baixa-conta').value)||null;
  if(!data||!valor){toast('Preencha data e valor!','err');return;}
  const rec=cpRec.find(r=>r.id===id);if(!rec)return;
  try{
    await supa.from('contas_pagar').update({
      status:'paid',data_pagamento:data,valor_pago:valor,
      forma_pagamento:forma,conta_bancaria_id:contaId,
      baixado_por:currentUser?.nome||'',baixado_em:new Date().toISOString()
    }).eq('id',id);
    // Gerar lançamento contábil automático
    if(rec.conta_contabil){
      await dbAdd('lancamentos_contabeis',{
        empresa:rec.empresa||'DL',data_competencia:data,data_caixa:data,
        historico:`Pgto ${rec.fornecedor} — ${rec.tipo_despesa||'Despesa'}`,
        valor,conta_debito:rec.conta_contabil,
        conta_credito:'1.1.01',  // caixa/banco — pode vincular a conta correta
        origem_tipo:'contas_pagar',origem_id:id,conciliado:false
      });
    }
    document.getElementById('cp-baixa-modal').classList.remove('open');
    toast('Baixa realizada! Lançamento contábil gerado.','ok');
    await pgContasPagar(document.getElementById('content'));
  }catch(e){toast('Erro: '+e.message,'err');}
}

async function baixaExcluir(){
  const id=parseInt(document.getElementById('baixa-id').value);

  await supa.from('contas_pagar').delete().eq('id',id);

}

function baixaAnexarComprovante(){

async function cpBaixarSelecionados(){

}

async function dreCalcular(){
  const emp=document.getElementById('dre-emp').value;
  const yr=document.getElementById('dre-yr').value;
  const mo=document.getElementById('dre-mo').value;
  const body=document.getElementById('dre-body');
  body.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted)">⏳ Calculando...</div>';

  const [pr,pd,cp,pc]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar'),dbGet('plano_contas')]);

  // Filtrar por empresa e período
  const filtroPeriodo=(arr,campoData)=>arr.filter(r=>{
    const emp2=r.empresa||'DL';
    if(emp!=='GERAL'&&emp2!==emp)return false;
    const d=r[campoData];if(!d)return false;
    if(!d.startsWith(yr))return false;
    if(mo&&d.slice(5,7)!==mo)return false;
    return true;
  });

  const fPR=filtroPeriodo(pr,'dt_pagamento');
  const fPD=filtroPeriodo(pd,'dt_pagamento');
  const fCP=filtroPeriodo(cp,'data_pagamento').filter(r=>r.status==='paid');

  // Agrupar receitas por natureza
  const recBruta=fPR.filter(p=>p.natureza==='RECEITA_BRUTA'||!p.natureza).reduce((s,p)=>s+(+p.valor_pago||0),0);
  const deducoes=fPR.filter(p=>p.natureza==='DEDUCAO').reduce((s,p)=>s+(+p.valor_pago||0),0);
  const recLiquida=recBruta-deducoes;

  // CMV
  const cmv=[...fPD,].filter(p=>p.natureza==='CMV').reduce((s,p)=>s+(+p.valor_pago||0),0)+
    fCP.filter(r=>r.natureza==='CMV').reduce((s,r)=>s+(+(r.valor_pago??r.valor)||0),0);
  const lucroBruto=recLiquida-cmv;

  // Despesas operacionais por grupo
  const getDespOp=(natureza)=>
    fPD.filter(p=>p.natureza===natureza).reduce((s,p)=>s+(+p.valor_pago||0),0)+
    fCP.filter(r=>r.natureza===natureza).reduce((s,r)=>s+(+(r.valor_pago??r.valor)||0),0);

  const despPessoal=getDespOp('PESSOAL');
  const despOp=getDespOp('DESP_OPERACIONAL');
  const despTrib=getDespOp('TRIBUTARIA');
  const despImport=getDespOp('IMPORTACAO');
  const despCartao=getDespOp('CARTAO');
  const totalDespOp=despPessoal+despOp+despTrib+despImport+despCartao;

  const ebit=lucroBruto-totalDespOp;

  // Resultado financeiro
  const recFin=fPR.filter(p=>p.natureza==='RECEITA_FINANCEIRA').reduce((s,p)=>s+(+p.valor_pago||0),0);
  const despFin=getDespOp('DESP_FINANCEIRA');
  const resFinanceiro=recFin-despFin;

  const lucroLiquido=ebit+resFinanceiro;
  const periodo=mo?`${['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(mo)]}/${yr}`:`Ano ${yr}`;

  // Detalhe por categoria nas despesas operacionais
  const catMap={};
  [...fPD,...fCP.map(r=>({...r,cat_nome:r.tipo_despesa||r.categoria}))].filter(p=>(p.natureza||'DESP_OPERACIONAL')!=='CMV'&&(p.natureza||'DESP_OPERACIONAL')!=='DESP_FINANCEIRA').forEach(p=>{const k=p.cat_nome||p.categoria||'Outros';catMap[k]=(catMap[k]||0)+(+p.valor_pago||+p.valor||0);});
  const topCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,10);

  const dreHtml=`<div style="max-width:800px;margin:0 auto">
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase">Empresa: ${emp==='GERAL'?'DL + MG Consolidado':emp} — Período: ${periodo}</div>
    </div>

    <!-- RECEITA BRUTA -->
    <div class="dre-group receita">
      <span>RECEITA OPERACIONAL BRUTA</span>
      <span style="font-family:'DM Mono',monospace;color:var(--green)">${R$(recBruta)}</span>
    </div>
    ${deducoes>0?`<div class="dre-row"><span style="color:var(--muted)">(-) Deduções da Receita</span><span class="td-mono" style="color:var(--red)">(${R$(deducoes)})</span></div>`:''}
    <div class="dre-subtotal"><span>= RECEITA LÍQUIDA</span><span class="td-mono" style="color:var(--green)">${R$(recLiquida)}</span></div>

    <!-- CMV -->
    ${cmv>0?`<div class="dre-group custo"><span>(-) CMV — CUSTO DAS MERCADORIAS VENDIDAS</span><span class="td-mono" style="color:var(--red)">(${R$(cmv)})</span></div>`:''}
    <div class="dre-total ${lucroBruto>=0?'lucro':'prejuizo'}">
      <span>= LUCRO BRUTO</span>
      <span class="td-mono">${R$(lucroBruto)}</span>
    </div>

    <!-- DESPESAS OPERACIONAIS -->
    <div class="dre-group despesa"><span>(-) DESPESAS OPERACIONAIS</span><span class="td-mono" style="color:var(--amber)">(${R$(totalDespOp)})</span></div>
    ${despPessoal>0?`<div class="dre-row"><span>Despesas com Pessoal (Salários/Prolabore)</span><span class="td-mono" style="color:var(--red)">(${R$(despPessoal)})</span></div>`:''}
    ${despOp>0?`<div class="dre-row"><span>Despesas Administrativas/Operacionais</span><span class="td-mono" style="color:var(--red)">(${R$(despOp)})</span></div>`:''}
    ${despTrib>0?`<div class="dre-row"><span>Despesas Tributárias (Simples/Impostos)</span><span class="td-mono" style="color:var(--red)">(${R$(despTrib)})</span></div>`:''}
    ${despImport>0?`<div class="dre-row"><span>Custos de Importação</span><span class="td-mono" style="color:var(--red)">(${R$(despImport)})</span></div>`:''}
    ${despCartao>0?`<div class="dre-row"><span>Faturas de Cartão</span><span class="td-mono" style="color:var(--red)">(${R$(despCartao)})</span></div>`:''}

    <!-- EBIT -->
    <div class="dre-subtotal"><span>= RESULTADO OPERACIONAL (EBIT)</span><span class="td-mono" style="color:${ebit>=0?'var(--blue)':'var(--red)'}">${R$(ebit)}</span></div>

    <!-- RESULTADO FINANCEIRO -->
    ${(recFin>0||despFin>0)?`<div class="dre-group" style="border-color:#6d28d9"><span>RESULTADO FINANCEIRO</span><span class="td-mono" style="color:${resFinanceiro>=0?'var(--green)':'var(--red)'}">${R$(resFinanceiro)}</span></div>
    ${recFin>0?`<div class="dre-row"><span>(+) Receitas Financeiras</span><span class="td-mono" style="color:var(--green)">${R$(recFin)}</span></div>`:''}
    ${despFin>0?`<div class="dre-row"><span>(-) Despesas Financeiras (Juros/IOF)</span><span class="td-mono" style="color:var(--red)">(${R$(despFin)})</span></div>`:''}`:'' }

    <!-- RESULTADO FINAL -->
    <div class="dre-total ${lucroLiquido>=0?'lucro':'prejuizo'}" style="margin-top:12px;font-size:17px">
      <span>${lucroLiquido>=0?'✅ LUCRO LÍQUIDO DO PERÍODO':'❌ PREJUÍZO DO PERÍODO'}</span>
      <span class="td-mono">${R$(lucroLiquido)}</span>
    </div>

    ${lucroLiquido>0&&recLiquida>0?`<div style="margin-top:8px;padding:10px 12px;background:#f0fdf4;border-radius:8px;font-size:13px;color:var(--green)">
      <strong>Margem Líquida: ${(lucroLiquido/recLiquida*100).toFixed(1)}%</strong> &nbsp;|&nbsp;
      Margem Bruta: ${lucroBruto>0?(lucroBruto/recLiquida*100).toFixed(1)+'%':'—'} &nbsp;|&nbsp;
      EBITDA (aprox.): ${R$(ebit)}
    </div>`:''}
  </div>

  <!-- DETALHE DESPESAS -->
  <div class="card" style="margin-top:14px">
    <div class="card-title">📋 Detalhe de Despesas por Categoria</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Categoria</th><th>Valor</th><th>% Receita Líquida</th><th>% Total Despesas</th></tr></thead>
      <tbody>${topCats.map(([cat,val])=>`<tr>
        <td>${esc(cat)}</td>
        <td class="td-mono" style="color:var(--red)">${R$(val)}</td>
        <td class="td-mono">${recLiquida>0?(val/recLiquida*100).toFixed(1)+'%':'—'}</td>
        <td class="td-mono">${totalDespOp+cmv>0?(val/(totalDespOp+cmv)*100).toFixed(1)+'%':'—'}</td>
      </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;

  body.innerHTML=dreHtml;
  window._dreData={emp,yr,mo,recBruta,deducoes,recLiquida,cmv,lubroBruto:lucroBruto,totalDespOp,ebit,resFinanceiro,lucroLiquido,topCats,periodo};
}

async function balancoCalcular(){
  const emp=document.getElementById('bp-emp').value;
  const yr=document.getElementById('bp-yr').value;
  const body=document.getElementById('bp-body');
  body.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted)">⏳ Calculando...</div>';

  const [pr,pd,cp,contas,cartoes]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar'),dbGet('contas'),dbGet('cartao_credito')]);

  const fEmp=arr=>emp==='GERAL'?arr:arr.filter(r=>(r.empresa||'DL')===emp);

  // ATIVO CIRCULANTE
  // Disponível: saldo inicial das contas + receitas recebidas - despesas pagas
  const contasFilt=fEmp(contas);
  const saldoContas=contasFilt.reduce((s,ct)=>s+(+ct.saldo_inicial||0),0);
  const totalRecebido=fEmp(pr).filter(p=>p.dt_pagamento?.startsWith(yr)).reduce((s,p)=>s+(+p.valor_pago||0),0);
  const totalPagoDesp=fEmp(pd).filter(p=>p.dt_pagamento?.startsWith(yr)).reduce((s,p)=>s+(+p.valor_pago||0),0);
  const totalPagoCP=fEmp(cp).filter(r=>r.status==='paid'&&r.data_pagamento?.startsWith(yr)).reduce((s,r)=>s+(+(r.valor_pago??r.valor)||0),0);
  const disponivel=saldoContas+totalRecebido-totalPagoDesp-totalPagoCP;

  // Contas a receber: parcelas não pagas
  const aReceber=fEmp(pr).filter(p=>!p.dt_pagamento).reduce((s,p)=>s+(+p.valor||0),0);

  // PASSIVO CIRCULANTE
  // Fornecedores a pagar
  const aFornec=fEmp(cp).filter(r=>r.status!=='paid').reduce((s,r)=>s+(+r.valor||0),0);

  // Faturas de cartão pendentes (estimativa: lançamentos do mês atual sem fatura fechada)
  const now2=new Date();const mesCurr=String(now2.getMonth()+1).padStart(2,'0');
  const lancCartao=await dbGet('lancamentos_cartao');
  const totalCartoesPend=fEmp(lancCartao,'empresa').filter(l=>l.data?.startsWith(yr)).reduce((s,l)=>s+(+l.valor||0),0);
  const fatCartaoFechado=fEmp(cp).filter(r=>r.natureza==='CARTAO').reduce((s,r)=>s+(+r.valor||0),0);
  const cartoesPendentes=Math.max(0,totalCartoesPend-fatCartaoFechado);

  // PATRIMÔNIO LÍQUIDO (Capital + Resultado)
  const lucroAno=totalRecebido-totalPagoDesp-totalPagoCP;

  const totalAtivoCir=disponivel+aReceber;
  const totalPassivoCir=aFornec+cartoesPendentes;
  const totalPL=totalAtivoCir-totalPassivoCir; // simplificado: PL = Ativo - Passivo

  const label=(titulo,valor,cor,negrito=false)=>`<div class="dre-row" style="${negrito?'font-weight:700':''}">

  const html=`<div class="g2" style="align-items:start">

    <div>
      <div class="dre-group receita" style="font-size:15px;font-weight:900">ATIVO <span class="td-mono">${R$(totalAtivo)}</span></div>
      <div class="dre-group" style="border-color:var(--blue);background:#e3f0fb;font-size:13px">ATIVO CIRCULANTE <span class="td-mono">${R$(totalAtivoCir)}</span></div>
      ${label('Disponível em Conta (Estimado)',disponivel,'var(--green)')}
      ${aReceber>0?label('Contas a Receber',aReceber,'var(--amber)'):''}
      <div class="dre-subtotal">= Total Ativo Circulante <span class="td-mono">${R$(totalAtivoCir)}</span></div>
      <div class="dre-group" style="border-color:#6d28d9;background:var(--soft-purple);font-size:13px;margin-top:8px">ATIVO NÃO CIRCULANTE <span class="td-mono">${R$(0)}</span></div>
      ${label('Imobilizado / Intangível',0,'var(--muted)')}
      <div style="margin-top:4px;font-size:11px;color:var(--muted);padding:4px 12px">ℹ️ Informe bens no Plano de Contas para cálculo automático</div>
    </div>

    <!-- PASSIVO + PL -->
    <div>
      <div class="dre-group custo" style="font-size:15px;font-weight:900">PASSIVO + PL <span class="td-mono">${R$(totalPassivo)}</span></div>
      <div class="dre-group" style="border-color:var(--red);background:#fce8e9;font-size:13px">PASSIVO CIRCULANTE <span class="td-mono">${R$(totalPassivoCir)}</span></div>
      ${aFornec>0?label('Fornecedores / Contas a Pagar',aFornec,'var(--red)'):''}
      ${cartoesPendentes>0?label('Cartões de Crédito (Pendentes)',cartoesPendentes,'var(--red)'):''}
      <div class="dre-subtotal">= Total Passivo Circulante <span class="td-mono" style="color:var(--red)">${R$(totalPassivoCir)}</span></div>

      <div class="dre-group" style="border-color:var(--amber);background:#fef5dc;font-size:13px;margin-top:8px">PASSIVO NÃO CIRCULANTE <span class="td-mono">${R$(0)}</span></div>
      ${label('Empréstimos LP / Mercado Crédito',0,'var(--muted)')}
      <div style="margin-top:4px;font-size:11px;color:var(--muted);padding:4px 12px">ℹ️ Informe empréstimos no Plano de Contas</div>

      <div class="dre-group resultado" style="border-color:var(--purple);background:var(--soft-purple);font-size:13px;margin-top:8px">PATRIMÔNIO LÍQUIDO <span class="td-mono" style="color:var(--purple)">${R$(totalPL)}</span></div>
      ${label('Capital Social',0,'var(--muted)')}
      ${label(`Resultado do Exercício ${yr}`,lucroAno,lucroAno>=0?'var(--green)':'var(--red)',true)}
      <div class="dre-subtotal">= Total PL <span class="td-mono" style="color:var(--purple)">${R$(totalPL)}</span></div>
    </div>
  </div>

  <!-- EQUAÇÃO -->
  <div style="margin-top:12px;padding:12px;border-radius:8px;background:${Math.abs(totalAtivo-(totalPassivoCir+totalPL))<1?'#f0fdf4':'#fff7ed'};border:1px solid ${Math.abs(totalAtivo-(totalPassivoCir+totalPL))<1?'#bbf7d0':'#fed7aa'}">
    <strong>Equação Contábil:</strong> Ativo (${R$(totalAtivo)}) = Passivo (${R$(totalPassivoCir)}) + PL (${R$(totalPL)}) 
    ${Math.abs(totalAtivo-(totalPassivoCir+totalPL))<1?'✅ Balanceado':'⚠️ Diferença: '+R$(totalAtivo-(totalPassivoCir+totalPL))+' — Cadastre lançamentos iniciais para balancear'}
  </div>
  <div style="margin-top:8px;font-size:12px;color:var(--muted);padding:8px 12px;background:#f5f7f9;border-radius:6px">
    ℹ️ Para um Balanço Patrimonial completo e preciso, cadastre: (1) Capital Social via Plano de Contas, (2) Empréstimos LP, (3) Bens do Imobilizado. 
    Os saldos bancários são estimados com base nas entradas e saídas registradas.
  </div>`;

  body.innerHTML=html;
  window._bpData={emp,yr,html,totalAtivo,totalPassivoCir,totalPL};
}

          <div style="border:1px solid var(--line);border-top:none;border-radius:0 0 6px 6px;overflow:hidden">
            ${nivel2.map(g=>{

async function recSalvarCat(){

function gerarParcelasRec(){
  const data1=document.getElementById('rec-data1').value;
  const valor=parseFloat(document.getElementById('rec-valor').value)||0;
  const qtde=parseInt(document.getElementById('rec-qtde').value)||1;
  const prazo=parseInt(document.getElementById('rec-prazo').value)||0;
  if(!data1||valor<=0){toast('Preencha data e valor!','err');return;}
  parcRecTemp=[];
  for(let i=0;i<qtde;i++){
    let venc = addMonths(data1,i);
    if(prazo>0 && i===0){ const d=new Date(data1+'T00:00:00'); d.setDate(d.getDate()+prazo); venc=d.toISOString().split('T')[0]; }
    parcRecTemp.push({numero:i+1,total:qtde,vencimento:venc,valor,recebido:false});
  }
  document.getElementById('tb-rec-parc').innerHTML=parcRecTemp.map((p,i)=>`<tr>
    <td>${p.numero}/${p.total}</td><td>${fDate(p.vencimento)}</td>
    <td class="td-mono" style="color:var(--green)">${R$(p.valor)}</td>

async function salvarReceita(){
  if(parcRecTemp.length===0){toast('Gere as parcelas primeiro!','err');return;}
  const valor=parseFloat(document.getElementById('rec-valor').value)||0;
  const qtde=parseInt(document.getElementById('rec-qtde').value)||1;
  if(valor<=0){toast('Informe o valor!','err');return;}
  const [cats,contas,clientes,formas]=await Promise.all([dbGet('categorias_receita'),dbGet('contas'),dbGet('clientes'),dbGet('formas_pagamento')]);
  const emp=document.getElementById('rec-emp').value;
  const tipoId=parseInt(document.getElementById('rec-tipo').value);
  const contaId=parseInt(document.getElementById('rec-conta').value);
  const cliId=parseInt(document.getElementById('rec-cli').value);
  const formaId=parseInt(document.getElementById('rec-forma').value);
  const cat=cats.find(c=>c.id===tipoId);const conta=contas.find(c=>c.id===contaId);
  const cli=clientes.find(c=>c.id===cliId);const forma=formas.find(f=>f.id===formaId);
  const recId=await dbAdd('receitas',{empresa:emp,data_lancamento:today(),conta_id:contaId,conta_nome:conta?.nome,tipo_id:tipoId,tipo_nome:cat?.nome,cliente_id:cliId,cliente_nome:cli?.nome,forma_id:formaId,forma_nome:forma?.nome,descricao:document.getElementById('rec-desc').value,data_primeira:document.getElementById('rec-data1').value,valor_parcela:valor,qtde_parcelas:qtde,valor_total:valor*qtde,recebido:parcRecTemp.every(p=>p.recebido)});
  for(const p of parcRecTemp) await dbAdd('parcelas_receita',{empresa:emp,receita_id:recId,numero:p.numero,total:p.total,vencimento:p.vencimento,valor:p.valor,forma_id:formaId,forma_nome:forma?.nome,conta_id:contaId,conta_nome:conta?.nome,tipo_nome:cat?.nome,cliente_nome:cli?.nome,descricao:document.getElementById('rec-desc').value,dt_pagamento:p.recebido?today():null,valor_pago:p.recebido?p.valor:0,categoria:cat?.nome});
  document.getElementById('modal-rec').classList.remove('open');
  toast('Receita salva!','ok');
  pgReceitas(document.getElementById('content'));
}

async function excluirReceita(id){

}

function cartaoLancar(id, nome){
  document.getElementById('cc-cartao-id').value=id;
  document.getElementById('cc-nome-modal').textContent=nome;
  document.getElementById('cc-data').value=today();
  document.getElementById('cc-desc').value='';
  document.getElementById('cc-cat').value='';
  document.getElementById('cc-val').value='';
  document.getElementById('cc-parc').value='1';
  document.getElementById('modal-cc-lanc').classList.add('open');
}

async function salvarLancCC(){
  const cartaoId=parseInt(document.getElementById('cc-cartao-id').value);
  const data=document.getElementById('cc-data').value;
  const desc=document.getElementById('cc-desc').value.trim();
  const val=parseFloat(document.getElementById('cc-val').value);
  const parc=parseInt(document.getElementById('cc-parc').value)||1;
  const cat=document.getElementById('cc-cat').value;
  const emp=document.getElementById('cc-emp').value;
  if(!desc||!val){toast('Preencha!','err');return;}
  for(let i=0;i<parc;i++) await dbAdd('lancamentos_cartao',{cartao_id:cartaoId,empresa:emp,data:addMonths(data,i),descricao:desc,categoria:cat,valor:val/parc,parcela_atual:i+1,qtde_parcelas:parc});
  document.getElementById('modal-cc-lanc').classList.remove('open');
  toast(`${parc} parcela(s) lançada(s)!`,'ok');
  pgCartao(document.getElementById('content'));
}

async function salvarNovoCartao(){
  const nome=document.getElementById('nc-nome').value.trim();
  if(!nome){toast('Nome obrigatório!','err');return;}
  await dbAdd('cartao_credito',{empresa:document.getElementById('nc-emp').value,nome,bandeira:document.getElementById('nc-band').value,limite:parseFloat(document.getElementById('nc-lim').value)||0,dia_fechamento:parseInt(document.getElementById('nc-fech').value),dia_vencimento:parseInt(document.getElementById('nc-venc').value),ativo:true});
  document.getElementById('modal-novo-cartao').classList.remove('open');
  toast('Cartão salvo!','ok');pgCartao(document.getElementById('content'));
}

async function cartaoVerFatura(cartaoId, nome){
  const lancs = await dbGet('lancamentos_cartao');
  const cart = (await dbGet('cartao_credito',cartaoId));
  const now = new Date(); const mes = String(now.getMonth()+1).padStart(2,'0'); const ano = now.getFullYear();
  const lancMes = lancs.filter(l=>l.cartao_id===cartaoId&&l.data?.startsWith(`${ano}-${mes}`));
  const total = lancMes.reduce((s,l)=>s+(+l.valor||0),0);
  printReport(`<p style="margin-bottom:10px"><strong>Período:</strong> ${mes}/${ano} · <strong>Fechamento:</strong> Dia ${cart?.dia_fechamento} · <strong>Vencimento:</strong> Dia ${cart?.dia_vencimento}</p>
  <table><thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Parcelas</th><th>Valor</th></tr></thead>
  <tbody>${lancMes.map(l=>`<tr><td>${fDate(l.data)}</td><td>${esc(l.descricao)}</td><td>${esc(l.categoria||'-')}</td><td>${l.parcela_atual||1}/${l.qtde_parcelas||1}</td><td class="red">${R$(l.valor)}</td></tr>`).join('')}
  <tr class="total"><td colspan="4"><strong>TOTAL DA FATURA</strong></td><td class="red"><strong>${R$(total)}</strong></td></tr>
  </tbody></table>`, `FATURA CARTÃO ${nome.toUpperCase()} — ${mes}/${ano}`);
}

async function cartaoFecharFatura(cartaoId, nome, diaFech, diaVenc){
  const now = new Date(); const mes = String(now.getMonth()+1).padStart(2,'0'); const ano = now.getFullYear();
  const lancs = await dbGet('lancamentos_cartao');
  const lancMes = lancs.filter(l=>l.cartao_id===cartaoId&&l.data?.startsWith(`${ano}-${mes}`));
  const total = lancMes.reduce((s,l)=>s+(+l.valor||0),0);
  if(total<=0){toast('Fatura zerada, nada a fechar','info');return;}
  if(!(await confirm2(`Fechar fatura de ${nome}: ${R$(total)}?\nIsso lançará automaticamente em Contas a Pagar.`)))return;
  const cart = await dbGet('cartao_credito',cartaoId);
  // Calcular data de vencimento da fatura
  const diaVencNum = parseInt(diaVenc)||10;
  const mesVenc = now.getMonth()===11 ? 1 : now.getMonth()+2;
  const anoVenc = now.getMonth()===11 ? ano+1 : ano;
  const dataVenc = `${anoVenc}-${String(mesVenc).padStart(2,'0')}-${String(diaVencNum).padStart(2,'0')}`;
  await supa.from('contas_pagar').insert({
    empresa: cart?.empresa||'DL',
    data_lanc: today(),
    tipo_despesa: 'CARTÃO DE CRÉDITO',
    fornecedor: nome,
    parcela: '1/1',
    vencimento: dataVenc,
    valor: total,
    descricao_adicional: `Fatura ${mes}/${ano} — ${lancMes.length} lançamentos`,
    forma_pagamento: 'Débito em conta',
    categoria: 'CARTÃO',
    status: 'open',
    cartao_id: cartaoId,
    fatura_mes: `${ano}-${mes}`
  });
  toast(`Fatura de ${R$(total)} lançada em Contas a Pagar! Vence ${fDate(dataVenc)}`,'ok');
  pgCartao(document.getElementById('content'));
}

async function cartaoFecharFaturas(){
  const cartoes = await dbGet('cartao_credito');
  const now = new Date(); const mes = String(now.getMonth()+1).padStart(2,'0'); const ano = now.getFullYear();
  const lancs = await dbGet('lancamentos_cartao');
  let count=0;
  for(const cart of cartoes){
    const lancMes=lancs.filter(l=>l.cartao_id===cart.id&&l.data?.startsWith(`${ano}-${mes}`));
    const total=lancMes.reduce((s,l)=>s+(+l.valor||0),0);
    if(total<=0) continue;
    // checar se ja foi fechada
    const {data:jpfechada}=await supa.from('contas_pagar').select('id').eq('cartao_id',cart.id).eq('fatura_mes',`${ano}-${mes}`).limit(1);
    if(jpfechada&&jpfechada.length>0) continue;
    const mesVenc=now.getMonth()===11?1:now.getMonth()+2;const anoVenc=now.getMonth()===11?ano+1:ano;
    const dataVenc=`${anoVenc}-${String(mesVenc).padStart(2,'0')}-${String(cart.dia_vencimento||10).padStart(2,'0')}`;
    await supa.from('contas_pagar').insert({empresa:cart.empresa||'DL',data_lanc:today(),tipo_despesa:'CARTÃO DE CRÉDITO',fornecedor:cart.nome,parcela:'1/1',vencimento:dataVenc,valor:total,descricao_adicional:`Fatura ${mes}/${ano}`,forma_pagamento:'Débito em conta',categoria:'CARTÃO',status:'open',cartao_id:cart.id,fatura_mes:`${ano}-${mes}`});
    count++;
  }
  if(count>0){toast(`${count} fatura(s) lançada(s) em Contas a Pagar!`,'ok');}
  else{toast('Nenhuma fatura nova para fechar','info');}
  pgCartao(document.getElementById('content'));
}

async function excluirLancCC(id){if(!(await confirm2('Excluir?')))return;await dbDelete('lancamentos_cartao',id);pgCartao(document.getElementById('content'));}

// CONCILIAÇÃO BANCÁRIA — upload CSV, cruzamento, confirmação
// ═══════════════════════════════════════════
let concLinhas=[], concExtrato=[];

async function pgConciliacao(c){
  const contas = await dbGet('contas');
  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:16px">
    <div class="sec-title">🔍 Conciliação Bancária</div>
    <div class="card">
      <div class="card-title">📤 Importar Extrato Bancário (CSV)</div>
      <p style="color:var(--muted);font-size:13px;margin-bottom:12px">
        Formato esperado: <code>data,descricao,valor</code> (primeira linha = cabeçalho, valores negativos = débito).<br>
        A ferramenta cruza por <strong>valor</strong> e <strong>data próxima (±3 dias)</strong> com lançamentos do sistema.
      </p>
      <div class="frow c4" style="margin-bottom:12px">
        <div class="form-group"><label class="form-label">Empresa</label>
          <select class="field" id="conc-emp">
            <option value="DL">DL</option><option value="MG">MG</option>
          </select>
        </div>

          <select class="field" id="conc-conta">${contas.map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="form-label">Período Inicial</label><input type="date" class="field" id="conc-di" value="${today().slice(0,7)+'-01'}"></div>
        <div class="form-group"><label class="form-label">Período Final</label><input type="date" class="field" id="conc-df" value="${today()}"></div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Arquivo CSV do Banco</label>
        <input type="file" class="field" id="conc-file" accept=".csv,.txt,.ofx" style="height:auto;padding:8px">
      </div>
      <button class="btn btn-blue" onclick="concProcessar()">🔍 Processar Extrato</button>
    </div>
    <div id="conc-resultado"></div>
  </div>`;
}

async function concProcessar(){
  const file = document.getElementById('conc-file').files[0];
  const di = document.getElementById('conc-di').value;
  const df = document.getElementById('conc-df').value;
  const emp = document.getElementById('conc-emp').value;
  if(!file){toast('Selecione um arquivo CSV!','err');return;}

  // Parse CSV
  const text = await file.text();
  const lines = text.split('\n').filter(l=>l.trim());
  concExtrato=[];
  for(const line of lines.slice(1)){
    const parts = line.split(',');
    if(parts.length>=3){
      const valor = parseFloat(parts[2]?.replace(/[^0-9.,-]/g,'').replace(',','.'));
      if(!isNaN(valor)) concExtrato.push({
        data: parts[0]?.trim().replace(/\//g,'-'),
        descricao: parts[1]?.trim(),
        valor,
        tipo: valor>=0?'CREDITO':'DEBITO'
      });
    }
  }

  if(concExtrato.length===0){toast('Nenhum lançamento encontrado no CSV. Verifique o formato.','err');return;}

  // Buscar lançamentos do sistema
  const [pr,pd,cp] = await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);
  const sistRec = pr.filter(p=>p.dt_pagamento>=di&&p.dt_pagamento<=df&&(p.empresa||'DL')===emp).map(p=>({id:p.id,tipo:'receita_parcela',tabela:'parcelas_receita',data:p.dt_pagamento,desc:p.tipo_nome||p.descricao||'Receita',valor:+(p.valor_pago||p.valor||0),vinculado:false}));
  const sistDesp = pd.filter(p=>p.dt_pagamento>=di&&p.dt_pagamento<=df&&(p.empresa||'DL')===emp).map(p=>({id:p.id,tipo:'despesa_parcela',tabela:'parcelas_despesa',data:p.dt_pagamento,desc:p.cat_nome||p.descricao||'Despesa',valor:-(+(p.valor_pago||p.valor||0)),vinculado:false}));
  const sistCP = cp.filter(p=>p.data_pagamento>=di&&p.data_pagamento<=df&&(p.empresa||'DL')===emp&&p.status==='paid').map(p=>({id:p.id,tipo:'contas_pagar',tabela:'contas_pagar',data:p.data_pagamento,desc:p.fornecedor||p.tipo_despesa||'Despesa',valor:-(+(p.valor_pago||p.valor||0)),vinculado:false}));
  concLinhas = [...sistRec,...sistDesp,...sistCP];

  // Cruzamento automático: valor exato ± 0.01 e data ± 3 dias
  const matches = [];
  const extratoUsado = new Set();
  const sistemaUsado = new Set();

  for(let ei=0;ei<concExtrato.length;ei++){
    const ext = concExtrato[ei];
    const extValor = ext.valor;
    const extData = new Date(normDate(ext.data)+'T00:00:00');
    if(!extData.getTime()) continue;

    for(let si=0;si<concLinhas.length;si++){
      if(sistemaUsado.has(si)||extratoUsado.has(ei)) continue;
      const sist = concLinhas[si];
      const sistData = new Date(sist.data+'T00:00:00');
      const diffDays = Math.abs((extData-sistData)/86400000);
      const diffVal = Math.abs(extValor - sist.valor);

      if(diffVal<=0.02 && diffDays<=3){
        matches.push({ei,si,ext,sist,diffDays,diffVal,auto:diffVal<0.01&&diffDays<=1});
        extratoUsado.add(ei);
        sistemaUsado.add(si);
        break;
      }
    }
  }

  const semVinculo = concExtrato.filter((_,i)=>!extratoUsado.has(i));
  const naoConciliados = concLinhas.filter((_,i)=>!sistemaUsado.has(i));

  const totalExt = concExtrato.reduce((s,e)=>s+e.valor,0);
  const totalSist = concLinhas.reduce((s,l)=>s+l.valor,0);

  document.getElementById('conc-resultado').innerHTML=`
  <div class="card" style="padding:14px">
    <div class="card-title">📊 Resultado do Processamento</div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px">
      <div><div class="form-label">Total no Extrato</div><div style="font-size:18px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue)">${R$(totalExt)}</div></div>
      <div><div class="form-label">Lançamentos Sistema</div><div style="font-size:18px;font-weight:800;font-family:'DM Mono',monospace;color:var(--blue)">${R$(totalSist)}</div></div>
      <div><div class="form-label">Diferença</div><div style="font-size:18px;font-weight:800;font-family:'DM Mono',monospace;color:${Math.abs(totalExt-totalSist)<0.02?'var(--green)':'var(--red)'}">${R$(totalExt-totalSist)}</div></div>
      <div><div class="form-label">Automáticos</div><div style="font-size:18px;font-weight:800;color:var(--green)">${matches.filter(m=>m.auto).length}</div></div>
      <div><div class="form-label">Aguardando conf.</div><div style="font-size:18px;font-weight:800;color:var(--amber)">${matches.filter(m=>!m.auto).length}</div></div>
      <div><div class="form-label">Sem vínculo (extrato)</div><div style="font-size:18px;font-weight:800;color:var(--red)">${semVinculo.length}</div></div>
    </div>
  </div>

  <!-- VINCULAÇÕES AUTOMÁTICAS -->
  ${matches.filter(m=>m.auto).length>0?`<div class="card">
    <div class="card-title" style="color:var(--green)">✅ Vinculações Automáticas (${matches.filter(m=>m.auto).length})</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Data Extrato</th><th>Descrição Extrato</th><th>Valor</th><th>← Vinculado a →</th><th>Data Sistema</th><th>Desc. Sistema</th><th>Ação</th></tr></thead>
      <tbody>${matches.filter(m=>m.auto).map(m=>`<tr style="background:#f0fdf4">
        <td>${m.ext.data}</td><td>${esc(m.ext.descricao)}</td>
        <td class="td-mono" style="color:${m.ext.valor>=0?'var(--green)':'var(--red)'}">${R$(m.ext.valor)}</td>
        <td style="text-align:center">🔗</td>
        <td>${fDate(m.sist.data)}</td><td>${esc(m.sist.desc)}</td>
        <td><button class="btn btn-green btn-xs" onclick="concVincular(${m.ei},${m.si},this)">✅ Confirmar</button></td>

function concSelectAll(cb){document.querySelectorAll('.conc-sv-check').forEach(c=>c.checked=cb.checked);}
function concVincular(ei,si,btn){btn.textContent='✅ Vinculado';btn.disabled=true;btn.parentElement.style.background='rgba(31,158,74,.1)';toast('Vínculo registrado!','ok');}

async function concCriarSelecionados(extratosJson){
  const selecionados=[...document.querySelectorAll('.conc-sv-check:checked')];
  if(!selecionados.length){toast('Selecione pelo menos um','info');return;}
  const emp=document.getElementById('conc-emp').value;
  let count=0;
  for(const cb of selecionados){
    const idx=parseInt(cb.dataset.idx);
    const ext=JSON.parse(extratosJson[idx]);
    const tipo=document.getElementById(`conc-tipo-${idx}`)?.value;
    if(tipo==='ignorar') continue;
    const dataFmt=normDate(ext.data)||today();
    if(tipo==='receita'){
      const recId=await dbAdd('receitas',{empresa:emp,data_lancamento:dataFmt,tipo_nome:'Conciliação',conta_nome:'',descricao:ext.descricao,data_primeira:dataFmt,valor_parcela:Math.abs(ext.valor),qtde_parcelas:1,valor_total:Math.abs(ext.valor),recebido:true});
      await dbAdd('parcelas_receita',{empresa:emp,receita_id:recId,numero:1,total:1,vencimento:dataFmt,valor:Math.abs(ext.valor),dt_pagamento:dataFmt,valor_pago:Math.abs(ext.valor),tipo_nome:'Conciliação',descricao:ext.descricao});
    } else {
      await supa.from('contas_pagar').insert({empresa:emp,data_lanc:dataFmt,tipo_despesa:'Conciliação Bancária',fornecedor:ext.descricao||'Extrato',vencimento:dataFmt,valor:Math.abs(ext.valor),descricao_adicional:ext.descricao,status:'paid',data_pagamento:dataFmt,valor_pago:Math.abs(ext.valor)});
    }
    count++;
  }
  toast(`${count} lançamento(s) criado(s)!`,'ok');
  pgConciliacao(document.getElementById('content'));
}
