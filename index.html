async function pgExtrato(c){
  const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);
  const now=new Date();const curYr=String(now.getFullYear());const curMo=String(now.getMonth()+1).padStart(2,'0');
  const anos=[...new Set([...pr,...pd,...cp].map(p=>(p.dt_pagamento||p.data_pagamento)?.slice(0,4)).filter(Boolean))].sort().reverse();
  const months=['Todos','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const filt=(yr,mo)=>{
    let r=empFilter(pr,'empresa').filter(p=>!!p.dt_pagamento);
    let d=empFilter(pd,'empresa').filter(p=>!!p.dt_pagamento);
    let cpP=empFilter(cp,'empresa').filter(p=>p.status==='paid'&&!!p.data_pagamento);
    if(yr){r=r.filter(p=>p.dt_pagamento?.startsWith(yr));d=d.filter(p=>p.dt_pagamento?.startsWith(yr));cpP=cpP.filter(p=>p.data_pagamento?.startsWith(yr));}
    if(mo){r=r.filter(p=>p.dt_pagamento?.slice(5,7)===mo);d=d.filter(p=>p.dt_pagamento?.slice(5,7)===mo);cpP=cpP.filter(p=>p.data_pagamento?.slice(5,7)===mo);}
    return [r,d,cpP];
  };
  const [rf,df,cpf]=filt(curYr,curMo);
  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="sec-title">📋 Extrato Comparativo</div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
      <div><div class="form-label">Ano</div><select class="field" style="width:88px" id="ext-yr" onchange="extFilt()"><option value="">Todos</option>${anos.map(a=>`<option value="${a}" ${a===curYr?'selected':''}>${a}</option>`).join('')}</select></div>
      <div><div class="form-label">Mês</div><select class="field" style="width:100px" id="ext-mo" onchange="extFilt()">${months.map((m,i)=>`<option value="${i===0?'':String(i).padStart(2,'0')}" ${i>0&&String(i).padStart(2,'0')===curMo?'selected':''}>${m}</option>`).join('')}</select></div>
    </div>
    <div id="ext-body">${buildExtrato(rf,df,cpf)}</div>
  </div>`;
}
function buildExtrato(r,d,cpP){
  const tr=r.reduce((s,p)=>s+(+p.valor_pago||0),0);
  const td=d.reduce((s,p)=>s+(+p.valor_pago||0),0)+cpP.reduce((s,x)=>s+(+(x.valor_pago??x.valor)||0),0);
  const s=tr-td;
  return `<div class="split">
    <div style="background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)">
      <div class="colhead green" style="font-size:14px">💚 RECEITAS (${r.length})</div>
      <div class="tbl-wrap" style="max-height:380px;overflow-y:auto"><table>
        <thead><tr><th>Emp</th><th>Tipo</th><th>Vencimento</th><th>Valor</th><th>Pgto</th></tr></thead>
        <tbody>${r.length===0?'<tr><td colspan="5" class="empty"><p>Sem dados</p></td></tr>':r.map(p=>`<tr><td>${empTag(p.empresa)}</td><td>${esc(p.tipo_nome||p.categoria||'-')}</td><td>${fDate(p.vencimento)}</td><td class="td-mono" style="color:var(--green)">${R$(p.valor_pago)}</td><td>${fDate(p.dt_pagamento)}</td></tr>`).join('')}</tbody>
      </table></div>
    </div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)">
      <div class="colhead red" style="font-size:14px">❤️ DESPESAS (${d.length+cpP.length})</div>
      <div class="tbl-wrap" style="max-height:380px;overflow-y:auto"><table>
        <thead><tr><th>Emp</th><th>Tipo</th><th>Vencimento</th><th>Valor</th><th>Pgto</th></tr></thead>
        <tbody>${d.length===0&&cpP.length===0?'<tr><td colspan="5" class="empty"><p>Sem dados</p></td></tr>':[
          ...d.map(p=>`<tr><td>${empTag(p.empresa)}</td><td>${esc(p.cat_nome||p.categoria||'-')}</td><td>${fDate(p.vencimento)}</td><td class="td-mono" style="color:var(--red)">${R$(p.valor_pago)}</td><td>${fDate(p.dt_pagamento)}</td></tr>`),
          ...cpP.map(p=>`<tr><td>${empTag(p.empresa)}</td><td><span class="badge b-amber">${esc(p.tipo_despesa||p.categoria||'-')}</span></td><td>${fDate(p.vencimento)}</td><td class="td-mono" style="color:var(--red)">${R$(p.valor_pago??p.valor)}</td><td>${fDate(p.data_pagamento)}</td></tr>`)
        ].join('')}</tbody>
      </table></div>
    </div>
  </div>
  <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 16px;display:flex;gap:24px;flex-wrap:wrap">
    <div><div class="form-label">Total Receita</div><div style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:var(--green)">${R$(tr)}</div></div>
    <div><div class="form-label">Total Despesa</div><div style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:var(--red)">${R$(td)}</div></div>
    <div><div class="form-label">Saldo</div><div style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:${s>=0?'var(--blue)':'var(--red)'}">${R$(s)}</div></div>
  </div>`;
}
async function extFilt(){
  const yr=document.getElementById('ext-yr').value;const mo=document.getElementById('ext-mo').value;
  const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);
  let r=empFilter(pr,'empresa').filter(p=>!!p.dt_pagamento);let d=empFilter(pd,'empresa').filter(p=>!!p.dt_pagamento);let cpP=empFilter(cp,'empresa').filter(p=>p.status==='paid'&&!!p.data_pagamento);
  if(yr){r=r.filter(p=>p.dt_pagamento?.startsWith(yr));d=d.filter(p=>p.dt_pagamento?.startsWith(yr));cpP=cpP.filter(p=>p.data_pagamento?.startsWith(yr));}
  if(mo){r=r.filter(p=>p.dt_pagamento?.slice(5,7)===mo);d=d.filter(p=>p.dt_pagamento?.slice(5,7)===mo);cpP=cpP.filter(p=>p.data_pagamento?.slice(5,7)===mo);}
  document.getElementById('ext-body').innerHTML=buildExtrato(r,d,cpP);
}

async function relComparativo(){
  const now=new Date();const yr=now.getFullYear();const mo=String(now.getMonth()+1).padStart(2,'0');
  const [pr,pd,cp]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa'),dbGet('contas_pagar')]);
  const calc=(emp)=>{
    const fpr=pr.filter(p=>(p.empresa||'DL')===emp&&p.dt_pagamento?.startsWith(`${yr}-${mo}`));
    const fpd=pd.filter(p=>(p.empresa||'DL')===emp&&p.dt_pagamento?.startsWith(`${yr}-${mo}`));
    const fcp=cp.filter(p=>(p.empresa||'DL')===emp&&p.data_pagamento?.startsWith(`${yr}-${mo}`)&&p.status==='paid');
    const r=fpr.reduce((s,p)=>s+(+p.valor_pago||0),0);
    const d=fpd.reduce((s,p)=>s+(+p.valor_pago||0),0)+fcp.reduce((s,x)=>s+(+(x.valor_pago??x.valor)||0),0);
    return {r,d,s:r-d};
  };
  const dl=calc('DL');const mg=calc('MG');
  printReport(`<table><thead><tr><th>Empresa</th><th>Receitas</th><th>Despesas</th><th>Saldo</th></tr></thead><tbody>
  <tr><td><strong>DL — D&L Importadora</strong></td><td class="green">${R$(dl.r)}</td><td class="red">${R$(dl.d)}</td><td class="${dl.s>=0?'green':'red'}">${R$(dl.s)}</td></tr>
  <tr><td><strong>MG — Mineirinha Ltda</strong></td><td class="green">${R$(mg.r)}</td><td class="red">${R$(mg.d)}</td><td class="${mg.s>=0?'green':'red'}">${R$(mg.s)}</td></tr>
  <tr class="total"><td>CONSOLIDADO</td><td class="green">${R$(dl.r+mg.r)}</td><td class="red">${R$(dl.d+mg.d)}</td><td class="${(dl.s+mg.s)>=0?'green':'red'}">${R$(dl.s+mg.s)}</td></tr>
  </tbody></table>`,`Comparativo DL × MG — ${mo}/${yr}`);}

async function relCartoes(){
  const [cartoes,lancs]=await Promise.all([dbGet('cartao_credito'),dbGet('lancamentos_cartao')]);
  const now=new Date();const mes=String(now.getMonth()+1).padStart(2,'0');const ano=now.getFullYear();
  let html='';let grandTotal=0;
  for(const cart of cartoes){
    const lm=lancs.filter(l=>l.cartao_id===cart.id&&l.data?.startsWith(`${ano}-${mes}`));
    const tot=lm.reduce((s,l)=>s+(+l.valor||0),0);grandTotal+=tot;
    html+=`<h3 style="border:none;font-size:14px;margin:12px 0 6px;color:#333">💳 ${cart.nome} (${cart.bandeira}) — ${cart.empresa||'DL'} — Vence Dia ${cart.dia_vencimento}</h3>
    <table><thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Parcelas</th><th>Valor</th></tr></thead>
    <tbody>${lm.length===0?'<tr><td colspan="5">Sem lançamentos</td></tr>':lm.map(l=>`<tr><td>${fDate(l.data)}</td><td>${esc(l.descricao)}</td><td>${esc(l.categoria||'-')}</td><td>${l.parcela_atual||1}/${l.qtde_parcelas||1}</td><td class="red">${R$(l.valor)}</td></tr>`).join('')}
    <tr class="total"><td colspan="4">TOTAL ${cart.nome.toUpperCase()}</td><td class="red">${R$(tot)}</td></tr></tbody></table>`;
  }
  html+=`<h3 style="border-top:2px solid #111;padding-top:8px">TOTAL GERAL CARTÕES: ${R$(grandTotal)}</h3>`;
  printReport(html,`Faturas Cartões — ${mes}/${ano}`);}

async function pgGraficos(c){
  const now=new Date();const [pr,pd]=await Promise.all([dbGet('parcelas_receita'),dbGet('parcelas_despesa')]);
  const yr=now.getFullYear();const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const fPR=empFilter(pr,'empresa');const fPD=empFilter(pd,'empresa');
  c.innerHTML=`<div style="display:flex;flex-direction:column;gap:16px"><div class="sec-title">📊 Gráficos</div>
    <div class="g2">
      <div class="card"><div class="card-title">🍕 Despesas por Categoria (Mês)</div><canvas id="g1" height="220"></canvas></div>
      <div class="card"><div class="card-title">🍕 Receitas por Tipo (Mês)</div><canvas id="g2" height="220"></canvas></div>
      <div class="card"><div class="card-title">📊 Receitas × Despesas ${yr}</div><canvas id="g3" height="220"></canvas></div>
      <div class="card"><div class="card-title">📈 Fluxo Acumulado ${yr}</div><canvas id="g4" height="220"></canvas></div>
    </div></div>`;
  const loadChart=()=>{
    const mo=String(now.getMonth()+1).padStart(2,'0');const colors=['#c5151b','#b07a10','#1f9e4a','#0e6eb5','#8b5cf6','#06b6d4'];
    const despMes=fPD.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${mo}`));const dc={};for(const p of despMes)dc[p.categoria||'Outros']=(dc[p.categoria||'Outros']||0)+(+p.valor_pago||0);
    const recMes=fPR.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${mo}`));const rc={};for(const p of recMes)rc[p.tipo_nome||'Outros']=(rc[p.tipo_nome||'Outros']||0)+(+p.valor_pago||0);
    if(Object.keys(dc).length>0)new Chart(document.getElementById('g1'),{type:'doughnut',data:{labels:Object.keys(dc),datasets:[{data:Object.values(dc),backgroundColor:colors,borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{color:'#5a7080',font:{size:11}}}}}});
    if(Object.keys(rc).length>0)new Chart(document.getElementById('g2'),{type:'doughnut',data:{labels:Object.keys(rc),datasets:[{data:Object.values(rc),backgroundColor:['#1f9e4a','#0e6eb5','#b07a10','#8b5cf6','#c5151b'],borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{color:'#5a7080',font:{size:11}}}}}});
    const rA=meses.map((_,i)=>{const m=String(i+1).padStart(2,'0');return fPR.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${m}`)).reduce((s,p)=>s+(+p.valor_pago||0),0);});
    const dA=meses.map((_,i)=>{const m=String(i+1).padStart(2,'0');return fPD.filter(p=>p.dt_pagamento?.startsWith(`${yr}-${m}`)).reduce((s,p)=>s+(+p.valor_pago||0),0);});
    new Chart(document.getElementById('g3'),{type:'bar',data:{labels:meses,datasets:[{label:'Receita',data:rA,backgroundColor:'rgba(31,158,74,.75)',borderRadius:4},{label:'Despesa',data:dA,backgroundColor:'rgba(197,21,27,.75)',borderRadius:4}]},options:{responsive:true,scales:{x:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}},y:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}}},plugins:{legend:{labels:{color:'#5a7080'}}}}});
    let acc=0;const fl=rA.map((r,i)=>{acc+=r-dA[i];return acc;});
    new Chart(document.getElementById('g4'),{type:'line',data:{labels:meses,datasets:[{label:'Saldo Acumulado',data:fl,borderColor:'#0e6eb5',backgroundColor:'rgba(14,110,181,.1)',fill:true,tension:.4,borderWidth:2}]},options:{responsive:true,scales:{x:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}},y:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}}},plugins:{legend:{labels:{color:'#5a7080'}}}}});
  };
  if(typeof Chart==='undefined'){const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';s.onload=loadChart;document.head.appendChild(s);}else loadChart();
}

    <div class="tabs" id="cad-tabs">

async function swCad(t){
  document.querySelectorAll('#cad-tabs .tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===t));
  const c=document.getElementById('cad-content');
  if(t==='emp')await cadEmp(c);
  else if(t==='contas')await cadTable(c,'contas','🏦 Contas',['nome','banco','tipo'],['Nome','Banco','Tipo']);
  else if(t==='cli')await cadTable(c,'clientes','👤 Clientes',['nome','cpf_cnpj','email'],['Nome','CPF/CNPJ','E-mail']);
  else if(t==='forn')await cadTable(c,'fornecedores','🏭 Fornecedores',['nome','cpf_cnpj','email'],['Nome','CPF/CNPJ','E-mail']);
  else if(t==='formas')await cadNome(c,'formas_pagamento');
  else if(t==='catr')await cadNome(c,'categorias_receita');
  else if(t==='catd')await cadCatDesp(c);
  else if(t==='cartoes')await pgCartao(c);
}
async function cadEmp(c){const e=(await dbGet('empresa'))[0]||{};c.innerHTML=`<div class="card" style="max-width:520px"><div class="frow c2"><div class="form-group"><label class="form-label">Nome</label><input class="field" id="e-nome" value="${esc(e.nome||'')}"></div><div class="form-group"><label class="form-label">CNPJ</label><input class="field" id="e-cnpj" value="${esc(e.cnpj||'')}"></div><div class="form-group"><label class="form-label">E-mail</label><input class="field" id="e-email" value="${esc(e.email||'')}"></div><div class="form-group"><label class="form-label">Telefone</label><input class="field" id="e-tel" value="${esc(e.telefone||'')}"></div></div><div class="form-group"><label class="form-label">Endereço</label><input class="field" id="e-end" value="${esc(e.endereco||'')}"></div><button class="btn btn-blue" onclick="salvarEmp()">💾 Salvar</button></div>`;}
async function salvarEmp(){const e=(await dbGet('empresa'))[0]||{id:1};await dbPut('empresa',{...e,nome:document.getElementById('e-nome').value,cnpj:document.getElementById('e-cnpj').value,email:document.getElementById('e-email').value,telefone:document.getElementById('e-tel').value,endereco:document.getElementById('e-end').value});toast('Salvo!','ok');}
async function cadTable(c,store,title,fields,labels){const items=await dbGet(store);c.innerHTML=`<div style="display:flex;flex-direction:column;gap:10px"><div style="display:flex;justify-content:flex-end"><button class="btn btn-blue btn-sm" onclick="cadOpenModal('${store}','${fields.join(',')}','${labels.join(',')}')">＋ Novo</button></div><div class="card"><div class="tbl-wrap"><table><thead><tr>${labels.map(l=>`<th>${l}</th>`).join('')}<th></th></tr></thead><tbody>${items.map(it=>`<tr>${fields.map(f=>`<td>${esc(it[f]||'-')}</td>`).join('')}<td><button class="dotbtn" onclick="excluirCad('${store}',${it.id})">🗑</button></td></tr>`).join('')}</tbody></table></div></div></div><div class="modal" id="cad-m-${store}"><div class="modal-box" style="max-width:400px"><div class="modal-head"><h2>${title}</h2><button class="modal-close" onclick="document.getElementById('cad-m-${store}').classList.remove('open')">✕</button></div>${fields.map((f,i)=>`<div class="form-group"><label class="form-label">${labels[i]}</label><input class="field" id="cf-${store}-${f}"></div>`).join('')}<div class="modal-foot"><button class="btn btn-white btn-sm" onclick="document.getElementById('cad-m-${store}').classList.remove('open')">Cancelar</button><button class="btn btn-blue btn-sm" onclick="cadSalvar('${store}','${fields.join(',')}')">💾 Salvar</button></div></div></div>`;}
function cadOpenModal(store,f,l){document.getElementById(`cad-m-${store}`).classList.add('open');}
async function cadSalvar(store,fieldsStr){const fields=fieldsStr.split(',');const obj={ativo:true};for(const f of fields)obj[f]=document.getElementById(`cf-${store}-${f}`)?.value||'';if(!obj.nome){toast('Nome obrigatório!','err');return;}await dbAdd(store,obj);document.getElementById(`cad-m-${store}`).classList.remove('open');toast('Salvo!','ok');swCad(document.querySelector('#cad-tabs .tab.active').dataset.tab);}

    <button class="btn btn-white btn-sm" onclick="exportCSV('parcelas_receita','receitas')">📥 Receitas</button>
    <button class="btn btn-white btn-sm" onclick="exportCSV('parcelas_despesa','despesas')">📥 Despesas</button>
    <button class="btn btn-white btn-sm" onclick="exportCSV('contas_pagar','contas_pagar')">📥 Contas a Pagar</button>
    <button class="btn btn-white btn-sm" onclick="exportCSV('lancamentos_cartao','cartoes')">📥 Cartões</button>
  </div></div>

  </div>`;}
async function exportBk(){const bk={};for(const t of ALL_TABLES)bk[t]=await dbGet(t);const blob=new Blob([JSON.stringify(bk,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`fin_backup_${today()}.json`;a.click();toast('Backup exportado!','ok');}
async function importBk(){const file=document.getElementById('bk-file').files[0];if(!file){toast('Selecione!','err');return;}if(!(await confirm2('ATENÇÃO: Todos os dados serão substituídos!')))return;const bk=JSON.parse(await file.text());for(const[s,d]of Object.entries(bk)){if(ALL_TABLES.includes(s)){await dbClear(s);for(const it of d)await dbPut(s,it);}}toast('Restaurado!','ok');setTimeout(()=>location.reload(),1500);}
async function exportCSV(store,fn){const d=await dbGet(store);if(!d.length){toast('Sem dados','info');return;}const h=Object.keys(d[0]);const rows=d.map(r=>h.map(k=>`"${(r[k]??'').toString().replace(/"/g,'""')}"`).join(','));const blob=new Blob(['\uFEFF'+[h.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${fn}_${today()}.csv`;a.click();}
async function limparTudo(){if(!(await confirm2('ATENÇÃO: Apagará TODOS os lançamentos!')))return;for(const t of['receitas','parcelas_receita','despesas','parcelas_despesa','transferencias','poupanca','lancamentos_cartao','contas_pagar'])await dbClear(t);toast('Limpo!','ok');go('dashboard');}

// ── PARSER XML ──
function parseNFe(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'text/xml');
  const get = (sel, base) => {
    const el = (base || doc).querySelector(sel);
    return el ? el.textContent.trim() : '';
  };
  const getFloat = (sel, base) => parseFloat(get(sel, base) || '0') || 0;

  // Detectar tipo
  const isNFe  = doc.querySelector('NFe, nfeProc') !== null;
  const isNFSe = doc.querySelector('CompNfse, nfse, RPS') !== null;
  const isCTe  = doc.querySelector('CTe, cteProc') !== null;
  const tipo   = isCTe ? 'CTe' : isNFSe ? 'NFSe' : 'NFe';

  let result = { tipo, raw: xmlStr };

  if (tipo === 'NFe') {
    // Tenta pegar de dentro de nfeProc ou NFe diretamente
    const infNFe = doc.querySelector('infNFe') || doc;
    result = {
      ...result,
      chave_acesso: get('infNFe', doc).replace(/[^0-9]/g,'').slice(0,44) ||
                    doc.querySelector('chNFe')?.textContent?.trim() || '',
      numero:  get('nNF', infNFe),
      serie:   get('serie', infNFe),
      data_emissao: (get('dhEmi', infNFe) || get('dEmi', infNFe)).slice(0,10),
      natureza_operacao: get('natOp', infNFe),
      emitente_cnpj:  get('emit CNPJ', infNFe) || get('CNPJ', doc.querySelector('emit')),
      emitente_razao: get('emit xNome', infNFe) || get('xNome', doc.querySelector('emit')),
      emitente_uf:    get('emit enderEmit UF', infNFe),
      destinatario_cnpj:  get('dest CNPJ', infNFe) || get('dest CPF', infNFe),
      destinatario_razao: get('dest xNome', infNFe),
      valor_produtos: getFloat('vProd', infNFe),
      valor_frete:    getFloat('vFrete', infNFe),
      valor_seguro:   getFloat('vSeg', infNFe),
      valor_desconto: getFloat('vDesc', infNFe),
      valor_outros:   getFloat('vOutro', infNFe),
      valor_total:    getFloat('vNF', infNFe),
      base_icms:  getFloat('vBC', infNFe),
      valor_icms: getFloat('vICMS', infNFe),
      valor_ipi:  getFloat('vIPI', infNFe),
      valor_pis:  getFloat('vPIS', infNFe),
      valor_cofins: getFloat('vCOFINS', infNFe),
      valor_iss: 0,
    };
    // Itens
    result.itens = Array.from(doc.querySelectorAll('det')).map((det, idx) => ({
      numero_item:    parseInt(det.getAttribute('nItem') || idx+1),
      codigo_produto: get('cProd', det),
      descricao:      get('xProd', det),
      ncm:            get('NCM', det),
      cfop:           get('CFOP', det),
      unidade:        get('uCom', det),
      quantidade:     getFloat('qCom', det),
      valor_unitario: getFloat('vUnCom', det),
      valor_total:    getFloat('vProd', det),
      base_icms:      getFloat('vBC', det),
      aliquota_icms:  getFloat('pICMS', det),
      valor_icms:     getFloat('vICMS', det),
    }));
    // Chave da URL ou atributo Id
    if (!result.chave_acesso) {
      const id = doc.querySelector('[Id]')?.getAttribute('Id') || '';
      result.chave_acesso = id.replace(/^NFe/, '').replace(/[^0-9]/g,'').slice(0,44);
    }
  }
  else if (tipo === 'NFSe') {
    const inf = doc.querySelector('InfNfse, Nfse') || doc;
    result = {
      ...result,
      chave_acesso: get('CodigoVerificacao', inf) || get('Numero', inf),
      numero: get('Numero', inf) || get('NumeroNfse', inf),
      serie: '',
      data_emissao: (get('DataEmissao', inf) || '').slice(0,10),
      natureza_operacao: get('DiscriminacaoServicos', inf) || get('ItemListaServico', inf),
      emitente_cnpj:  get('PrestadorServico Cnpj', inf) || get('CpfCnpj Cnpj', inf),
      emitente_razao: get('PrestadorServico RazaoSocial', inf),
      emitente_uf: '',
      destinatario_cnpj:  get('TomadorServico CpfCnpj Cnpj', inf),
      destinatario_razao: get('TomadorServico RazaoSocial', inf),
      valor_produtos: 0,
      valor_total:    getFloat('ValorLiquidoNfse', inf) || getFloat('ValorServicos', inf),
      valor_iss:      getFloat('ValorIss', inf),
      base_icms: 0, valor_icms: 0, valor_ipi: 0,
      valor_pis:    getFloat('ValorPis', inf),
      valor_cofins: getFloat('ValorCofins', inf),
      valor_ir:     getFloat('ValorIr', inf),
      valor_csll:   getFloat('ValorCsll', inf),
      itens: [],
    };
  }
  else if (tipo === 'CTe') {
    const inf = doc.querySelector('infCte') || doc;
    result = {
      ...result,
      chave_acesso: (doc.querySelector('[Id]')?.getAttribute('Id')||'').replace(/^CTe/,'').slice(0,44),
      numero: get('nCT', inf),
      serie:  get('serie', inf),
      data_emissao: (get('dhEmi', inf) || get('dEmi', inf)).slice(0,10),
      natureza_operacao: 'TRANSPORTE',
      emitente_cnpj:  get('emit CNPJ', inf),
      emitente_razao: get('emit xNome', inf),
      emitente_uf:    get('emit enderEmit UF', inf),
      destinatario_cnpj:  get('dest CNPJ', inf) || get('toma03 CNPJ', inf) || get('toma04 CNPJ', inf),
      destinatario_razao: get('dest xNome', inf) || get('toma03 xNome', inf),
      valor_total:    getFloat('vTPrest', inf),
      valor_frete:    getFloat('vTPrest', inf),
      valor_icms:     getFloat('vICMS', inf),
      base_icms:      getFloat('vBC', inf),
      valor_pis: 0, valor_cofins: 0, valor_iss: 0, valor_ipi: 0,
      itens: [],
    };
  }

  // Formatar data
  if (result.data_emissao) {
    const d = result.data_emissao.replace('T',' ').slice(0,10);
    result.data_emissao = d;
    result.mes_competencia = d.slice(0,7);
  }
  return result;
}

<title>DANFE — ${nota.numero||''}</title>

  body{font-family:Arial,sans-serif;font-size:10px;margin:0;padding:12px;color:#111}
  .danfe-header{display:grid;grid-template-columns:180px 1fr 180px;gap:8px;border:1px solid #333;padding:8px;margin-bottom:6px}
  .logo-box{border:1px solid #aaa;display:flex;align-items:center;justify-content:center;padding:6px;font-weight:900;font-size:12px;color:#b84a00;text-align:center}
  .empresa-info h2{margin:0;font-size:13px} .empresa-info p{margin:2px 0;font-size:9px}
  .danfe-title{background:#333;color:#fff;padding:6px;text-align:center;font-weight:900;font-size:11px}
  .danfe-title .num{font-size:14px;font-weight:900} .danfe-title .serie{font-size:10px}
  .section{border:1px solid #999;margin-bottom:4px;padding:4px 6px}
  .section-title{font-weight:900;font-size:9px;text-transform:uppercase;background:#eee;margin:-4px -6px 4px;padding:2px 6px;color:#444}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px}
  .field label{display:block;font-size:8px;font-weight:900;color:#555;text-transform:uppercase}
  .field span{display:block;font-size:10px;border-bottom:1px dotted #999;min-height:14px;padding:1px 0}
  table.itens{width:100%;border-collapse:collapse;font-size:9px}
  table.itens th{background:#333;color:#fff;padding:3px 4px;text-align:left}
  table.itens td{padding:2px 4px;border-bottom:1px solid #ddd}
  table.itens tr:nth-child(even) td{background:#f8f8f8}
  .totais-box{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-top:4px}
  .tot-item{border:1px solid #ccc;padding:3px 5px;text-align:center}
  .tot-item .tl{font-size:8px;font-weight:900;color:#555;text-transform:uppercase}
  .tot-item .tv{font-size:11px;font-weight:900;color:#111}
  .chave-box{background:#f0f0f0;border:1px solid #999;padding:4px 6px;font-family:monospace;font-size:9px;word-break:break-all;margin-bottom:4px}
  .rodape{margin-top:8px;border-top:1px solid #ccc;padding-top:4px;font-size:8px;color:#666;text-align:center}
  @media print{@page{margin:8mm}button{display:none!important}}
</style></head><body>

<div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:8px">
  <button onclick="window.print()" style="padding:6px 14px;background:#1f9e4a;color:#fff;border:none;border-radius:4px;font-weight:700;cursor:pointer">🖨 Imprimir</button>

  <div class="logo-box">MINEIRINHO<br>IMPORTAÇÃO<br>LTDA</div>
  <div class="empresa-info">
    <h2>${tipoLabel[nota.tipo]||'DOCUMENTO FISCAL'}</h2>

${nota.chave_acesso ? `<div class="chave-box"><strong>Chave de Acesso:</strong> ${nota.chave_acesso.replace(/(\d{4})/g,'$1 ').trim()}</div>` : ''}

${itens && itens.length > 0 ? `

<div class="totais-box">

// ── IMPORTAR XML ──
async function nfImportarXML(files) {
  const fileArr = Array.from(files);
  if(!fileArr.length) return;

  let ok=0, erros=0;
  const empresa = currentEmpresa !== 'GERAL' ? currentEmpresa : 'DL';

  for(const file of fileArr) {
    try {
      const xmlStr = await file.text();
      const parsed = parseNFe(xmlStr);
      if(!parsed.data_emissao && !parsed.numero) { erros++; continue; }

      // Verificar duplicata por chave
      if(parsed.chave_acesso) {
        const {data:existe} = await supa.from('notas_fiscais').select('id').eq('chave_acesso', parsed.chave_acesso).limit(1);
        if(existe && existe.length > 0) { toast(`NF ${parsed.numero||''} já importada (chave duplicada)`,'info'); continue; }
      }

      // Salvar nota
      const notaId = await dbAdd('notas_fiscais', {
        empresa,
        tipo: parsed.tipo,
        numero: parsed.numero,
        serie: parsed.serie,
        chave_acesso: parsed.chave_acesso || null,
        data_emissao: parsed.data_emissao || null,
        data_entrada: today(),
        natureza_operacao: parsed.natureza_operacao,
        emitente_cnpj: parsed.emitente_cnpj,
        emitente_razao: parsed.emitente_razao,
        emitente_uf: parsed.emitente_uf,
        destinatario_cnpj: parsed.destinatario_cnpj,
        destinatario_razao: parsed.destinatario_razao,
        valor_produtos: parsed.valor_produtos||0,
        valor_frete:    parsed.valor_frete||0,
        valor_seguro:   parsed.valor_seguro||0,
        valor_desconto: parsed.valor_desconto||0,
        valor_outros:   parsed.valor_outros||0,
        valor_total:    parsed.valor_total||0,
        base_icms:  parsed.base_icms||0,
        valor_icms: parsed.valor_icms||0,
        valor_ipi:  parsed.valor_ipi||0,
        valor_pis:  parsed.valor_pis||0,
        valor_cofins: parsed.valor_cofins||0,
        valor_iss:  parsed.valor_iss||0,
        valor_ir:   parsed.valor_ir||0,
        valor_csll: parsed.valor_csll||0,
        mes_competencia: parsed.mes_competencia || today().slice(0,7),
        xml_content: xmlStr.slice(0,65000), // limitar tamanho
        status: 'recebida',
        natureza_contabil: parsed.tipo === 'CTe' ? 'IMPORTACAO' : 'DESP_OPERACIONAL',
      });

      // Salvar itens
      if(parsed.itens && parsed.itens.length > 0) {
        for(const item of parsed.itens) {
          await dbAdd('notas_fiscais_itens', { nota_id: notaId, ...item });
        }
      }
      ok++;
    } catch(e) {
      console.error('Erro ao importar XML:', file.name, e);
      erros++;
    }
  }

  toast(`${ok} nota(s) importada(s)${erros>0?' | '+erros+' erro(s)':''}`, ok>0?'ok':'err');
  await pgNotasFiscais(document.getElementById('content'));
}

  await supa.from('notas_fiscais').update({status:'vinculada', contas_pagar_id:cpId}).eq('id',nfId);
  await supa.from('contas_pagar').update({observacao:`NF vinculada: ${nfId}`}).eq('id',cpId);
  document.getElementById('nf-vincular-modal').classList.remove('open');
  toast('Vinculado com sucesso!','ok');
  pgNotasFiscais(document.getElementById('content'));
}

async function nfCriarCP(nfId) {
  const nota = await dbGet('notas_fiscais', nfId);
  try {
    const cpId = await supa.from('contas_pagar').insert({
      empresa: nota.empresa||'DL',
      data_lanc: today(),
      tipo_despesa: nota.tipo==='NFSe'?'NFS-e SERVIÇO':nota.tipo==='CTe'?'CT-e FRETE':'NF-e MERCADORIA',
      fornecedor: nota.emitente_razao||'',
      parcela: '1/1',
      vencimento: nota.data_emissao||today(),
      valor: nota.valor_total||0,
      descricao_adicional: `NF ${nota.numero||''} — ${nota.natureza_operacao||''}`,
      categoria: nota.tipo==='NFSe'?'SERVIÇOS':nota.tipo==='CTe'?'FRETE':'MERCADORIA',
      natureza: nota.natureza_contabil||'DESP_OPERACIONAL',
      status: 'open',
      observacao: `Gerado automaticamente da ${nota.tipo} Nº ${nota.numero}`
    }).select('id').single();

    if(cpId.data) {
      await supa.from('notas_fiscais').update({status:'vinculada', contas_pagar_id:cpId.data.id}).eq('id',nfId);
    }
    document.getElementById('nf-vincular-modal').classList.remove('open');
    toast('Conta a pagar criada e vinculada!','ok');
    pgNotasFiscais(document.getElementById('content'));
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

async function nfExcluir(id) {
  if(!(await confirm2('Excluir esta nota fiscal?'))) return;
  await dbDelete('notas_fiscais', id);
  toast('Nota excluída!','ok');
  pgNotasFiscais(document.getElementById('content'));
}

async function nfFiltrar() {
  const emp    = document.getElementById('nf-fil-emp')?.value||'';
  const tipo   = document.getElementById('nf-fil-tipo')?.value||'';
  const mes    = document.getElementById('nf-fil-mes')?.value||'';
  const status = document.getElementById('nf-fil-status')?.value||'';
  const srch   = (document.getElementById('nf-fil-srch')?.value||'').toLowerCase();

  const notas = await dbGet('notas_fiscais');
  let filt = notas;
  if(emp)    filt = filt.filter(n=>(n.empresa||'DL')===emp);
  if(tipo)   filt = filt.filter(n=>n.tipo===tipo);
  if(mes)    filt = filt.filter(n=>n.mes_competencia===mes);
  if(status) filt = filt.filter(n=>n.status===status);
  if(srch)   filt = filt.filter(n=>[n.emitente_razao,n.emitente_cnpj,n.numero,n.natureza_operacao].join(' ').toLowerCase().includes(srch));

  // Reagrupar por mês
  const porMes = {};
  filt.forEach(n=>{const m=n.mes_competencia||'Sem data';if(!porMes[m])porMes[m]={count:0,total:0,icms:0,iss:0};porMes[m].count++;porMes[m].total+=+n.valor_total||0;porMes[m].icms+=+n.valor_icms||0;porMes[m].iss+=+n.valor_iss||0;});
  const meses = Object.keys(porMes).sort().reverse();

  const tabela = document.getElementById('nf-tabela');
  if(tabela) tabela.innerHTML = meses.length===0?
    '<div class="card"><div class="empty"><p>Nenhuma nota encontrada com esses filtros</p></div></div>':
    meses.map(m=>nfRenderMes(m, filt.filter(n=>(n.mes_competencia||'Sem data')===m), porMes[m])).join('');
}

function nfLimparFiltros() {
  ['nf-fil-emp','nf-fil-tipo','nf-fil-mes','nf-fil-status'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const s=document.getElementById('nf-fil-srch');if(s)s.value='';
  nfFiltrar();
}

async function nfExportarCSV() {
  const notas = empF(await dbGet('notas_fiscais'),'empresa');
  if(!notas.length){toast('Sem dados','info');return;}
  const h=['empresa','tipo','numero','serie','data_emissao','emitente_razao','emitente_cnpj','destinatario_razao','natureza_operacao','valor_total','base_icms','valor_icms','valor_pis','valor_cofins','valor_iss','mes_competencia','status'];
  const rows=notas.map(n=>h.map(k=>`"${(n[k]??'').toString().replace(/"/g,'""')}"`).join(','));
  const blob=new Blob(['\uFEFF'+[h.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`notas_fiscais_${today()}.csv`;a.click();
}

// ── PAINEL FISCAL ──
async function pgFiscalDashboard(c) {
  const notas = await dbGet('notas_fiscais');
  const fNotas = empF(notas, 'empresa');
  const now = new Date(); const yr = now.getFullYear();
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  const anual = meses.map((_,i)=>{
    const m = `${yr}-${String(i+1).padStart(2,'0')}`;
    const mn = fNotas.filter(n=>n.mes_competencia===m);
    return {
      mes: meses[i],
      count: mn.length,
      total: mn.reduce((s,n)=>s+(+n.valor_total||0),0),
      icms:  mn.reduce((s,n)=>s+(+n.valor_icms||0),0),
      pis:   mn.reduce((s,n)=>s+(+n.valor_pis||0),0),
      cofins:mn.reduce((s,n)=>s+(+n.valor_cofins||0),0),
      iss:   mn.reduce((s,n)=>s+(+n.valor_iss||0),0),
    };
  });

  const totAno = anual.reduce((s,m)=>s+m.total,0);
  const icmsAno= anual.reduce((s,m)=>s+m.icms,0);
  const issAno = anual.reduce((s,m)=>s+m.iss,0);
  const pisAno = anual.reduce((s,m)=>s+m.pis,0);
  const cofAno = anual.reduce((s,m)=>s+m.cofins,0);

  // Por emitente top 10
  const emit = {};
  fNotas.forEach(n=>{const k=n.emitente_razao||n.emitente_cnpj||'?';emit[k]=(emit[k]||0)+(+n.valor_total||0);});
  const topEmit = Object.entries(emit).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // Por tipo
  const porTipo = {NFe:0, NFSe:0, CTe:0};
  fNotas.forEach(n=>{porTipo[n.tipo]=(porTipo[n.tipo]||0)+(+n.valor_total||0);});

  c.innerHTML = `<div style="display:flex;flex-direction:column;gap:16px">
    <div class="sec-head">
      <div class="sec-title">📊 Painel Fiscal — ${yr}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-white btn-sm" onclick="pgNotasFiscais(document.getElementById('content'))">← Voltar às Notas</button>
        <button class="btn btn-white btn-sm" onclick="fiscalImprimir()">🖨 Imprimir</button>
      </div>
    </div>

    <div class="g4">
      <div class="kpi kpi-green"><div class="kpi-icon">💰</div><div><div class="kpi-lbl">Total NFs ${yr}</div><div class="kpi-val">${R$(totAno)}</div><div class="kpi-sub">${fNotas.filter(n=>(n.mes_competencia||'').startsWith(String(yr))).length} notas</div></div></div>
      <div class="kpi kpi-amber"><div class="kpi-icon">📋</div><div><div class="kpi-lbl">ICMS Total</div><div class="kpi-val">${R$(icmsAno)}</div></div></div>
      <div class="kpi kpi-blue"><div class="kpi-icon">🏛️</div><div><div class="kpi-lbl">ISS Total</div><div class="kpi-val">${R$(issAno)}</div></div></div>
      <div class="kpi kpi-purple"><div class="kpi-icon">📊</div><div><div class="kpi-lbl">PIS + COFINS</div><div class="kpi-val">${R$(pisAno+cofAno)}</div></div></div>
    </div>

    <div class="g2">
      <div class="card"><div class="card-title">📅 NFs por Mês — ${yr}</div>
        <canvas id="fc-mensal" height="200"></canvas>
      </div>
      <div class="card"><div class="card-title">🍕 Por Tipo de Documento</div>
        <div style="display:flex;flex-direction:column;gap:8px;padding-top:8px">
          ${Object.entries(porTipo).map(([tipo,val])=>`<div>
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span class="badge ${tipo==='NFe'?'b-blue':tipo==='NFSe'?'b-green':'b-amber'}">${tipo}</span>
              <span class="td-mono">${R$(val)}</span>
            </div>
            <div class="prog"><div class="prog-fill" style="width:${totAno>0?Math.round(val/totAno*100):0}%;background:${tipo==='NFe'?'var(--blue)':tipo==='NFSe'?'var(--green)':'var(--amber)'}"></div></div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="g2">
      <div class="card"><div class="card-title">📋 Resumo Mensal de Impostos</div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>Mês</th><th>NFs</th><th>Valor Total</th><th>ICMS</th><th>ISS</th><th>PIS+COFINS</th></tr></thead>
          <tbody>${anual.filter(m=>m.count>0).map(m=>`<tr>
            <td style="font-weight:700">${m.mes}/${yr}</td>
            <td class="td-mono">${m.count}</td>
            <td class="td-mono" style="color:var(--green)">${R$(m.total)}</td>
            <td class="td-mono" style="color:var(--amber)">${m.icms>0?R$(m.icms):'-'}</td>
            <td class="td-mono" style="color:var(--blue)">${m.iss>0?R$(m.iss):'-'}</td>
            <td class="td-mono">${(m.pis+m.cofins)>0?R$(m.pis+m.cofins):'-'}</td>
          </tr>`).join('')}
          <tr style="font-weight:800;border-top:2px solid var(--line)">
            <td>TOTAL ${yr}</td><td class="td-mono">${fNotas.length}</td>
            <td class="td-mono" style="color:var(--green)">${R$(totAno)}</td>
            <td class="td-mono" style="color:var(--amber)">${R$(icmsAno)}</td>
            <td class="td-mono" style="color:var(--blue)">${R$(issAno)}</td>
            <td class="td-mono">${R$(pisAno+cofAno)}</td>
          </tr></tbody>
        </table></div>
      </div>
      <div class="card"><div class="card-title">🏆 Top 10 Emitentes</div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>Emitente</th><th>Total</th><th>%</th></tr></thead>
          <tbody>${topEmit.map(([emit,val])=>`<tr>
            <td style="font-size:12px">${esc(emit.slice(0,35))}</td>
            <td class="td-mono" style="color:var(--green)">${R$(val)}</td>
            <td class="td-mono">${totAno>0?(val/totAno*100).toFixed(1)+'%':'—'}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
    </div>
  </div>`;

  // Chart
  if(typeof Chart==='undefined'){
    const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s.onload=()=>_drawFiscalChart(anual);document.head.appendChild(s);
  } else _drawFiscalChart(anual);
}

function _drawFiscalChart(anual){
  const ctx=document.getElementById('fc-mensal');if(!ctx)return;
  if(ctx._c)ctx._c.destroy();
  ctx._c=new Chart(ctx,{type:'bar',data:{labels:anual.map(m=>m.mes),datasets:[
    {label:'Valor NFs',data:anual.map(m=>m.total),backgroundColor:'rgba(14,110,181,.7)',borderRadius:4},
    {label:'ICMS',data:anual.map(m=>m.icms),backgroundColor:'rgba(176,122,16,.7)',borderRadius:4},
    {label:'ISS',data:anual.map(m=>m.iss),backgroundColor:'rgba(109,40,217,.7)',borderRadius:4},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5a7080',font:{size:11}}}},scales:{x:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}},y:{ticks:{color:'#7a9ab5'},grid:{color:'#e8eef3'}}}}});
}

function fiscalImprimir(){
  printReport(document.getElementById('content').innerHTML,'PAINEL FISCAL',`Empresa: ${currentEmpresa} — ${new Date().getFullYear()}`);
}
